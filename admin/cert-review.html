<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家审核管理 - 元宇宙商城后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

    .header { background: linear-gradient(135deg, #D70C1F, #F12B3D); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-user { font-size: 14px; }

    .main-container { display: flex; min-height: calc(100vh - 60px); }
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
    .sidebar-group-title { padding: 8px 24px; font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-item { padding: 10px 24px 10px 48px; font-size: 14px; color: #666; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .sidebar-item:hover { background: #f5f5f5; color: #D70C1F; }
    .sidebar-item.active { background: rgba(215, 12, 31, 0.1); color: #D70C1F; font-weight: 600; }
    .sidebar-item svg { width: 14px; height: 14px; }

    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .content-title { font-size: 18px; font-weight: 600; color: #333; }

    .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #D70C1F; color: #fff; }
    .btn-primary:hover { background: #c60a1b; }
    .btn-default { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-default:hover { background: #f5f5f5; }
    .btn-success { background: #52c41a; color: #fff; }
    .btn-success:hover { background: #389e0d; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .btn-danger:hover { background: #cf1322; }

    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 13px; color: #999; border-bottom: 2px solid #f0f0f0; font-weight: 600; }
    td { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 14px; vertical-align: middle; }
    tr:hover td { background: #fafafa; }
    .status-badge { padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .status-verifying { background: #fff7e6; color: #fa8c16; }
    .status-passed { background: #f6ffed; color: #52c41a; }
    .status-rejected { background: #fff2f0; color: #ff4d4f; }
    .actions { display: flex; gap: 8px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .modal-close svg { width: 14px; height: 14px; color: #666; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }
    .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
    .info-label { color: #999; width: 120px; flex-shrink: 0; }
    .info-value { color: #333; font-weight: 500; }
    .cert-img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 8px; }
    .reject-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; resize: vertical; min-height: 60px; }
    .empty-state { padding: 60px 0; text-align: center; color: #999; font-size: 14px; }

    .history-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .history-tab { padding: 6px 16px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #666; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .history-tab:hover { background: #f5f5f5; }
    .history-tab.active { background: #D70C1F; color: #fff; border-color: #D70C1F; }

    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; animation: slideIn 0.3s ease; }
    .toast.success { background: rgba(7, 193, 96, 0.9); color: #fff; }
    .toast.error { background: rgba(215, 12, 31, 0.9); color: #fff; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  </style>
</head>
<body>
<div class="header">
  <div class="header-title">元宇宙商城 - 后台管理</div>
  <div class="header-user">管理员</div>
</div>

<div class="main-container">
      <div class="sidebar">
      <div class="sidebar-group-title">元宇宙管理</div>
      <div class="sidebar-item" onclick="navigateTo('hotspot-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>场景和热区</div>
      <div class="sidebar-item" onclick="navigateTo('path-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 19 19 12 12 5 5 12"/><circle cx="12" cy="12" r="3"/></svg>跳转路径</div>
      <div class="sidebar-item" onclick="navigateTo('map-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="3 9 12 15 21 9"/></svg>主地图管理</div>
      <div class="sidebar-item" onclick="navigateTo('space-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>商家元宇宙空间管理</div>
      <div class="sidebar-item" onclick="navigateTo('role-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>角色管理</div>
      <div class="sidebar-item" onclick="navigateTo('dashboard-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>元宇宙看板</div>
      <div class="sidebar-group-title">数字资产</div>
      <div class="sidebar-item" onclick="navigateTo('asset-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>数字资产管理</div>
    <div class="sidebar-item" onclick="navigateTo('digital-asset-detail.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>数字资产详情</div>
      <div class="sidebar-item" onclick="navigateTo('order-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>订单管理</div>
      <div class="sidebar-group-title">会员管理</div>
      <div class="sidebar-item" onclick="navigateTo('user-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>用户管理</div>
      <div class="sidebar-item" onclick="navigateTo('merchant-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>商家管理</div>
      <div class="sidebar-group-title">审核管理</div>
      <div class="sidebar-item active" onclick="navigateTo('cert-review.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>商家审核管理</div>
    <div class="sidebar-item" onclick="navigateTo('story-review.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>文化故事审核</div>
          <div class="sidebar-group-title">内容管理</div>
    <div class="sidebar-item" onclick="navigateTo('message-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>消息管理</div>
    <div class="sidebar-group-title">系统管理</div>
      <div class="sidebar-item" onclick="navigateTo('wallet-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>钱包管理</div>
    </div>

  <div class="content">
    <div class="content-header"><div class="content-title">商家审核管理</div></div>

    <div class="card">
      <div class="card-title">待审核列表</div>
      <table>
        <thead><tr><th>商家简称</th><th>企业名称</th><th>所属行业</th><th>提交时间</th><th style="width:160px">操作</th></tr></thead>
        <tbody id="reviewTbody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none">暂无待审核的商家认证申请</div>
    </div>

    <div class="card">
      <div class="card-title">审核记录</div>
      <div class="history-tabs">
        <button class="history-tab active" onclick="filterHistory('all',this)">全部</button>
        <button class="history-tab" onclick="filterHistory('passed',this)">已通过</button>
        <button class="history-tab" onclick="filterHistory('rejected',this)">已驳回</button>
      </div>
      <table>
        <thead><tr><th>商家简称</th><th>企业名称</th><th>审核结果</th><th>审核时间</th><th>备注</th><th>操作</th></tr></thead>
        <tbody id="historyTbody"></tbody>
      </table>
      <div class="empty-state" id="emptyHistory" style="display:none">暂无审核记录</div>
    </div>
  </div>
</div>

<!-- 审核详情弹窗 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">商家认证详情</div>
      <div class="modal-close" onclick="closeDetailModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div class="modal-body" id="detailContent"></div>
    <div class="modal-footer" id="detailFooter">
      <button class="btn btn-danger" onclick="rejectCert()">驳回</button>
      <button class="btn btn-success" onclick="approveCert()">审核通过</button>
    </div>
  </div>
</div>

<!-- 驳回理由弹窗 -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal-box" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title">驳回理由</div>
      <div class="modal-close" onclick="closeRejectModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div class="modal-body">
      <textarea class="reject-input" id="rejectReason" placeholder="请输入驳回理由（必填）"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeRejectModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmReject()">确认驳回</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 纯模拟数据（不联动 localStorage）
var pendingList = [
  { id: 'p1', name: '绍兴兰亭产业数资', certData: {
    logo: '../asset/绍兴兰亭logo.png', company: '绍兴兰亭产业数资有限公司', industry: 'tour',
    legalName: '王羲之', legalPhone: '13857580001',
    contact: '陈经理', contactPhone: '13957580002',
    creditCode: '913306000000000001', certImg: ''
  }, submitTime: '2026-07-10T14:30:00', business:'数字资产发行、文旅景区数字藏品开发' },
  { id: 'p2', name: '古越龙山', certData: {
    logo: '../asset/古越龙山logo.png', company: '古越龙山文化发展有限公司', industry: 'tour',
    legalName: '赵越', legalPhone: '13957580003',
    contact: '钱主管', contactPhone: '13857580004',
    creditCode: '913306000000000002', certImg: ''
  }, submitTime: '2026-07-11T09:00:00', business:'黄酒文化推广、数字资产发行' },
  { id: 'p3', name: '越窑文化', certData: {
    logo: '../asset/越窑文化logo.png', company: '越窑文化传播有限公司', industry: 'tour',
    legalName: '孙瓷', legalPhone: '13757580005',
    contact: '周经理', contactPhone: '13657580006',
    creditCode: '913306000000000003', certImg: ''
  }, submitTime: '2026-07-12T10:00:00', business:'越窑青瓷非遗传承、数字藏品发行' },
  { id: 'p4', name: '平水茶业', certData: {
    logo: '../asset/平水茶叶logo.png', company: '平水茶业有限公司', industry: 'food',
    legalName: '陆羽', legalPhone: '13557580007',
    contact: '吴主管', contactPhone: '13757580008',
    creditCode: '913306000000000004', certImg: ''
  }, submitTime: '2026-07-13T15:00:00', business:'平水日铸茶生产销售、茶叶数字资产' }
];
var reviewHistory = [];

function renderReviewList() {
  var tbody = document.getElementById('reviewTbody'), empty = document.getElementById('emptyState');
  if (pendingList.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; } else { empty.style.display = 'none'; }
  var industryMap = { food: '食品饮料', ent: '游戏娱乐', film: '影视传媒', tour: '文旅景区', retail: '零售百货', tech: '科技互联网', edu: '教育培训', other: '其他行业' };
  tbody.innerHTML = pendingList.map(function(r, i) {
    var cd = r.certData || {};
    return '<tr><td style="font-weight:600;color:#1a1a2e">' + r.name + '</td><td>' + (cd.company||'-') + '</td><td>' + (industryMap[cd.industry]||cd.industry||'-') + '</td><td style="font-size:12px;color:#999">' + r.submitTime.substring(0,10) + '</td><td><button class="btn btn-primary" style="font-size:12px;padding:4px 12px" onclick="openDetail(' + i + ')">查看详情</button></td></tr>';
  }).join('');
}

var historyFilter = 'all';
function filterHistory(filter, el) {
  historyFilter = filter;
  document.querySelectorAll('.history-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  renderHistory();
}
function renderHistory() {
  var tbody = document.getElementById('historyTbody'), empty = document.getElementById('emptyHistory');
  var list = reviewHistory;
  if (historyFilter === 'passed') list = reviewHistory.filter(function(h) { return h.result === 'passed'; });
  else if (historyFilter === 'rejected') list = reviewHistory.filter(function(h) { return h.result === 'rejected'; });
  if (list.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = list.map(function(h) {
    return '<tr><td style="font-weight:600">' + h.name + '</td><td>' + (h.company||'-') + '</td><td><span class="status-badge ' + (h.result==='passed'?'status-passed':'status-rejected') + '">' + (h.result==='passed'?'通过':'驳回') + '</span></td><td style="font-size:12px;color:#999">' + h.reviewTime.substring(0,16).replace('T',' ') + '</td><td style="font-size:12px;color:#999">' + (h.reason||'-') + '</td><td><button class="btn btn-default" style="font-size:12px;padding:4px 12px" onclick="showHistoryDetail(' + h.idx + ')">查看详情</button></td></tr>';
  }).join('');
}

var currentReviewItem = null;
function openDetail(index) {
  currentReviewItem = pendingList[index];
  document.getElementById('detailFooter').style.display = '';
  openDetailSimple();
}
function showHistoryDetail(idx) {
  currentReviewItem = reviewHistory[idx];
  document.getElementById('detailFooter').style.display = 'none';
  openDetailSimple();
}
function openDetailSimple() {
  var cd = currentReviewItem.certData || {};
  var industryMap = { food: '食品饮料', ent: '游戏娱乐', film: '影视传媒', tour: '文旅景区', retail: '零售百货', tech: '科技互联网', edu: '教育培训', other: '其他行业' };
  var logoHtml = cd.logo ? '<img src="' + cd.logo + '" style="width:60px;height:60px;border-radius:8px;object-fit:cover">' : '<div style="width:60px;height:60px;border-radius:8px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#ccc">无</div>';
  var h = '<div style="display:flex;gap:16px;margin-bottom:20px;align-items:center">' + logoHtml + '<div><div style="font-size:16px;font-weight:700;color:#1a1a2e">' + currentReviewItem.name + '</div></div></div>';
  h += '<div class="info-row"><span class="info-label">企业名称</span><span class="info-value">' + (cd.company||'-') + '</span></div>';
  h += '<div class="info-row"><span class="info-label">所属行业</span><span class="info-value">' + (industryMap[cd.industry]||cd.industry||'-') + '</span></div>';
  h += '<div class="info-row"><span class="info-label">法人姓名</span><span class="info-value">' + (cd.legalName||'-') + '</span></div>';
  h += '<div class="info-row"><span class="info-label">法人手机号</span><span class="info-value">' + (cd.legalPhone||'-') + '</span></div>';
  h += '<div class="info-row"><span class="info-label">联系人姓名</span><span class="info-value">' + (cd.contact||'-') + '</span></div>';
  h += '<div class="info-row"><span class="info-label">联系人手机号</span><span class="info-value">' + (cd.contactPhone||'-') + '</span></div>';
  h += '<div class="info-row"><span class="info-label">统一社会信用代码</span><span class="info-value">' + (cd.creditCode||'-') + '</span></div>';
  h += '<div style="margin-top:12px"><span style="font-size:12px;color:#999">企业证件照</span>';
  if (cd.certImg) { h += '<img class="cert-img" src="' + cd.certImg + '" alt="证件照">'; }
  else { h += '<div style="width:100%;height:100px;background:#f5f5f7;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:13px;margin-top:4px">暂无证件照</div>'; }
  h += '</div>';
  document.getElementById('detailContent').innerHTML = h;
  document.getElementById('detailModal').classList.add('show');
}
function closeDetailModal() { document.getElementById('detailModal').classList.remove('show'); document.getElementById('detailFooter').style.display = ''; }

function approveCert() {
  if (!currentReviewItem) return;
  var item = pendingList.find(function(p) { return p.id === currentReviewItem.id; });
  if (!item) return;
  reviewHistory.push({
    idx: reviewHistory.length, id: item.id, name: item.name,
    company: (item.certData||{}).company, result: 'passed',
    reviewTime: new Date().toISOString(), reason: '', certData: item.certData || {}
  });
  pendingList = pendingList.filter(function(p) { return p.id !== item.id; });
  closeDetailModal();
  renderReviewList(); renderHistory();
  showToast('审核已通过', 'success');
}

function rejectCert() { document.getElementById('rejectModal').classList.add('show'); }
function closeRejectModal() { document.getElementById('rejectModal').classList.remove('show'); }
function confirmReject() {
  var reason = document.getElementById('rejectReason').value.trim();
  if (!reason) { showToast('请输入驳回理由', 'error'); return; }
  if (!currentReviewItem) return;
  var item = pendingList.find(function(p) { return p.id === currentReviewItem.id; });
  if (!item) return;
  reviewHistory.push({
    idx: reviewHistory.length, id: item.id, name: item.name,
    company: (item.certData||{}).company, result: 'rejected',
    reviewTime: new Date().toISOString(), reason: reason, certData: item.certData || {}
  });
  pendingList = pendingList.filter(function(p) { return p.id !== item.id; });
  document.getElementById('rejectReason').value = '';
  closeRejectModal();
  closeDetailModal();
  renderReviewList(); renderHistory();
  showToast('已驳回', 'success');
}

function navigateTo(url) { window.location.href = url; }
function showToast(msg, type) {
  var t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2000);
}

renderReviewList(); renderHistory();
</script>
</body>
</html>
