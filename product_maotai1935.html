<html lang="zh-CN">

<style>
:root{
  --accent:#3F8B6D;--accent-contrast:#fff;--link:#3F8B6D;--muted:#a0a0a0;
  --bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;
  --border:#e0e0e0;--page-bg:#F0F0F0;
  --radius-sm:7px;--radius-card:7px;--radius-pill:9999px;
  --font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:var(--page-bg);position:relative;box-sizing:border-box;padding-bottom:100px}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部导航（透明覆盖） ── */
.nav-bar{position:absolute;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(rgba(0,0,0,.4),transparent)}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,.25);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#fff}
.nav-placeholder{width:32px}

/* ── 封面大图 ── */
.hero-cover{width:100%;height:380px;overflow:hidden;position:relative}
.hero-cover img{width:100%;height:100%;object-fit:cover;display:block}
.hero-cover::after{content:'';position:absolute;bottom:0;left:0;right:0;height:100px;background:linear-gradient(transparent,rgba(0,0,0,.55))}

/* ── 标题信息区 ── */
.hero-info{background:var(--bg);padding:20px 16px 20px;text-align:center;position:relative;overflow:hidden;margin:0 16px;margin-top:-30px;border-radius:var(--radius-card);box-shadow:0 1px 6px rgba(0,0,0,.06);z-index:2}
.hero-title{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:14px;position:relative;z-index:1}
.hero-leaf{position:absolute;top:50%;transform:translateY(-50%);width:22px;height:48px;z-index:0;opacity:.2}
.hero-leaf.left{left:10px}
.hero-leaf.right{right:10px;transform:translateY(-50%) scaleX(-1)}
.hero-tags{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;position:relative;z-index:1}
.hero-tags span{font-size:12px;padding:5px 14px;border-radius:999px;font-weight:600;white-space:nowrap}
.tag-limit{background:linear-gradient(135deg,#3F8B6D,#4FA889);color:#fff}
.tag-dark{background:#E8F4F0;color:#3a6b52}

/* ── 横版时间轴 ── */
.htimeline{margin:12px 16px;background:var(--bg);border-radius:var(--radius-card);padding:20px 16px 16px;box-shadow:0 1px 6px rgba(0,0,0,.04);overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;cursor:grab}
.htimeline::-webkit-scrollbar{display:none}
.htimeline .stl-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:6px;padding-left:4px}
.htimeline .stl-title::before{content:'';width:4px;height:16px;background:var(--accent);border-radius:2px}
.htimeline-track{display:inline-flex;gap:0;padding:0 8px 0 4px;align-items:flex-start}
.htimeline-node{display:flex;flex-direction:column;align-items:center;width:90px;flex-shrink:0;position:relative}
.htimeline-label{font-size:11px;color:var(--ink-subtle);text-align:center;white-space:nowrap;line-height:1.4;padding-bottom:8px;height:30px;display:flex;align-items:flex-end;justify-content:center}
.htimeline-label.active{color:var(--accent);font-weight:600}
.htimeline-top{display:flex;align-items:center;width:100%;position:relative}
.htimeline-dot{width:12px;height:12px;border-radius:50%;background:#d0d0d0;flex-shrink:0;position:relative;z-index:1;margin:0 auto}
.htimeline-dot.active{background:var(--accent);box-shadow:0 0 0 4px rgba(63,139,109,.18)}
.htimeline-dot.done{background:var(--accent)}
.htimeline-conn{position:absolute;top:5px;left:calc(50% + 6px);width:84px;height:2px;background:#e0e0e0;pointer-events:none}
.htimeline-conn.done{background:var(--accent)}
.htimeline-node:last-child .htimeline-conn{display:none}
.htimeline-time{font-size:11px;color:#999;text-align:center;padding-top:4px;white-space:nowrap}

/* ── 区块标题 ── */
.sec-title{display:flex;align-items:center;gap:8px;padding:16px 16px 10px}
.sec-title::before{content:'';width:4px;height:16px;background:var(--accent);border-radius:2px}
.sec-title span{font-size:15px;font-weight:700;color:var(--ink)}

/* ── 信息网格 ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px}
.info-tile{background:var(--bg);border-radius:var(--radius-card);padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);display:flex;flex-direction:column;gap:8px}
.info-tile .it-icon{width:20px;height:20px;color:var(--accent)}
.info-tile .it-label{font-size:11px;color:var(--ink-subtle)}
.info-tile .it-value{font-size:14px;font-weight:600;color:var(--ink)}

/* ── 图片详情 ── */
.detail-img{margin:12px 16px;border-radius:var(--radius-card);overflow:hidden}
.detail-img img{width:100%;display:block}

/* ── 底部购买栏 ── */
.buy-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;gap:12px;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,4px));background:var(--bg);border-top:1px solid rgba(0,0,0,.05);z-index:100;box-sizing:border-box}
.btn-collect{flex-shrink:0;width:80px;height:48px;border:1px solid var(--border);border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:13px;color:var(--ink-muted)}
.btn-collect:active{background:var(--page-bg)}
.btn-collect.active{color:#F08A24;border-color:#F08A24;background:#FFF2E5}
.btn-collect svg{width:18px;height:18px}
.btn-buy{flex:1;height:48px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.btn-buy:active{opacity:.9}
.btn-buy svg{width:18px;height:18px}

/* ── 底部提示栏（购买栏上方） ── */
.status-tip-bar{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom,4px));left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:99;padding:6px 16px;text-align:center;font-size:12px;color:#fff;background:linear-gradient(135deg,#3F8B6D,#4FA889);box-sizing:border-box;display:none}
.status-tip-bar .tip-icon{display:inline-block;margin-right:4px}
@media(max-width:430px){.status-tip-bar{max-width:100%}}

/* ── 状态按钮（手机框外右下角） ── */
.status-side{position:fixed;z-index:999;display:flex;flex-direction:column;gap:3px;bottom:calc(76px + env(safe-area-inset-bottom,4px));left:50%;margin-left:calc(215px + 8px)}
@media(max-width:640px){.status-side{left:auto;right:6px;bottom:80px;margin-left:0}}
.status-sbtn{padding:5px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .2s;text-align:center;white-space:nowrap;min-width:72px;line-height:1.4}
.status-sbtn:active{opacity:.7}
.status-sbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 6px rgba(63,139,109,.25)}
.status-sbtn.sub{font-size:10px;padding:3px 8px;min-width:56px}
.sub-side{position:fixed;z-index:998;left:50%;margin-left:calc(215px + 8px + 96px);bottom:calc(76px + env(safe-area-inset-bottom,4px) + 52px);display:flex;flex-direction:column;gap:4px}
@media(max-width:640px){.sub-side{left:auto;right:80px;bottom:80px}}

/* ── 动画 ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── 3D鉴赏按钮 ── */
.btn-3d{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:10px 22px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-3d:active{transform:scale(.96)}
.btn-3d svg{width:18px;height:18px}
</style>
</head>

<div class="buy-bar">
  <button class="btn-collect" id="btnCollect" onclick="toggleCollect()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span id="collectText">收藏</span>
  </button>
  <button class="btn-buy" id="buyBtn" onclick="window.location.href='order_maotai1935.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2L6 22H18L15 2H9Z"/><line x1="7" y1="6" x2="17" y2="6"/></svg>
    <span id="buyBtnText">立即参与 ¥399</span>
  </button>
</div>

</div><!-- /page -->

<script>
// ═══ 横版时间轴拖拽滚动 ═══
(function(){
  var el = document.querySelector('.htimeline');
  if(!el)return;
  var isDown=false,startX,scrollLeft;
  el.addEventListener('mousedown',function(e){isDown=true;startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft;el.style.cursor='grabbing'});
  el.addEventListener('mouseleave',function(){isDown=false;el.style.cursor='grab'});
  el.addEventListener('mouseup',function(){isDown=false;el.style.cursor='grab'});
  el.addEventListener('mousemove',function(e){if(!isDown)return;e.preventDefault();var x=e.pageX-el.offsetLeft;el.scrollLeft=scrollLeft-(x-startX)});
  el.addEventListener('touchstart',function(e){isDown=true;startX=e.touches[0].pageX-el.offsetLeft;scrollLeft=el.scrollLeft});
  el.addEventListener('touchend',function(){isDown=false});
  el.addEventListener('touchmove',function(e){if(!isDown)return;var x=e.touches[0].pageX-el.offsetLeft;el.scrollLeft=scrollLeft-(x-startX)});
})();

var PID="lantingyaji";

function toggleCollect(){
  var list = JSON.parse(localStorage.getItem("favorites") || "[]");
  var i = list.indexOf(PID);
  var btn = document.getElementById("btnCollect");
  var txt = document.getElementById("collectText");
  if (i >= 0) {
    list.splice(i, 1);
    btn.classList.remove("active");
    if (txt) txt.textContent = "收藏";
  } else {
    list.push(PID);
    btn.classList.add("active");
    if (txt) txt.textContent = "已收藏";
  }
  localStorage.setItem("favorites", JSON.stringify(list));
}

(function(){
  var list = JSON.parse(localStorage.getItem("favorites") || "[]");
  if (list.indexOf(PID) >= 0) {
    document.getElementById("btnCollect").classList.add("active");
    var t = document.getElementById("collectText");
    if (t) t.textContent = "已收藏";
  }
})();

// ═══ 状态切换 ═══
var statusConfig = {
  presale:  { text: '立即预约 ¥399', color: '#D97706', href: '', tip: '预约成功后等待抽签结果', timeLabel: '抽签预约：06/01 10:00 - 06/05 18:00' },
  prebuy:   { text: '立即抽签购买 ¥399', color: '#8B5CF6', href: 'order_maotai1935.html', tip: '支付后参与抽签，中签即得', timeLabel: '抽签购买：06/05 18:00 - 06/07 18:00' },
  unwin:    { text: '未中签，无法购买', color: '#bbb', href: '', tip: '很遗憾未中签，感谢参与', timeLabel: '抽签购买：06/05 18:00 - 06/07 18:00' },
  won:      { text: '立即购买 ¥399', color: '#3F8B6D', href: 'order_maotai1935.html', tip: '恭喜中签！立即购买', timeLabel: '抽签购买：06/05 18:00 - 06/07 18:00' },
  equity:   { text: '权益投放中', color: '#0891B2', href: '', tip: '权益投放中，参与即可获得', timeLabel: '权益投放：06/07 18:00 - 06/08 10:00' },
  equitybuy:{ text: '立即购买 ¥399', color: '#3F8B6D', href: 'order_maotai1935.html', tip: '权益购买中，限量抢购', timeLabel: '权益购买：06/08 10:00 - 06/09 10:00' },
  public:   { text: '立即购买 ¥399', color: '#3F8B6D', href: 'order_maotai1935.html', tip: '全民购买中，先到先得', timeLabel: '', hideTip: true },
  none:     { text: '敬请期待', color: '#bbb', href: '', tip: '敬请期待', timeLabel: '' }
};

var prebuyExpanded = false;

function togglePrebuy(){
  var prebuyBtn = document.querySelector('.status-sbtn[data-mode="prebuy"]');
  var subSide = document.getElementById('subSide');
  prebuyExpanded = !prebuyExpanded;
  if(prebuyExpanded){
    subSide.style.display = 'flex';
    prebuyBtn.classList.add('on');
    // 默认选中未中签
    switchStatus('unwin');
  } else {
    subSide.style.display = 'none';
    document.querySelectorAll('.status-sbtn.sub').forEach(function(b){ b.classList.remove('on'); });
    prebuyBtn.classList.remove('on');
    var defaultBtn = document.querySelector('.status-sbtn.on');
    if(!defaultBtn) switchStatus('presale');
  }
}

function switchStatus(mode){
  var isSub = (mode === 'unwin' || mode === 'won');
  if(isSub){
    // 子按钮切换：父按钮保持高亮，其他主按钮取消，子按钮间互斥
    document.querySelectorAll('.status-sbtn:not(.sub)').forEach(function(b){ b.classList.remove('on'); });
    document.querySelectorAll('.status-sbtn.sub').forEach(function(b){ b.classList.remove('on'); });
    var parentBtn = document.querySelector('.status-sbtn[data-mode="prebuy"]');
    if(parentBtn) parentBtn.classList.add('on');
    var btn = document.querySelector('.status-sbtn[data-mode="'+mode+'"]');
    if(btn) btn.classList.add('on');
  } else {
    document.querySelectorAll('.status-sbtn').forEach(function(b){ b.classList.remove('on'); });
    var btn = document.querySelector('.status-sbtn[data-mode="'+mode+'"]');
    if(btn) btn.classList.add('on');
    // 收起子按钮
    prebuyExpanded = false;
    document.getElementById('subSide').style.display = 'none';
    document.querySelectorAll('.status-sbtn.sub').forEach(function(b){ b.classList.remove('on'); });
  }

  var cfg = statusConfig[mode] || statusConfig.none;
  // 控制底部提示栏
  var tipBar = document.getElementById('statusTipBar');
  var tipText = document.getElementById('statusTipText');
  if(mode === 'none' || cfg.hideTip){
    tipBar.style.display = 'none';
  } else {
    tipBar.style.display = 'block';
    tipText.textContent = cfg.timeLabel || '';
  }
  var buyBtn = document.getElementById('buyBtn');
  var buyText = document.getElementById('buyBtnText');
  buyText.textContent = cfg.text;
  buyBtn.style.background = cfg.color;
  if(cfg.href){
    buyBtn.onclick = function(){ window.location.href = cfg.href; };
    buyBtn.style.opacity = 1;
    buyBtn.style.cursor = 'pointer';
  } else if(mode === 'presale'){
    buyBtn.onclick = function(){
      buyText.textContent = '已预约';
      buyBtn.style.background = '#bbb';
      buyBtn.style.opacity = 1;
      buyBtn.style.cursor = 'default';
      buyBtn.onclick = function(){};
      var t = document.createElement('div');
      t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:14px 24px;border-radius:10px;font-size:14px;z-index:9999;animation:fadeIn .2s';
      t.textContent = '✅ 预约成功，请等待抽签结果';
      document.body.appendChild(t);
      setTimeout(function(){ t.remove(); }, 2500);
    };
    buyBtn.style.opacity = 1;
    buyBtn.style.cursor = 'pointer';
  } else if(mode === 'unwin'){
    buyBtn.onclick = function(){};
    buyBtn.style.opacity = 0.5;
    buyBtn.style.cursor = 'default';
  } else if(mode === 'won'){
    buyBtn.onclick = function(){ window.location.href = 'order_maotai1935.html'; };
    buyBtn.style.opacity = 1;
    buyBtn.style.cursor = 'pointer';
  } else {
    buyBtn.onclick = function(){};
    buyBtn.style.opacity = 0.5;
    buyBtn.style.cursor = 'default';
  }
}
// 默认选中第一个
switchStatus('presale');
</script>

</body>
</html>
