<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>茅小美 · 数字人</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
  .phone{position:relative;width:860px;height:430px;border-radius:36px;background:#1a1a2e;padding:12px;box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 0 0 2px #333;animation:in .7s ease-out}
  @keyframes in{0%{opacity:0;transform:translateY(60px) scale(.92)}100%{opacity:1;transform:translateY(0) scale(1)}}
  .screen{position:relative;width:100%;height:100%;border-radius:24px;overflow:hidden}
  .screen::before{content:'';position:absolute;inset:0;background:url('聊天背景图.png')center/cover no-repeat;z-index:0}

  /* ── 返回 ── */
  .back-btn{position:absolute;top:12px;left:12px;z-index:10;cursor:pointer;animation:bounce 1.2s ease-in-out infinite;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));transition:transform .25s}
  .back-btn:hover{animation:none;transform:scale(1.12)}
  .back-btn:active{transform:scale(.92)}
  .back-btn img{display:block;width:34px;height:auto;transform:rotate(-90deg)}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

  /* ── 顶栏 ── */
  .header{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:8px 60px 6px;background:rgba(0,0,0,.3);backdrop-filter:blur(6px)}
  .header .name{color:#fff;font-size:14px;font-weight:600;letter-spacing:1px}
  .header .status{color:rgba(255,255,255,.5);font-size:10px;margin-left:6px}
  .header .status::before{content:'';display:inline-block;width:5px;height:5px;background:#07c160;margin-right:4px;vertical-align:middle;animation:dp 1.5s ease-in-out infinite}
  @keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── 数字人形象 ── */
  .avatar-section{position:absolute;left:3%;top:50%;transform:translateY(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:6px}
  .avatar-box{width:110px;height:110px;background:url('茅小美.gif')center/contain no-repeat;animation:flt 2.4s ease-in-out infinite}
  .avatar-name{color:#fff;font-size:12px;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,.7);background:rgba(0,0,0,.4);padding:3px 12px;letter-spacing:1px}
  @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

  /* ── 聊天区 ── */
  .chat-area{position:absolute;left:22%;right:2%;top:48px;bottom:60px;z-index:5;overflow-y:auto;padding:8px 10px 4px;display:flex;flex-direction:column;gap:8px}
  .chat-area::-webkit-scrollbar{width:4px}
  .chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}
  .msg{display:flex;gap:8px;align-items:flex-start;max-width:85%;animation:fadeIn .3s ease-out}
  .msg.ai{align-self:flex-start}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg .bubble{padding:8px 12px;font-size:12px;line-height:1.6;word-break:break-word;max-width:100%}
  .msg.ai .bubble{background:rgba(255,255,255,.88);color:#1a1a2e;border-radius:4px 12px 12px 12px}
  .msg.user .bubble{background:rgba(192,57,43,.85);color:#fff;border-radius:12px 4px 12px 12px}
  .msg .avatar{width:28px;height:28px;flex-shrink:0;background:url('茅小美.gif')center/contain no-repeat}
  .msg.user .avatar{width:28px;height:28px;flex-shrink:0;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:16px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ── 输入区 ── */
  .input-area{position:absolute;bottom:0;left:0;right:0;z-index:5;display:flex;gap:6px;padding:6px 10px;background:rgba(0,0,0,.35);backdrop-filter:blur(8px)}
  .input-area input{flex:1;padding:8px 12px;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:12px;outline:none}
  .input-area input::placeholder{color:rgba(255,255,255,.35)}
  .input-area input:focus{background:rgba(255,255,255,.18)}
  .input-area button{width:36px;height:36px;border:none;background:linear-gradient(135deg,var(--p,#c0392b),var(--s,#e74c3c));color:#fff;font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .input-area button:active{transform:scale(.92)}

  @media (max-width:920px){.phone{width:calc(100vw - 40px);height:calc((100vw - 40px)*.5)}}
  @media (max-height:500px){.phone{height:calc(100vh - 40px);width:calc((100vh - 40px)*2)}}
  @media (max-width:768px){body{background:#000}.phone{width:100vw;height:100vh;border-radius:0;padding:0;box-shadow:none;animation:none}.screen{border-radius:0}.avatar-box{width:60px;height:60px}.chat-area{left:25%}.msg .bubble{font-size:11px;padding:6px 10px}}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="back-btn" onclick="history.back()"><img src="arrow.png" alt="返回"></div>
    <div class="header">
      <span class="name">茅小美 · 数字人</span>
      <span class="status">在线</span>
    </div>
    <div class="avatar-section">
      <div class="avatar-box"></div>
      <div class="avatar-name">茅小美</div>
    </div>
    <div class="chat-area" id="chatBox">
      <div class="msg ai">
        <div class="avatar"></div>
        <div class="bubble">您好，我是茅小美，茅台的AI品酒师。请问您想了解茅台酒的文化、工艺还是产品？</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="chatInput" placeholder="输入问题..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">➤</button>
    </div>
  </div>
</div>
<script>
const replies=[
  {m:['飞天','茅台'],r:'飞天茅台是茅台最具代表性的产品，采用传统大曲酱香工艺，酒体醇厚，酱香突出，回味悠长。元宇宙限定版还附赠数字藏品证书哦~'},
  {m:['价格','多少钱','¥'],r:'飞天茅台元宇宙限定版 ¥1,499，茅台1935数字珍藏 ¥899，详情可以进入数字资产商城看看~'},
  {m:['工艺','酿造','怎么做'],r:'茅台酒遵循"12987"古法：1年周期、2次投料、9次蒸煮、8次发酵、7次取酒，全部手工完成！'},
  {m:['历史','故事','传承'],r:'茅台始于秦汉，1915年巴拿马万博会"怒掷酒瓶振国威"一举夺得金奖，从此香飘世界。'},
  {m:['你好','hi','您好','hello'],r:'您好呀！我是茅小美，很高兴为您服务～您可以问我茅台酒的任何问题！'},
  {m:['VR','参观','云参观'],r:'VR云参观可以带您360°全景漫游茅台酒厂，点击返回后去"VR云参观"点位体验吧！'},
  {m:['数字资产','NFT','藏品'],r:'茅台数字资产商城有飞天酒票、1935NFT等限量数字藏品，返回后去"数字资产商城"看看吧~'},
];
function send(){
  const i=document.getElementById('chatInput'),m=i.value.trim();if(!m)return;
  const b=document.getElementById('chatBox');
  const ud=document.createElement('div');ud.className='msg user';
  ud.innerHTML='<div class="avatar">😊</div><div class="bubble">'+m+'</div>';
  b.appendChild(ud);b.scrollTop=b.scrollHeight;
  let r='茅台酒的魅力在于独特的酱香工艺和文化传承，您想了解更多可以问我～';
  const l=m.toLowerCase();
  for(const x of replies){if(x.m.some(k=>l.includes(k))){r=x.r;break}}
  setTimeout(()=>{
    const ad=document.createElement('div');ad.className='msg ai';
    ad.innerHTML='<div class="avatar"></div><div class="bubble">'+r+'</div>';
    b.appendChild(ad);b.scrollTop=b.scrollHeight;
  },500+Math.random()*400);
  i.value='';
}
</script>
</body>
</html>
