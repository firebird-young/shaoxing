<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>元宇宙商场</title>
<style>
  /* ── 全局重置 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── 手机外框 ── */
  .phone {
    position: relative;
    width: 860px;
    height: 430px;
    border-radius: 36px;
    background: #1a1a2e;
    padding: 12px;
    box-shadow:
      0 30px 80px rgba(0,0,0,.7),
      inset 0 0 0 2px #333;
  }
  .phone-screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 24px;
    overflow: hidden;
    background: #000;
  }

  /* ── 场景图层 ── */
  .scene-layer {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity .8s ease, transform .8s ease;
  }
  .scene-layer.hidden {
    opacity: 0;
    transform: scale(1.06);
    pointer-events: none;
  }

  /* ── 主地图可拖拽 ── */
  .map-pan {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 1;
  }
  .map-pan img {
    position: absolute;
    left: 50%; top: 50%;
    width: 130%; height: 130%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    transition: transform .6s cubic-bezier(.25,.46,.45,.94);
    pointer-events: none;
  }
  .scene-layer.scene-sub .map-pan img {
    width: 120%; height: 120%;
  }
  .map-pan img.dragging {
    transition: none;
  }
  .map-pan img.bounce-in {
    transition: transform .8s cubic-bezier(.17,.67,.39,.97);
  }

  /* 拖拽提示 */
  .drag-hint {
    position: absolute;
    left: 50%; top: 45%;
    transform: translate(-50%, -50%);
    z-index: 3;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    text-shadow: 0 2px 16px rgba(0,0,0,.8);
    letter-spacing: 2px;
    pointer-events: none;
    opacity: 0;
    animation: dragHintAnim 2.8s ease-out;
    white-space: nowrap;
  }
  @keyframes dragHintAnim {
    0% { opacity: 0; transform: translate(-50%, -50%) translateY(10px); }
    15% { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
    70% { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
    100% { opacity: 0; transform: translate(-50%, -50%) translateY(-16px); }
  }

  /* ── 信息覆盖层 ── */
  .scene-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  .scene-overlay > * { pointer-events: auto; }

  /* ── 场景名称 ── */
  .scene-title {
    position: absolute;
    top: 14px;
    left: 20px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    text-shadow: 0 2px 12px rgba(0,0,0,.7);
    background: rgba(0,0,0,.45);
    padding: 5px 14px;
    border-radius: 20px;
    backdrop-filter: blur(6px);
    letter-spacing: 1px;
  }

  /* ── 角色头顶昵称 ── */
  .origin-name {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    text-shadow: 0 1px 8px rgba(0,0,0,.8);
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(4px);
    margin-bottom: 4px;
    pointer-events: none;
  }

  /* ── 弹窗返回/关闭按钮 ── */
  .role-modal-back {
    position: absolute;
    top: 8px;
    right: 10px;
    z-index: 10;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 14px;
    color: rgba(255,255,255,.6);
    font-size: 11px;
    cursor: pointer;
    padding: 3px 10px;
    transition: background .2s, color .2s;
    line-height: 1;
  }
  .role-modal-back:hover { background: rgba(255,255,255,.12); color: #fff; }

  /* ── 右上角用户信息 ── */
  .user-info-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 50;
    pointer-events: auto;
    display: none;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 4px;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 18px;
    background: rgba(0,0,0,.4);
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background .2s;
  }
  .user-info-btn:hover { background: rgba(0,0,0,.6); }
  .user-info-btn .u-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .user-info-btn .u-name {
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── 重置角色按钮（手机框外） ── */
  .reset-role-btn {
    position: absolute;
    top: -30px;
    right: 0;
    z-index: 50;
    padding: 3px 10px;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 12px;
    background: rgba(0,0,0,.4);
    color: rgba(255,255,255,.5);
    font-size: 11px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background .2s, color .2s;
  }
  .reset-role-btn:hover {
    background: rgba(0,0,0,.6);
    color: #fff;
  }

  .portrait-btn {
    position: absolute;
    top: -30px; left: 0;
    z-index: 50;
    padding: 3px 10px;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 12px;
    background: rgba(0,0,0,.4);
    color: rgba(255,255,255,.5);
    font-size: 11px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background .2s, color .2s;
  }
  .portrait-btn:hover { background: rgba(0,0,0,.6); color: #fff; }

  /* ── 起点（李白待机） ── */
  .origin {
    position: absolute;
    width: 64px; height: 64px;
    cursor: default;
    z-index: 10;
    /* 位置在 JS 中设定 */
  }
  .origin-dot {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: center / cover no-repeat;
    box-shadow: 0 0 24px rgba(100,200,255,.6);
    animation: float 2.4s ease-in-out infinite;
  }
  .origin-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(100,200,255,.4);
    animation: ringPulse 2s ease-out infinite;
  }
  .origin-ring:nth-child(2) { animation-delay: .7s; }
  .origin-ring:nth-child(3) { animation-delay: 1.4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes ringPulse {
    0% { transform: scale(1); opacity: .6; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* ── 商场点位 ── */
  .mall-spot {
    position: absolute;
    cursor: pointer;
    z-index: 8;
    border: 2px solid rgba(255,255,255,.25);
    border-radius: 8px;
    background: rgba(255,255,255,.06);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border .25s, background .25s, transform .25s;
  }
  .mall-spot:hover {
    border-color: rgba(70,180,255,.7);
    background: rgba(70,180,255,.12);
    box-shadow: 0 0 16px rgba(0,180,255,.3);
  }
  .mall-spot .label {
    white-space: nowrap;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    text-shadow: 0 1px 6px rgba(0,0,0,.8);
    pointer-events: none;
  }

  /* ── 起点可移动 ── */
  .origin {
    transition: left 1.6s cubic-bezier(.34,1.56,.64,1),
                top  1.6s cubic-bezier(.34,1.56,.64,1);
  }

  /* ── 导航按钮 ── */
  .nav-btn {
    position: absolute;
    bottom: 16px;
    right: 16px;
    z-index: 20;
    pointer-events: auto;
    cursor: pointer;
    animation: navBounce 1.6s ease-in-out infinite;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
    transition: transform .25s;
  }
  .nav-btn:hover {
    animation: none;
    transform: scale(1.12);
  }
  .nav-btn:active { transform: scale(.92); }
  .nav-btn img {
    display: block;
    width: 48px;
    height: auto;
  }

  @keyframes navBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* ── 主地图返回标准商城按钮 ── */
  .mall-back-btn{
    position:absolute;top:14px;left:14px;z-index:30;
    pointer-events:auto;cursor:pointer;
    display:flex;align-items:center;gap:4px;
    padding:5px 12px;border-radius:16px;
    background:rgba(0,0,0,.45);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.12);
    color:#fff;font-size:12px;font-weight:500;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
    transition:transform .2s;
  }
  .mall-back-btn:hover{transform:scale(1.05);background:rgba(0,0,0,.6)}
  .mall-back-btn:active{transform:scale(.92)}
  .mall-back-btn svg{width:14px;height:14px;flex-shrink:0}

  /* ── 导航弹窗（场景列表） ── */
  .nav-popup {
    position: absolute;
    bottom: 80px;
    right: 16px;
    z-index: 25;
    pointer-events: none;
    opacity: 0;
    transform: scale(.9) translateY(10px);
    transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .nav-popup.show {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1) translateY(0);
  }
  .nav-popup .popup-content {
    background: rgba(20,20,42,.92);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 8px 0;
    min-width: 140px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
  }
  .nav-popup .popup-item {
    padding: 10px 20px;
    color: rgba(255,255,255,.7);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s, color .2s;
    white-space: nowrap;
    text-align: center;
  }
  .nav-popup .popup-item:hover {
    background: rgba(255,255,255,.08);
    color: #fff;
  }
  .nav-popup .popup-item.active {
    color: #667eea;
    font-weight: 700;
  }

  /* ── 下一场景按钮 ── */
  .next-scene-btn {
    position: absolute;
    top: 52px;
    z-index: 31;
    pointer-events: auto;
    cursor: pointer;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
    transition: transform .25s;
  }
  .next-scene-btn:hover { transform: translate(-50%, -50%) scale(1.12); }
  .next-scene-btn:active { transform: translate(-50%, -50%) scale(.92); }
  .next-scene-btn.left-arrow { animation: arrowBounceLeft 1.2s ease-in-out infinite; }
  .next-scene-btn.right-arrow { animation: arrowBounceRight 1.2s ease-in-out infinite; }
  .next-scene-btn img {
    display: block;
    width: 52px;
    height: auto;
  }

  @keyframes arrowBounceLeft {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(8px); }
  }
  @keyframes arrowBounceRight {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(8px); }
  }

  /* ── 气泡弹窗 ── */
  .scene-bubble {
    position: absolute;
    z-index: 30;
    pointer-events: auto;
    opacity: 0;
    transform: translate(-50%, -100%) translateY(-10px) scale(.92);
    transition: opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .scene-bubble.show {
    opacity: 1;
    transform: translate(-50%, -100%) translateY(-16px) scale(1);
  }
  .bubble-content {
    background: #1c1c38;
    border-radius: 14px;
    padding: 16px 20px 14px;
    width: 240px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
    position: relative;
  }
  /* 向下三角箭头 */
  .bubble-content::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid #1c1c38;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.3));
  }
  .bubble-content h3 {
    color: #fff;
    font-size: 16px;
    margin-bottom: 2px;
  }
  .bubble-content p {
    color: rgba(255,255,255,.55);
    font-size: 12px;
    margin-bottom: 14px;
  }
  .bubble-content .btns {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .bubble-content .btns button {
    border: none;
    padding: 7px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .2s;
  }
  .bubble-content .btns button:active { transform: scale(.93); }
  .bubble-content .btns .btn-cancel {
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.6);
  }
  .bubble-content .btns .btn-cancel:hover { background: rgba(255,255,255,.15); }
  .bubble-content .btns .btn-enter {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    color: #1a1a2e;
  }

  /* ── 入场动画 ── */
  .phone { animation: phoneIn .7s ease-out; }
  @keyframes phoneIn {
    0% { opacity: 0; transform: translateY(60px) scale(.92); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── 角色选择弹窗（在 phone-screen 内，一窗展示无滚动） ── */
  .role-modal-overlay {
    position: absolute;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,.7);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .3s;
  }
  .role-modal-overlay.hidden {
    display: none;
  }
  .role-modal {
    background: #1e1e3a;
    border-radius: 10px;
    padding: 10px 14px 10px;
    width: 75%;
    max-width: 300px;
    max-height: 100%;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
    animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn {
    0% { opacity: 0; transform: scale(.9) translateY(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .role-modal-title {
    text-align: center;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 1px;
  }
  .role-modal-sub {
    text-align: center;
    color: rgba(255,255,255,.4);
    font-size: 10px;
    margin-bottom: 6px;
  }
  .role-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }
  .role-card {
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    background: rgba(255,255,255,.04);
    border: 1.5px solid transparent;
    transition: border-color .2s, transform .2s, box-shadow .2s;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .role-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .role-card.selected {
    border-color: #667eea;
    box-shadow: 0 0 0 2px rgba(102,126,234,.3);
  }
  .role-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .role-section-title {
    color: rgba(255,255,255,.4);
    font-size: 10px;
    font-weight: 600;
    margin-bottom: 1px;
    padding-left: 2px;
    grid-column: 1 / -1;
  }
  .role-section-title:not(:first-child) {
    margin-top: 2px;
  }
  .role-name-group {
    margin-bottom: 6px;
  }
  .role-name-group label {
    display: block;
    color: rgba(255,255,255,.6);
    font-size: 10px;
    font-weight: 500;
    margin-bottom: 3px;
  }
  .role-name-input {
    width: 100%;
    height: 30px;
    padding: 0 8px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: #fff;
    font-size: 12px;
    outline: none;
    transition: border-color .2s;
  }
  .role-name-input:focus {
    border-color: #667eea;
  }
  .role-name-input::placeholder {
    color: rgba(255,255,255,.25);
  }
  .role-confirm-btn {
    width: 100%;
    height: 32px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
  }
  .role-confirm-btn:hover {
    opacity: .9;
  }
  .role-confirm-btn:active {
    transform: scale(.97);
  }
  .role-confirm-btn:disabled {
    opacity: .4;
    cursor: not-allowed;
    transform: none;
  }

  /* ── 在线用户面板 ── */
  .online-panel {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 100;
    pointer-events: auto;
    background: rgba(0,0,0,.65);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 10px 12px;
    min-width: 140px;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    display: none;
  }
  .online-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .online-title {
    color: rgba(255,255,255,.6);
    font-size: 11px;
    font-weight: 500;
  }
  .online-count {
    color: #4ade80;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .online-count::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #4ade80;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }
  .online-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 120px;
    overflow-y: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .online-list::-webkit-scrollbar {
    display: none;
  }
  .online-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .online-avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,.15);
  }
  .online-name {
    color: rgba(255,255,255,.7);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* ── 响应式 ── */
  @media (max-width: 920px) {
    .phone { width: calc(100vw - 40px); height: calc((100vw - 40px) * .5); }
  }
  @media (max-height: 500px) {
    .phone { height: calc(100vh - 40px); width: calc((100vh - 40px) * 2); }
  }
  /* ── 手机竖屏：宽度填满，高度按 2:1 比例居中 ── */
  @media (max-width: 768px) and (orientation: portrait) {
    body { background: #000; align-items: flex-start; }
    .phone { width: 100vw; height: calc(100vw * .5); border-radius: 0; padding: 0; box-shadow: none; margin-top: calc((100vh - 100vw * .5) / 2); }
    .phone-screen { border-radius: 0; }
    .scene-title { font-size: 12px; top: 6px; left: 8px; padding: 2px 8px; }
    .mall-spot .label { font-size: 10px; padding: 2px 8px; }
    .next-scene-btn img { width: 28px; }
    .nav-btn img { width: 32px; }
    .origin { width: 40px; height: 40px; }
    .origin-ring { inset: -5px; }
    .origin-name { font-size: 9px; padding: 1px 6px; }
    .reset-role-btn { top: 4px; right: 4px; padding: 2px 6px; font-size: 10px; }
    .user-info-btn { top: 4px; right: 70px; padding: 2px 8px 2px 2px; }

  @media (max-width: 900px) and (orientation: landscape) {

</head>
<body>

<div class="phone" id="phone">
  <button class="reset-role-btn" id="resetRoleBtn" style="display:none" onclick="resetRole()">🔄 重置角色</button>
  <button class="portrait-btn" onclick="window.location.href='mall_portrait.html'">📱 竖屏模式</button>
  <div class="phone-screen">

    <!-- 场景1：元宇宙地图（主入口） -->
    <div class="scene-layer" id="scene1">
      <div class="map-pan" id="mapPan">
        <img id="mapPanImg" src="元宇宙地图.png" alt="元宇宙地图">
      </div>
      <div class="scene-overlay" data-scene="1">
        <div class="scene-title">元宇宙地图</div>
        <!-- 起点 + 热区点位由 JS 渲染 -->
      </div>
    </div>

    <!-- 场景2 -->
    <div class="scene-layer hidden scene-sub" id="scene2">
      <div class="map-pan"><img src="scene1.png" alt="食品区"></div>
      <div class="scene-overlay" data-scene="2">
        <div class="scene-title">食品区</div>
      </div>
    </div>

    <!-- 场景3 -->
    <div class="scene-layer hidden scene-sub" id="scene3">
      <div class="map-pan"><img src="scene3.png" alt="影视区"></div>
      <div class="scene-overlay" data-scene="3">
        <div class="scene-title">影视区</div>
      </div>
    </div>

    <!-- 场景4 -->
    <div class="scene-layer hidden scene-sub" id="scene4">
      <div class="map-pan"><img src="scene2.png" alt="文旅区"></div>
      <div class="scene-overlay" data-scene="4">
        <div class="scene-title">文旅区</div>
      </div>
    </div>

    <!-- 右上角用户信息 -->
    <div class="user-info-btn" id="userInfoBtn" onclick="openEditUser()">
      <img class="u-avatar" id="uAvatar" src="" alt="">
      <span class="u-name" id="uName"></span>
    </div>

    <!-- 在线用户面板 -->
    <div class="online-panel" id="onlinePanel">
      <div class="online-header">
        <span class="online-title">在线用户</span>
        <span class="online-count" id="onlineCount">128</span>
      </div>
      <div class="online-list" id="onlineList">
      </div>
    </div>

    <!-- 角色选择弹窗 -->
    <div class="role-modal-overlay" id="roleModalOverlay">
      <div class="role-modal">
        <button class="role-modal-back" id="roleModalBack" onclick="onBackClick()">←</button>
        <div class="role-modal-title">🎭 选择你的角色</div>
        <div class="role-modal-sub">选择一个形象进入元宇宙商场</div>
        <div class="role-grid" id="roleGrid">
          <!-- 由JS动态生成 -->
        </div>
        <div class="role-name-group">
          <label>你的昵称</label>
          <input class="role-name-input" id="roleNameInput" placeholder="请输入昵称" maxlength="12">
        </div>
        <button class="role-confirm-btn" id="roleConfirmBtn" disabled onclick="confirmRole()">确认进入</button>
      </div>
    </div>

  </div><!-- /phone-screen -->
</div><!-- /phone -->

<script>
// ═══════════════════════════════════════════════════════
// 配置：每个场景的 商场点位 坐标（百分比）
// 如需调整，修改下方百分比即可
// ═══════════════════════════════════════════════════════
const SCENES = {
  1: {
    name: '元宇宙地图',
    origin: { left: 50, top: 50 },
    spots: [
      { x: 32, y: 65, w: 30, h: 30, label: '食品区', toScene: 2 },
      { x: 65, y: 10, w: 30, h: 30, label: '文旅区', toScene: 4 },
      { x: 5, y: 10, w: 30, h: 30, label: '影视区', toScene: 3 },
    ],
    arrows: []
  },
  2: {
    name: '食品区',
    origin: { left: 50, top: 80 },
    spots: [
      { x: 10, y: 30, w: 12, h: 14, label: '妙可蓝多' },
      { x: 20, y: 80, w: 12, h: 14, label: '黄老五食品' },
      { x: 52, y: 40, w: 12, h: 14, label: '五粮液' },
      { x: 85, y: 55, w: 12, h: 14, label: '贵州茅台' },
    ],
    arrows: [
      { to: 4, x: 50, y: 8, rot: 90,  cls: 'top-arrow' },
      { to: 1, x: 50, y: 92, rot: 180, cls: 'bot-arrow' }
    ]
  },
  3: {
    name: '影视区',
    origin: { left: 50, top: 80 },
    spots: [
      { x: 12, y: 25, w: 12, h: 14, label: '魔童哪吒' },
      { x: 45, y: 30, w: 12, h: 14, label: '鬼吹灯' },
      { x: 80, y: 28, w: 12, h: 14, label: '甄嬛传' },
      { x: 12, y: 70, w: 12, h: 14, label: '三体' },
      { x: 75, y: 80, w: 12, h: 14, label: '庆余年' },
    ],
    arrows: [
      { to: 4, x: 50, y: 8, rot: -90, cls: 'top-arrow' },
      { to: 2, x: 50, y: 92, rot: 180, cls: 'bot-arrow' }
    ]
  },
  4: {
    name: '文旅区',
    origin: { left: 50, top: 80 },
    spots: [
      { x: 10, y: 28, w: 12, h: 14, label: '武侯祠' },
      { x: 20, y: 65, w: 12, h: 14, label: '贵州村超' },
      { x: 42, y: 38, w: 14, h: 14, label: '杜甫草堂博物馆'},
      { x: 75, y: 28, w: 12, h: 14, label: '王者荣耀' },
      { x: 75, y: 70, w: 12, h: 14, label: '故宫博物院' },
    ],
    arrows: [
      { to: 3, x: 50, y: 8, rot: 90,  cls: 'top-arrow' },
      { to: 2, x: 50, y: 92, rot: 180, cls: 'bot-arrow' }
    ]
  },
};

let currentScene = 1;

// ═══════════════════════════════════════════════════════
// 角色选择
// ═══════════════════════════════════════════════════════
const ROLE_AVATARS = [
  { src: '李白待机.gif', gender: 'male', name: '李白' },
  { src: '诸葛亮待机.gif', gender: 'male', name: '诸葛亮' },
  { src: '都江堰待机.gif', gender: 'male', name: '都江堰' },
  { src: '娲皇宫待机.gif', gender: 'female', name: '娲皇宫' },
  { src: '安仁古镇待机.gif', gender: 'female', name: '安仁古镇' },
  { src: '李白纪念馆待机.gif', gender: 'female', name: '李白纪念馆' }
];

const males = ROLE_AVATARS.filter(function(r){ return r.gender === 'male'; });
const females = ROLE_AVATARS.filter(function(r){ return r.gender === 'female'; });

let selectedAvatar = '';
let userRole = null;
let isEditingRole = false;

// 读取已保存角色
(function initRole() {
  var saved = localStorage.getItem('metaMallRole');
  if (saved) {
    try { userRole = JSON.parse(saved); } catch(e) { userRole = null; }
  }
  if (userRole && userRole.avatar && userRole.name) {
    // 已有角色，直接进入
    document.getElementById('roleModalOverlay').classList.add('hidden');
    document.getElementById('resetRoleBtn').style.display = 'block';
    updateSceneUI();
  } else {
    // 无角色，显示弹窗，隐藏场景
    showRoleModal();
    document.getElementById('resetRoleBtn').style.display = 'none';
  }
})();

function showRoleModal() {
  document.querySelectorAll('.scene-layer').forEach(function(el) {
    el.classList.add('hidden');
    el.style.display = 'none';
  });
  var overlay = document.getElementById('roleModalOverlay');
  overlay.classList.remove('hidden');
  // 切换返回/关闭按钮
  document.getElementById('roleModalBack').textContent = isEditingRole ? '✕ 关闭' : '← 返回';
  // 生成角色卡片
  var grid = document.getElementById('roleGrid');
  grid.innerHTML = '';
  [[males, '👨 男角色'], [females, '👩 女角色']].forEach(function(group){
    var list = group[0], title = group[1];
    var titleEl = document.createElement('div');
    titleEl.className = 'role-section-title';
    titleEl.textContent = title;
    titleEl.style.gridColumn = '1 / -1';
    grid.appendChild(titleEl);
    list.forEach(function(role) {
      var card = document.createElement('div');
      card.className = 'role-card';
      card.dataset.avatar = role.src;
      card.innerHTML = '<img src="' + role.src + '" alt="' + role.name + '">';
      card.addEventListener('click', function() {
        grid.querySelectorAll('.role-card').forEach(function(c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        selectedAvatar = role.src;
        updateConfirmBtn();
      });
      grid.appendChild(card);
    });
  });
  // 编辑时预选
  if (isEditingRole && userRole) {
    selectedAvatar = userRole.avatar;
    var preCard = grid.querySelector('.role-card[data-avatar="' + userRole.avatar + '"]');
    if (preCard) preCard.classList.add('selected');
  }
  // 预设昵称
  var savedNick = localStorage.getItem('metaMallNick') || 'user2980';
  document.getElementById('roleNameInput').value = isEditingRole && userRole ? userRole.name : savedNick;
  document.getElementById('roleNameInput').oninput = function() { updateConfirmBtn(); };
  if (!isEditingRole) { selectedAvatar = ''; }
  updateConfirmBtn();
}

function onBackClick() {
  if (isEditingRole) {
    closeRoleModal();
  } else {
    window.location.href = 'user-index.html';
  }
}

function closeRoleModal() {
  document.getElementById('roleModalOverlay').classList.add('hidden');
  isEditingRole = false;
  // 恢复所有场景的显示状态，只显示当前场景
  document.querySelectorAll('.scene-layer').forEach(function(el) {
    var sceneId = parseInt(el.id.replace('scene', ''));
    if (sceneId === currentScene) {
      el.style.display = 'block';
      el.style.opacity = '1';
      el.style.transform = 'none';
      el.classList.remove('hidden');
    } else {
      el.style.display = 'none';
      el.classList.add('hidden');
    }
  });
  updateSceneUI();
}

function openEditUser() {
  isEditingRole = true;
  showRoleModal();
}

function resetRole() {
  localStorage.removeItem('metaMallRole');
  localStorage.removeItem('metaMallNick');
  localStorage.removeItem('metaMapExplored');
  userRole = null;
  isEditingRole = false;
  document.getElementById('resetRoleBtn').style.display = 'none';
  document.getElementById('userInfoBtn').style.display = 'none';
  showRoleModal();
}

function updateConfirmBtn() {
  var name = document.getElementById('roleNameInput').value.trim();
  document.getElementById('roleConfirmBtn').disabled = !(selectedAvatar && name);
}

function updateSceneUI() {
  if (!userRole) return;
  document.getElementById('uAvatar').src = userRole.avatar;
  document.getElementById('uName').textContent = userRole.name;
  document.getElementById('userInfoBtn').style.display = 'flex';
  document.getElementById('onlinePanel').style.display = 'block';
}

function confirmRole() {
  var name = document.getElementById('roleNameInput').value.trim();
  if (!selectedAvatar || !name) return;
  userRole = { avatar: selectedAvatar, name: name };
  localStorage.setItem('metaMallRole', JSON.stringify(userRole));
  localStorage.setItem('metaMallNick', name);
  isEditingRole = false;
  document.getElementById('roleModalOverlay').classList.add('hidden');
  document.getElementById('resetRoleBtn').style.display = 'block';
  // 显示场景1，隐藏其余
  [1,2,3,4].forEach(function(id){
    var el = document.getElementById('scene' + id);
    if (id === 1) {
      el.style.display = 'block';
      el.style.opacity = '1';
      el.style.transform = 'none';
      el.classList.remove('hidden');
    } else {
      el.style.display = 'none';
      el.classList.add('hidden');
    }
  });
  // 渲染场景
  [1,2,3,4].forEach(function(id){ renderScene(id); });
  // 显示用户信息
  updateSceneUI();
  initMapDrag();
  var h = window.location.hash;
  if (h === '#2' || h === '#3' || h === '#4') {
    setTimeout(function(){ switchScene(parseInt(h.slice(1))); }, 100);
  }
}

// ═══════════════════════════════════════════════════════
// 渲染场景
// ═══════════════════════════════════════════════════════
function renderScene(sceneId) {
  const data = SCENES[sceneId];
  const container = document.getElementById(`scene${sceneId}`);
  const overlay = container.querySelector('.scene-overlay');

  // 更新标题
  const titleEl = overlay.querySelector('.scene-title');
  if (titleEl) titleEl.textContent = `🏬 ${data.name}`;

  // 清除已有元素（保留 .scene-title）
  overlay.querySelectorAll('.origin, .mall-spot, .nav-btn, .next-scene-btn, .nav-popup')
         .forEach(el => el.remove());

  // ── 起点 ──
  const origin = document.createElement('div');
  origin.className = 'origin';
  origin.style.left = data.origin.left + '%';
  origin.style.top  = data.origin.top + '%';
  origin.style.transform = 'translate(calc(-50% + var(--map-dx,0px)), calc(-50% + var(--map-dy,0px)))';
  var avatarUrl = (userRole && userRole.avatar) ? userRole.avatar : '李白待机.gif';
  var nick = (userRole && userRole.name) ? userRole.name : '';
  var nameTag = nick ? '<span class="origin-name">' + nick + '</span>' : '';
  origin.innerHTML = `
    <div class="origin-ring"></div>
    <div class="origin-ring"></div>
    <div class="origin-ring"></div>
    <div class="origin-dot" style="background-image:url('${avatarUrl}')"></div>
    ${nameTag}
  `;
  overlay.appendChild(origin);

  // ── 商场点位（区域热区） ──
  data.spots.forEach((s, i) => {
    const spot = document.createElement('div');
    spot.className = 'mall-spot';
    spot.dataset.idx = i;
    spot.style.left = (s.x || s.left || 0) + '%';
    spot.style.top  = (s.y || s.top || 0) + '%';
    spot.style.width = (s.w || 10) + '%';
    spot.style.height = (s.h || 12) + '%';
    spot.style.transform = 'translate(var(--map-dx,0px), var(--map-dy,0px))';
    spot.innerHTML = `<div class="label">${s.label}</div>`;
    spot.addEventListener('click', () => {
      if (s.toScene) {
        var origin = document.getElementById('scene' + sceneId).querySelector('.origin');
        if (origin && window._moveTimer) clearTimeout(window._moveTimer);
        window._moveTimer = setTimeout(function(){ switchScene(s.toScene); }, 200);
      } else {
        moveTo(sceneId, i);
      }
    });
    overlay.appendChild(spot);
  });

  // ── 主地图左上角"返回标准商城"按钮（仅场景1） ──
  if (sceneId === 1) {
    const backBtn = document.createElement('div');
    backBtn.className = 'mall-back-btn';
    backBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>标准商城';
    backBtn.addEventListener('click', () => {
      window.location.href = 'user-index.html';
    });
    overlay.appendChild(backBtn);
  }

  // ── 右下角导航按钮：非主地图场景点击回到主地图 ──
  const navBtn = document.createElement('div');
  navBtn.className = 'nav-btn';
  navBtn.title = '回到主地图';
  navBtn.innerHTML = `<img src="daohang.png" alt="回主地图">`;
  navBtn.addEventListener('click', () => {
    if (sceneId !== 1) switchScene(1);
  });
  overlay.appendChild(navBtn);

  // ── 下一场景按钮（箭头图片） ──
  data.arrows.forEach(function(ar){
    const nextBtn = document.createElement('div');
    nextBtn.className = 'next-scene-btn ' + ar.cls;
    nextBtn.style.left = ar.x + '%';
    nextBtn.style.top = ar.y + '%';
    var rotStyle = ar.rot ? 'transform:rotate('+ar.rot+'deg)' : '';
    nextBtn.innerHTML = '<img src="arrow.png" alt="下一场景" style="'+rotStyle+'">';
    nextBtn.addEventListener('click', function(){
      const r = nextBtn.getBoundingClientRect();
      const c = overlay.getBoundingClientRect();
      const ax = ((r.left - c.left + r.width / 2) / c.width) * 100;
      const ay = ((r.top - c.top + r.height / 2) / c.height) * 100;
      const origin = overlay.querySelector('.origin');
      if (origin) {
        if (window._moveTimer) clearTimeout(window._moveTimer);
        origin.style.left = ax + '%';
        origin.style.top = ay + '%';
        window._moveTimer = setTimeout(function(){ switchScene(ar.to); }, 1700);
      } else {
        switchScene(ar.to);
      }
    });
    overlay.appendChild(nextBtn);
  });

}

// ═══════════════════════════════════════════════════════
// 移动光点 → 动画结束后直接跳转
// ═══════════════════════════════════════════════════════
function moveTo(sceneId, spotIdx) {
  const data = SCENES[sceneId];
  const spot = data.spots[spotIdx];
  const container = document.getElementById(`scene${sceneId}`);
  const origin = container.querySelector('.origin');
  if (!origin) return;

  if (window._moveTimer) clearTimeout(window._moveTimer);

  // 人物移动到热区中心
  var cx = (spot.x || spot.left || 0), cy = (spot.y || spot.top || 0);
  origin.style.left = cx + '%';
  origin.style.top  = (cy - 5) + '%';

  // 1.6s 过渡结束后跳转到对应商户空间
  window._moveTimer = setTimeout(() => {
    if (spot.label === '贵州茅台') {
      window.location.href = 'guizhoumaotai.html';
    }
  }, 1700);
}

// ═══════════════════════════════════════════════════════
// 切换场景
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// 主地图拖拽 + 首次回弹动画
// ═══════════════════════════════════════════════════════
let mapDrag = { x: 0, y: 0, startX: 0, startY: 0, px: 0, py: 0, active: false };

function initMapDrag() {
  // 主地图从 metaMapData 加载自定义图片和缩放比例
  var saved = localStorage.getItem('metaMapData');
  var mapScale = 130;
  if (saved) {
    try {
      var data = JSON.parse(saved);
      if (data.image && data.image.indexOf('data:') === 0) {
        var mimg = document.querySelector('#scene1 .map-pan img');
        if (mimg) mimg.src = data.image;
      }
      if (data.scale) mapScale = data.scale;
    } catch(e) {}
  }
  var img1 = document.querySelector('#scene1 .map-pan img');
  if (img1) { img1.style.width = mapScale + '%'; img1.style.height = mapScale + '%'; img1.style.objectFit = 'cover'; }
  var scene1Scale = mapScale / 100;

  function clampDrag(x, y) {
    var s = document.getElementById('scene' + currentScene);
    var pan = s ? s.querySelector('.map-pan') : null;
    if (!pan) return;
    var w = pan.clientWidth, h = pan.clientHeight;
    var isSub = s.classList.contains('scene-sub');
    var scale = isSub ? 1.2 : scene1Scale;
    var mx = Math.max(0, w * (scale - 1) / 2), my = Math.max(0, h * (scale - 1) / 2);
    mapDrag.x = Math.max(-mx, Math.min(mx, x));
    mapDrag.y = Math.max(-my, Math.min(my, y));
  }

  function getCurrentImg() {
    var s = document.getElementById('scene' + currentScene);
    return s ? s.querySelector('.map-pan img') : null;
  }

  function applyDragTransform() {
    var s = document.getElementById('scene' + currentScene);
    if (!s) return;
    var img = s.querySelector('.map-pan img');
    var t = 'translate(calc(-50% + ' + mapDrag.x + 'px), calc(-50% + ' + mapDrag.y + 'px))';
    if (img) img.style.transform = t;
    // 用 CSS 变量控制点位偏移，保留各自基准 transform
    s.style.setProperty('--map-dx', mapDrag.x + 'px');
    s.style.setProperty('--map-dy', mapDrag.y + 'px');
  }

  // 为所有场景绑定 mousedown/touchstart
  [1,2,3,4].forEach(function(id) {
    var pan = document.querySelector('#scene' + id + ' .map-pan');
    if (!pan) return;
    pan.addEventListener('mousedown', function(e) {
      if (currentScene !== id) return;
      mapDrag.active = true;
      mapDrag.startX = e.clientX;
      mapDrag.startY = e.clientY;
      mapDrag.px = mapDrag.x;
      mapDrag.py = mapDrag.y;
      var ci = getCurrentImg();
      if (ci) ci.classList.add('dragging');
    });
    pan.addEventListener('touchstart', function(e) {
      if (currentScene !== id || e.touches.length !== 1) return;
      mapDrag.active = true;
      mapDrag.startX = e.touches[0].clientX;
      mapDrag.startY = e.touches[0].clientY;
      mapDrag.px = mapDrag.x;
      mapDrag.py = mapDrag.y;
      var ci = getCurrentImg();
      if (ci) ci.classList.add('dragging');
    }, { passive: false });
  });

  // 全局 mousemove/mouseup/touchmove/touchend
  window.addEventListener('mousemove', function(e) {
    if (!mapDrag.active) return;
    var dx = e.clientX - mapDrag.startX;
    var dy = e.clientY - mapDrag.startY;
    clampDrag(mapDrag.px + dx, mapDrag.py + dy);
    applyDragTransform();
  });
  window.addEventListener('mouseup', function() {
    if (!mapDrag.active) return;
    mapDrag.active = false;
    var ci = getCurrentImg();
    if (ci) ci.classList.remove('dragging');
  });
  window.addEventListener('touchmove', function(e) {
    if (!mapDrag.active || e.touches.length !== 1) return;
    var dx = e.touches[0].clientX - mapDrag.startX;
    var dy = e.touches[0].clientY - mapDrag.startY;
    clampDrag(mapDrag.px + dx, mapDrag.py + dy);
    applyDragTransform();
  }, { passive: false });
  window.addEventListener('touchend', function() {
    if (!mapDrag.active) return;
    mapDrag.active = false;
    var ci = getCurrentImg();
    if (ci) ci.classList.remove('dragging');
  });

  // 场景1 首次进入弹入动画
  var pan1 = document.querySelector('#scene1 .map-pan');
  var img1 = document.querySelector('#scene1 .map-pan img');
  if (pan1 && img1) {
    setTimeout(function() {
      if (currentScene !== 1) return;
      var explored = localStorage.getItem('metaMapExplored');
      if (explored) return;
      img1.style.transition = 'transform .5s cubic-bezier(.22,.61,.36,1)';
      img1.style.transform = 'translate(calc(-50% + 100px), -50%)';
      var hint = document.createElement('div');
      hint.className = 'drag-hint';
      hint.textContent = '👆 拖动探索地图';
      pan1.appendChild(hint);
      setTimeout(function(){ hint.remove(); }, 3000);
      localStorage.setItem('metaMapExplored', '1');
      setTimeout(function() {
        img1.style.transition = 'transform .7s cubic-bezier(.17,.67,.39,.97)';
        img1.style.transform = 'translate(-50%, -50%)';
        setTimeout(function() {
          img1.style.transition = 'transform .6s cubic-bezier(.25,.46,.45,.94)';
        }, 700);
      }, 500);
    }, 600);
  }
}

function switchScene(targetId) {
  if (targetId === currentScene) return;
  currentScene = targetId;

  // 回到主地图时重置拖拽位置
  if (targetId === 1) {
    mapDrag.x = 0; mapDrag.y = 0;
    var img = document.getElementById('mapPanImg');
    if (img) img.style.transform = 'translate(-50%, -50%)';
  }

  // 只显示目标场景，其他全部隐藏
  [1,2,3,4].forEach(function(id){
    var el = document.getElementById('scene' + id);
    if (id === targetId) {
      el.style.display = 'block';
      el.style.opacity = '1';
      el.style.transform = 'none';
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
      el.style.display = 'none';
    }
  });

  // 渲染目标场景
  renderScene(targetId);
}

// ═══════════════════════════════════════════════════════
// 初始渲染（仅已有角色时；无角色由 confirmRole 触发）
// ═══════════════════════════════════════════════════════
if (userRole) {
  [1,2,3,4].forEach(function(id){
    var el = document.getElementById('scene' + id);
    if (id === 1) {
      el.style.display = 'block';
      el.style.opacity = '1';
      el.style.transform = 'none';
      el.classList.remove('hidden');
    } else {
      el.style.display = 'none';
      el.classList.add('hidden');
    }
  });
  [1, 2, 3, 4].forEach(function(id){ renderScene(id); });
  initMapDrag();
  // URL hash 指定初始场景
  var h = window.location.hash;
  if (h === '#2' || h === '#3' || h === '#4') {
    setTimeout(function(){ switchScene(parseInt(h.slice(1))); }, 100);
  }
}

// ═══════════════════════════════════════════════════════
// 在线用户模拟
// ═══════════════════════════════════════════════════════
const ONLINE_USER_AVATARS = [
  '李白待机.gif', '诸葛亮待机.gif', '都江堰待机.gif',
  '娲皇宫待机.gif', '安仁古镇待机.gif', '李白纪念馆待机.gif'
];
const ONLINE_USER_NAMES = [
  '逍遥客', '云中君', '清风明月', '梦里水乡', '星河漫步',
  '红尘过客', '竹林听雨', '墨染青衣', '清风徐来', '花开半夏',
  '岁月如歌', '烟雨江南', '繁星点点', '清风拂面', '月色朦胧',
  '春暖花开', '清风入袖', '梦里花落', '云淡风轻', '清风霁月'
];

let onlineUsers = [];
let onlineCount = 128;

function generateOnlineUsers() {
  onlineUsers = [];
  const count = Math.min(onlineCount, 20);
  for (let i = 0; i < count; i++) {
    onlineUsers.push({
      id: i,
      avatar: ONLINE_USER_AVATARS[Math.floor(Math.random() * ONLINE_USER_AVATARS.length)],
      name: ONLINE_USER_NAMES[Math.floor(Math.random() * ONLINE_USER_NAMES.length)] + Math.floor(Math.random() * 100)
    });
  }
}

function renderOnlinePanel() {
  const listEl = document.getElementById('onlineList');
  const countEl = document.getElementById('onlineCount');
  
  countEl.textContent = onlineCount;
  
  listEl.innerHTML = onlineUsers.map(user => `
    <div class="online-item">
      <img class="online-avatar" src="${user.avatar}" alt="${user.name}">
      <span class="online-name">${user.name}</span>
    </div>
  `).join('');
}

function updateOnlineCount() {
  const change = Math.floor(Math.random() * 5) - 2;
  onlineCount = Math.max(50, Math.min(200, onlineCount + change));
  generateOnlineUsers();
  renderOnlinePanel();
}

(function initOnlineUsers() {
  generateOnlineUsers();
  renderOnlinePanel();
  setInterval(updateOnlineCount, 2000 + Math.random() * 2000);
})();
</script>
