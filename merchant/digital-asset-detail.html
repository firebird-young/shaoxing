function calcBenefitStatus(bf){
  var now = Date.now();

  var total = bf.total || 1;

  if(now > exp && used < total) return 'expired';
  if(now < eff) return 'pending';
  if(used > 0 && used < total) return 'partial';
  return 'unused';
}

  var hasPartial = false, hasDone = false, hasEnding = false, hasExpired = false;

    if(s === 'pending' || s === 'unused' || s === 'partial') hasEnding = true;

  { id:'QSS-C03', name:'曲水流觞', spec:'优享版', img:'../asset/优享版.png', number:'#QSS-0003', phone:'13443214321', holderAddr:'0x1a6d...7d3a', chainAddr:'0x82a595e8c7d3b479ce9af9b797cbc9224656ec4d', saleStatus:'sold',
    bf:[
      { n:'研学课程', type:'ticket', eff:'2024-01-01', exp:'2025-03-31', total:1, used:0, desc:'书法研学课程（已过期）',
        slots:[{u:false,t:''}] },
      { n:'景区VIP通行权', type:'identity', eff:'2024-01-01', exp:'2025-12-31', total:999, used:5, desc:'全景区通票（已过期权益）', usedTimes:['2024-02-10 08:30:00','2024-04-15 10:00:00','2024-06-20 14:30:00','2024-08-05 09:15:00','2024-10-01 11:45:00'] },
      { n:'跨城特权', type:'identity', eff:'2024-01-01', exp:'2025-06-30', total:10, used:2, desc:'绍兴、杭州、上海三地优先入场', usedTimes:['2024-03-05 09:30:00','2024-07-12 14:00:00'] }
    ] }
];

var saleMap = { sold:'已售出', unsold:'未售出' };
var saleCls = { sold:'tag-sold', unsold:'tag-unsold' };

/* ── 渲染列表 ── */
function renderList(list) {
  var body = document.getElementById('listBody');
  var empty = document.getElementById('emptyState');
  if (list.length === 0) { body.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  body.innerHTML = list.map(function(a) {
    var pStatus = calcPackageStatus(a.bf);
    var pm = P_STA[pStatus] || P_STA.unused;
    return '<tr>' +
      '<td><img class="asset-thumb" src="' + a.img + '" alt=""></td>' +
      '<td style="font-weight:600">' + a.name + '</td>' +
      '<td style="color:#666">' + a.spec + '</td>' +
      '<td style="font-size:11px;color:#999;font-family:monospace">' + a.number + '</td>' +
      '<td>' + a.phone + '</td>' +
      '<td><a class="on-chain-link" href="' + EXPLORER_URL + '&token_id=' + (Math.floor(Math.random()*50)+1) + '" target="_blank" title="查看链上记录">' + a.chainAddr.substring(0,10) + '...</a></td>' +
      '<td><span class="tag ' + saleCls[a.saleStatus] + '">' + saleMap[a.saleStatus] + '</span></td>' +
      '<td><span class="tag ' + pm.c + '">' + pm.t + '</span></td>' +
      '<td><button class="search-btn" style="padding:4px 10px;font-size:11px" onclick="showDetail(\'' + a.id + '\')">详情</button></td>' +
      '</tr>';
  }).join('');
}

function applyFilter() {
  var name = document.getElementById('sName').value.trim().toLowerCase();
  var spec = document.getElementById('sSpec').value.trim().toLowerCase();
  var number = document.getElementById('sNumber').value.trim().toLowerCase();
  var list = assets.filter(function(a) {
    if (name && a.name.toLowerCase().indexOf(name) < 0) return false;
    if (spec && a.spec.toLowerCase().indexOf(spec) < 0) return false;
    if (number && a.number.toLowerCase().indexOf(number) < 0) return false;
    return true;
  });
  renderList(list);
}

/* ── 详情弹窗 ── */
function showDetail(id) {
  var a = assets.find(function(x) { return x.id === id; });
  if (!a) return;
  var pStatus = calcPackageStatus(a.bf);
  var pm = P_STA[pStatus] || P_STA.unused;

  var h = '';
  h += '<div class="detail-section">';
  h += '<div class="detail-section-title">基本信息</div>';
  h += '<div style="display:flex;gap:12px;margin-bottom:12px">';
  h += '<img src="' + a.img + '" style="width:60px;height:74px;border-radius:8px;object-fit:cover;background:#f5f5f7">';
  h += '<div><div style="font-size:15px;font-weight:600;margin-bottom:4px">' + a.name + '</div><div style="font-size:12px;color:#666">' + a.spec + '</div></div>';
  h += '</div>';
  h += '<div class="detail-row"><span class="detail-label">编号</span><span class="detail-value">' + a.number + '</span></div>';
  h += '<div class="detail-row"><span class="detail-label">当前持有人</span><span class="detail-value">' + a.phone + '</span></div>';
  h += '<div class="detail-row"><span class="detail-label">持有人地址</span><span class="detail-value" style="font-family:monospace;font-size:12px">' + a.holderAddr + '</span></div>';
  h += '<div class="detail-row"><span class="detail-label">链上地址</span><span class="detail-value"><a class="chain-link" href="' + EXPLORER_URL + '&token_id=' + (Math.floor(Math.random()*50)+1) + '" target="_blank">' + a.chainAddr + '</a></span></div>';
  h += '<div class="detail-row"><span class="detail-label">销售状态</span><span class="detail-value"><span class="tag ' + saleCls[a.saleStatus] + '">' + saleMap[a.saleStatus] + '</span></span></div>';
  h += '<div class="detail-row"><span class="detail-label">权益包状态</span><span class="detail-value"><span class="tag ' + pm.c + '">' + pm.t + '</span></span></div>';
  h += '</div>';

  h += '<div class="detail-section">';
  h += '<div class="detail-section-title">权益详情</div>';
  if (a.bf && a.bf.length) {
    h += '<div style="background:#f5f7fa;border-radius:10px;padding:10px">';
    a.bf.forEach(function(b) {
      var s = calcBenefitStatus(b);
      var st = B_STA[s] || B_STA.unused;
      var extra = '';
      var detailHtml = '';
      if(b.type === 'ticket') {
        extra = '已用'+b.used+'/'+b.total+'次';
        if(b.slots){
          var usedSlots = b.slots.filter(function(sl){ return sl.u && sl.t; });
          if(usedSlots.length > 0){
            detailHtml += '<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #ddd">';
            detailHtml += '<div style="font-size:11px;font-weight:500;color:#666;margin-bottom:4px">使用时间</div>';
            usedSlots.forEach(function(sl){
              detailHtml += '<div style="font-size:11px;color:#888;padding:2px 4px 2px 14px;position:relative">• <span style="color:#666">'+sl.t+'</span></div>';
            });
            detailHtml += '</div>';
          }
        }
      }
      else if(b.type === 'identity' && b.used > 0) extra = '已使用'+b.used+'次';
      else if(b.type === 'physical') {
        extra = '';
        if(b.used > 0 && b.ship){
          detailHtml += '<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #ddd">';
          detailHtml += '<div style="font-size:11px;font-weight:500;color:#666;margin-bottom:2px">发货信息</div>';
          detailHtml += '<div style="font-size:11px;color:#888;padding:2px 0">快递单号：'+(b.ship.expNo||'--')+' ('+(b.ship.exp||'')+')</div>';
          detailHtml += '<div style="font-size:11px;color:#888;padding:2px 0">收件人：'+b.ship.name+' '+b.ship.phone+'</div>';
          detailHtml += '<div style="font-size:11px;color:#888;padding:2px 0">收货地址：'+b.ship.addr+'</div>';
          detailHtml += '</div>';
        }
      }
      h += '<div class="benefit-item" style="flex-wrap:wrap;padding:12px 14px;margin-bottom:10px;border-radius:8px;background:#fff;border:1px solid #eee">';
      h += '<div style="width:100%;display:flex;align-items:center;gap:8px;margin-bottom:6px">';
      h += '<span style="font-size:13px;font-weight:600;color:#333;flex:1">' + b.n + '</span>';
      if(extra) {
        var isIdentity = b.type === 'identity' && b.used > 0;
        var timesStr = isIdentity && b.usedTimes ? encodeURIComponent(JSON.stringify(b.usedTimes)) : '';
        h += '<span style="font-size:11px;color:#999;cursor:'+(isIdentity?'pointer':'default')+';text-decoration:'+(isIdentity?'underline dashed':'none')+';text-underline-offset:2px" '+
          (isIdentity ? 'onclick="event.stopPropagation();showUseTimes(\''+b.n+'\','+b.used+',\''+timesStr+'\')" title="点击查看使用详情"' : '')+'>' + extra + '</span>';
      }
      h += '<span class="benefit-status tag ' + st[1] + '" style="flex-shrink:0">' + st[0] + '</span>';
      h += '</div>';
      h += '<div style="width:100%;font-size:11px;color:#3F8B6D;font-weight:500;margin-bottom:6px;padding:4px 0">📅 有效期 ' + b.eff + ' ~ ' + b.exp + '</div>';
      if(b.desc) h += '<div style="width:100%;font-size:11px;color:#888;margin-bottom:6px;padding:4px 8px;background:#f5f7fa;border-radius:4px">'+b.desc+'</div>';
      h += detailHtml;
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<div style="padding:12px 0;font-size:13px;color:#999;text-align:center">暂无权益信息</div>';
  }
  h += '</div>';

  document.getElementById('detailBody').innerHTML = h;
  document.getElementById('detailModal').classList.add('show');
}

function showUseTimes(name, count, timesEncoded){
  document.getElementById('useTimeTitle').textContent = '使用详情 - '+name;
  var body = document.getElementById('useTimeBody');
  var times = [];
  try { if(timesEncoded) times = JSON.parse(decodeURIComponent(timesEncoded)); } catch(e){}
  var h = '<div style="padding:4px 0">';
  h += '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f0f0f0">';
  h += '<span style="font-size:28px;font-weight:700;color:#3F8B6D">'+count+'</span>';
  h += '<span style="font-size:13px;color:#666">次使用记录</span>';
  h += '</div>';
  if(times.length > 0){
    times.forEach(function(t, i){
      var num = (i+1).toString().padStart(2,'0');
      h += '<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;margin-bottom:4px;background:'+(i%2===0?'#f9f9f9':'#fff')+';border-radius:6px">';
      h += '<span style="font-size:11px;color:#bbb;font-family:monospace;min-width:20px">#'+num+'</span>';
      h += '<span style="font-size:12px;color:#555">'+t+'</span>';
      h += '</div>';
    });
  } else {
    h += '<div style="padding:12px;background:#f5f7fa;border-radius:8px;font-size:12px;color:#888;text-align:center">暂无详细使用时间记录</div>';
  }
  h += '</div>';
  body.innerHTML = h;
  document.getElementById('useTimeModal').classList.add('show');
}
renderList(assets);
</script>
</body>
</html>
