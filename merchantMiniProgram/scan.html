<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>扫码核销 - 商家客户端</title>
<style>
:root{--accent:#3F8B6D;--accent-contrast:#fff;--bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;--border:#e0e0e0;--page-bg:#F0F0F0;--radius-sm:7px;--radius-card:7px;--radius-pill:9999px;--font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;--font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 12px}
.top-bar-left{display:flex;align-items:center;gap:10px}
.merchant-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4)}
.merchant-name{font-size:14px;font-weight:600;color:#fff}
.top-bar-right{display:flex;gap:12px}

/* ── 全局目录按钮 ── */
.global-dir-btn{position:fixed;top:12px;right:12px;z-index:9999;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.75);transition:all .2s}
.global-dir-btn:hover{background:rgba(0,0,0,.6);color:#fff}
.global-dir-btn svg{width:16px;height:16px;display:block}

/* ── 用户卡片 ── */
.user-card{background:var(--bg);border-radius:var(--radius-card);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.04);display:flex;align-items:center;gap:12px}
.user-avatar-wrap{position:relative;width:42px;height:42px;flex-shrink:0}
.user-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);display:block}
.user-avatar-status{position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-radius:50%;background:#52c41a;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center}
.user-avatar-status svg{width:7px;height:7px;color:#fff;display:block}
.user-info{flex:1;min-width:0}
.user-greeting{font-size:13px;color:var(--ink-muted);margin-bottom:1px}
.user-greeting strong{font-size:15px;font-weight:700;color:var(--ink)}
.user-meta{font-size:11px;color:var(--ink-subtle);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.user-meta .divider{width:3px;height:3px;border-radius:50%;background:var(--ink-subtle);display:inline-block;opacity:.4}
.user-tag{font-size:10px;padding:2px 10px;border-radius:var(--radius-pill);font-weight:500;flex-shrink:0;background:rgba(63,139,109,.1);color:var(--accent);border:1px solid rgba(63,139,109,.15)}



/* ── 扫码区 ── */
.scan-area{background:var(--bg);border-radius:var(--radius-card);padding:20px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04);margin-bottom:12px;position:relative;overflow:hidden}
.scan-area::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(63,139,109,.06) 0%,transparent 70%)}
.scan-btn-wrap{position:relative;width:80px;height:80px;margin:0 auto 10px}
.scan-btn{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#3F8B6D,#2d6b53);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(63,139,109,.35);transition:transform .15s,box-shadow .15s;position:absolute;top:4px;left:4px}
.scan-btn:active{transform:scale(.88);box-shadow:0 2px 10px rgba(63,139,109,.25)}
.scan-btn svg{width:32px;height:32px;color:#fff;display:block}
.scan-ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(63,139,109,.12);animation:scanRing 2.5s ease-in-out infinite}
.scan-ring:nth-child(2){animation-delay:.8s}
.scan-ring:nth-child(3){animation-delay:1.6s}
@keyframes scanRing{0%{transform:scale(.85);opacity:1}100%{transform:scale(1.35);opacity:0}}
.scan-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px;letter-spacing:.5px}
.scan-desc{font-size:12px;color:var(--ink-subtle);margin-bottom:4px}
.scan-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;border-radius:var(--radius-pill);font-size:10px;font-weight:500;background:rgba(63,139,109,.08);color:var(--accent);margin-bottom:6px}
.scan-badge svg{width:10px;height:10px;display:block}
.scan-tip{font-size:11px;color:var(--ink-subtle);padding:6px 12px;background:var(--page-bg);border-radius:6px;display:flex;align-items:center;gap:6px;justify-content:center}
.scan-fail-link{font-size:10px;color:var(--ink-subtle);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;padding:4px;transition:color .2s;border:none;background:none;width:100%}
.scan-fail-link:hover{color:#e74c3c}
.scan-fail-link svg{width:11px;height:11px;display:block}

/* ── 今日统计 ── */
.stats-row{display:flex;gap:8px;margin-bottom:10px}
.stat-card{flex:1;background:var(--bg);border-radius:var(--radius-card);padding:10px 8px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card:nth-child(1)::after{background:linear-gradient(90deg,#3F8B6D,#5caF8a)}
.stat-card:nth-child(2)::after{background:linear-gradient(90deg,#667eea,#8A5CFF)}
.stat-card:nth-child(3)::after{background:linear-gradient(90deg,#f5a623,#f08a24)}
.stat-num{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:1px}
.stat-label{font-size:10px;color:var(--ink-subtle)}

/* ── 最近核销 ── */
.recent-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.recent-title span{font-size:13px;font-weight:600;color:var(--ink)}
.recent-title a{font-size:10px;color:var(--accent);text-decoration:none;cursor:pointer}
.recent-list{display:flex;flex-direction:column;gap:6px}
.recent-item{background:var(--bg);border-radius:var(--radius-card);padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.03);cursor:pointer;transition:background .12s}
.recent-item:active{background:var(--page-bg)}
.ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ri-dot.green{background:var(--accent)}
.ri-dot.purple{background:#8A5CFF}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:1px}
.ri-meta{font-size:10px;color:var(--ink-subtle);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ri-meta .dot{width:2px;height:2px;border-radius:50%;background:var(--ink-subtle);display:inline-block}
.ri-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--radius-pill);flex-shrink:0;background:rgba(63,139,109,.08);color:var(--accent)}



/* ── 底部导航 ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100;box-sizing:border-box}
.bnav .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:4px 10px;font-size:10px;color:var(--ink-subtle);transition:color .2s}
.bnav .ni .ico{width:22px;height:22px;transition:transform .15s}
.bnav .ni .ico svg{display:block;width:100%;height:100%}
.bnav .ni:active .ico{transform:scale(.8)}
.bnav .ni.on{color:var(--accent)}
.bnav .ni span:last-child{font-size:10px;display:block}

/* ── 浮层通用 ── */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s}
.modal-mask.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--bg);border-radius:16px;width:100%;max-width:380px;padding:32px 24px 20px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── 成功浮层 ── */
.modal-icon{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.modal-icon svg{width:30px;height:30px;display:block}
.modal-icon.success{background:rgba(63,139,109,.12)}
.modal-icon.success svg{color:var(--accent);animation:pulse 1s ease-in-out}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
.modal-icon.fail{background:rgba(231,76,60,.12)}
.modal-icon.fail svg{color:#e74c3c;animation:shake .5s ease-in-out}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:2px}
.modal-title.success{color:var(--accent)}
.modal-title.fail{color:#e74c3c}
.modal-sub{font-size:12px;color:var(--ink-subtle);margin-bottom:16px}

/* ── 浮层信息行 ── */
.modal-info{background:var(--page-bg);border-radius:10px;padding:12px 14px;margin-bottom:16px;text-align:left}
.modal-info .mi-row{display:flex;padding:5px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,.04)}
.modal-info .mi-row:last-child{border-bottom:none}
.modal-info .mi-label{color:var(--ink-subtle);width:60px;flex-shrink:0}
.modal-info .mi-value{color:var(--ink);flex:1;min-width:0;word-break:break-all}
.modal-info .mi-tag{display:inline-flex;padding:2px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:600}
.modal-info .mi-tag.identity{background:rgba(63,139,109,.1);color:var(--accent)}
.modal-info .mi-tag.ticket{background:rgba(206,147,216,.12);color:#8A5CFF}

/* ── 浮层按钮 ── */
.modal-btn{width:100%;height:44px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
.modal-btn:active{opacity:.85}
.modal-btn.primary{background:var(--accent);color:#fff}
.modal-btn.danger{background:#e74c3c;color:#fff}
.modal-btn.outline{background:transparent;color:var(--ink-muted);border:1px solid var(--border);font-weight:500}
.modal-btn.outline:active{background:var(--page-bg)}
.modal-btn svg{width:16px;height:16px;display:block}

/* ── 失败场景下拉 ── */
.fail-dropdown{width:100%;margin-bottom:12px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.fail-dropdown-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;font-size:12px;color:var(--ink-muted);background:var(--page-bg);transition:background .15s;border:none;width:100%;text-align:left}
.fail-dropdown-header:active{background:#e5e5e5}
.fail-dropdown-header .arrow{width:14px;height:14px;transition:transform .25s;color:var(--ink-subtle);display:block}
.fail-dropdown-header .arrow.open{transform:rotate(180deg)}
.fail-dropdown-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.fail-dropdown-body.open{max-height:500px}
.fail-scenario-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;border-top:1px solid var(--page-bg)}
.fail-scenario-item:active{background:var(--page-bg)}
.fail-scenario-item .fs-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#ddd}
.fail-scenario-item .fs-dot.on{background:#e74c3c}
.fail-scenario-item .fs-name{flex:1;font-size:12px;color:var(--ink-muted)}
.fail-scenario-item .fs-name.on{color:var(--ink);font-weight:600}
.fail-scenario-item .fs-check{width:16px;height:16px;flex-shrink:0;color:var(--accent);display:none}
.fail-scenario-item .fs-check.show{display:block}
</style>
</head>
<body>
<div class="page">

<!-- 顶部 -->
<div class="top-bar">
  <div class="top-bar-left">
    <img class="merchant-logo" src="../asset/绍兴兰亭logo.png" alt="logo" onerror="this.style.display='none'">
    <div>
      <div class="merchant-name">绍兴兰亭产业数资</div>
    </div>
  </div>
  <div class="top-bar-right"></div>
</div>

<!-- 用户卡片 -->
<div class="user-card">
  <div class="user-avatar-wrap">
    <img class="user-avatar" id="welcomeAvatar" src="../asset/绍兴兰亭logo.png" alt="" onerror="this.style.display='none'">
    <div class="user-avatar-status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
  <div class="user-info">
    <div class="user-greeting" id="greetingText" onclick="goLogin()" style="cursor:pointer">
      <strong id="operatorName">-</strong>，欢迎回来
    </div>
    <div class="user-meta">
      <span id="loginTime">今天 08:30</span>
      <span class="divider"></span>
      <span style="color:var(--accent);font-weight:500">在线</span>
    </div>
  </div>
  <span class="user-tag">已登录</span>
</div>

<!-- 扫码区 -->
<div class="scan-area">
  <div class="scan-btn-wrap">
    <div class="scan-ring"></div>
    <div class="scan-ring"></div>
    <div class="scan-ring"></div>
    <button class="scan-btn" onclick="simulateScan()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    </button>
  </div>
  <div class="scan-title">扫码核销</div>
  <div class="scan-desc">扫描用户出示的二维码核销权益</div>
  <div class="scan-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    支持身份权益 · 次数权益
  </div>
  <div class="scan-tip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    点击上方按钮模拟核销
  </div>
  <button class="scan-fail-link" onclick="simulateFail()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    模拟扫码失败场景
  </button>
</div>

<!-- 今日统计 -->
<div class="stats-row">
  <div class="stat-card"><div class="stat-num">23</div><div class="stat-label">今日核销</div></div>
  <div class="stat-card"><div class="stat-num">12</div><div class="stat-label">身份权益</div></div>
  <div class="stat-card"><div class="stat-num">8</div><div class="stat-label">门票核销</div></div>
</div>

<!-- 最近核销 -->
<div class="recent-title">
  <span>最近核销</span>
  <a onclick="location.href='history.html'">查看全部 ›</a>
</div>
<div class="recent-list">
  <div class="recent-item" onclick="simulateScan()">
    <span class="ri-dot green"></span>
    <div class="ri-info">
      <div class="ri-name">景区VIP通行权</div>
      <div class="ri-meta">10分钟前 <span class="dot"></span> 138****5678</div>
    </div>
    <span class="ri-tag">已核销</span>
  </div>
  <div class="recent-item" onclick="simulateScan()">
    <span class="ri-dot purple"></span>
    <div class="ri-info">
      <div class="ri-name">研学课程 · 第2次</div>
      <div class="ri-meta">35分钟前 <span class="dot"></span> 139****1234</div>
    </div>
    <span class="ri-tag">已核销</span>
  </div>
  <div class="recent-item" onclick="simulateScan()">
    <span class="ri-dot green"></span>
    <div class="ri-info">
      <div class="ri-name">跨城特权</div>
      <div class="ri-meta">1小时前 <span class="dot"></span> 137****9012</div>
    </div>
    <span class="ri-tag">已核销</span>
  </div>
  <div class="recent-item" onclick="simulateScan()">
    <span class="ri-dot purple"></span>
    <div class="ri-info">
      <div class="ri-name">研学课程 · 第1次</div>
      <div class="ri-meta">2小时前 <span class="dot"></span> 139****1234</div>
    </div>
    <span class="ri-tag">已核销</span>
  </div>
  <div class="recent-item" onclick="simulateScan()">
    <span class="ri-dot green"></span>
    <div class="ri-info">
      <div class="ri-name">景区VIP通行权</div>
      <div class="ri-meta">3小时前 <span class="dot"></span> 135****4321</div>
    </div>
    <span class="ri-tag">已核销</span>
  </div>
</div>

</div>

<!-- 全局目录按钮（页面右上角，手机框外面） -->
<button class="global-dir-btn" onclick="location.href='../index.html'" title="返回目录">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
</button>

<!-- 底部导航 -->
<div class="bnav">
  <button class="ni on">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span>首页</span>
  </button>
  <button class="ni" onclick="location.href='history.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
    <span>记录</span>
  </button>
  <button class="ni" onclick="location.href='profile.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span>我的</span>
  </button>
</div>

<!-- ====== 核销成功浮层 ====== -->
<div class="modal-mask" id="successModal">
  <div class="modal-box">
    <div class="modal-icon success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <div class="modal-title success">核销成功</div>
    <div class="modal-sub">权益已成功核销</div>
    <div class="modal-info" id="successInfo"></div>
    <button class="modal-btn primary" onclick="closeSuccess()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      我知道了
    </button>
    <button class="modal-btn outline" onclick="closeSuccess();location.href='history.html'">查看核销记录</button>
  </div>
</div>

<!-- ====== 核销失败浮层 ====== -->
<div class="modal-mask" id="failModal">
  <div class="modal-box">
    <div class="modal-icon fail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <div class="modal-title fail" id="failTitle">核销失败</div>
    <div class="modal-sub" id="failReason">-</div>
    <!-- 场景下拉 -->
    <div class="fail-dropdown">
      <button class="fail-dropdown-header" id="failDropdownBtn" onclick="toggleFailDropdown()">
        <span>所有失败场景</span>
        <svg class="arrow" id="failDropdownArrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="fail-dropdown-body" id="failDropdownBody"></div>
    </div>
    <button class="modal-btn danger" onclick="closeFail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      关闭
    </button>
  </div>
</div>

<script>
// ── 写死登录账号 ──
var DEMO_MERCHANT = { name:'绍兴兰亭', account:'admin', password:'888888' };

// ── 加载登录账号信息 ──
(function(){
  var login = JSON.parse(localStorage.getItem('merchantLogin') || '{}');
  if(!login.account){
    document.getElementById('greetingText').textContent = '未登录，点击登录';
    document.getElementById('loginTime').textContent = '';
    return;
  }
  document.getElementById('operatorName').textContent = login.account;
  // 同步头像
  var savedAvatar = localStorage.getItem('merchantAvatar');
  if(savedAvatar) document.getElementById('welcomeAvatar').src = savedAvatar;
  var now = new Date();
  var h = now.getHours().toString().padStart(2,'0');
  var mi = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('loginTime').textContent = '今天 '+h+':'+mi;
})();

function goLogin(){
  location.href = 'login.html';
}

function simulateScan(){
  var data = {
    user: 'U20240001',
    name: '兰亭泼墨人',
    type: 'identity',
    label: '身份权益',
    assetName: '兰亭雅集',
    assetSpec: '优享版',
    assetNo: '#0001',
    title: '景区VIP通行权',
    desc: '鹅池碑、御碑亭、曲水流觞、兰亭江',
    time: '2026-07-13 17:26',
    code: '28294756',
    operator: 'admin'
  };
  showSuccess(data);
}

function showSuccess(d){
  var typeMap = { identity:['身份权益','identity'], ticket:['次数权益','ticket'] };
  var tp = typeMap[d.type] || typeMap.identity;
  var h = '';
  h += '<div class="mi-row"><span class="mi-label">用户</span><span class="mi-value">'+d.name+' ('+d.user+')</span></div>';
  h += '<div class="mi-row"><span class="mi-label">数字资产</span><span class="mi-value">'+d.assetName+(d.assetSpec?' · '+d.assetSpec:'')+' <span style="font-family:monospace;color:#999">'+d.assetNo+'</span></span></div>';
  h += '<div class="mi-row"><span class="mi-label">权益</span><span class="mi-value">'+d.title+'</span></div>';
  h += '<div class="mi-row"><span class="mi-label">类型</span><span class="mi-value"><span class="mi-tag '+tp[1]+'">'+tp[0]+'</span></span></div>';
  h += '<div class="mi-row"><span class="mi-label">核销编号</span><span class="mi-value" style="font-family:monospace;font-size:11px;color:#999">'+d.code+'</span></div>';
  h += '<div class="mi-row"><span class="mi-label">操作员</span><span class="mi-value">'+(d.operator||'-')+'</span></div>';
  document.getElementById('successInfo').innerHTML = h;
  document.getElementById('successModal').classList.add('show');
}
function closeSuccess(){document.getElementById('successModal').classList.remove('show');}

// ── 扫码失败场景 ──
var failScenarios = [
  { title:'二维码已过期', desc:'该二维码已超过有效期，请用户刷新后重新出示' },
  { title:'二维码无效', desc:'无法识别该二维码，请确认是绍兴数资平台的核销码' },
  { title:'权益已被核销', desc:'该权益已完成核销，不可重复使用' },
  { title:'权益已失效', desc:'该权益已超过有效期，无法核销' },
  { title:'用户身份不匹配', desc:'该二维码与当前商家无关联，无权核销' },
  { title:'网络连接失败', desc:'无法连接到服务器，请检查网络后重试' }
];
var failSuggestions = {
  '二维码已过期':'请用户重新打开数字资产页面生成新的核销二维码',
  '二维码无效':'请确认二维码来源，仅支持绍兴数资平台生成的核销码',
  '权益已被核销':'该权益已被使用，如有疑问请联系客服',
  '权益已失效':'该权益已超过有效期，无法核销使用',
  '用户身份不匹配':'请确认用户持有的资产属于当前商家发行的产品',
  '网络连接失败':'请检查设备网络连接，稍后重试'
};

function simulateFail(){
  var idx = Math.floor(Math.random() * failScenarios.length);
  showFail(idx);
}

var failCurrentIdx = 0;

function showFail(idx){
  failCurrentIdx = idx;
  var sc = failScenarios[idx];
  document.getElementById('failTitle').textContent = sc.title;
  document.getElementById('failReason').textContent = sc.desc;
  renderFailDropdown(idx);
  document.getElementById('failModal').classList.add('show');
  document.getElementById('failDropdownBody').classList.remove('open');
  document.getElementById('failDropdownArrow').classList.remove('open');
}

function renderFailDropdown(activeIdx){
  var body = document.getElementById('failDropdownBody');
  var h = '';
  failScenarios.forEach(function(sc, i){
    var isOn = i === activeIdx;
    h +=
      '<div class="fail-scenario-item" onclick="switchFailScenario('+i+')">'+
        '<span class="fs-dot'+(isOn?' on':'')+'"></span>'+
        '<span class="fs-name'+(isOn?' on':'')+'">'+sc.title+'</span>'+
        '<svg class="fs-check'+(isOn?' show':'')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'+
      '</div>';
  });
  body.innerHTML = h;
}

function switchFailScenario(idx){
  failCurrentIdx = idx;
  var sc = failScenarios[idx];
  document.getElementById('failTitle').textContent = sc.title;
  document.getElementById('failReason').textContent = sc.desc;
  renderFailDropdown(idx);
  closeFailDropdown();
}

function toggleFailDropdown(){
  var body = document.getElementById('failDropdownBody');
  var arrow = document.getElementById('failDropdownArrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function closeFailDropdown(){
  document.getElementById('failDropdownBody').classList.remove('open');
  document.getElementById('failDropdownArrow').classList.remove('open');
}

function closeFail(){
  closeFailDropdown();
  document.getElementById('failModal').classList.remove('show');
}
</script>
</body>
</html>
