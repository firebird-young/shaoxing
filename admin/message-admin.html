<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>消息管理 - 元宇宙商城后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

    .header { background: linear-gradient(135deg, #D70C1F, #F12B3D); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-user { font-size: 14px; }

    .main-container { display: flex; min-height: calc(100vh - 60px); }
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
    .sidebar-group-title { padding: 8px 24px; font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-item { padding: 10px 24px 10px 48px; font-size: 14px; color: #666; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 8px; }
    .sidebar-item:hover { background: #f5f5f5; color: #D70C1F; }
    .sidebar-item.active { background: rgba(215,12,31,.1); color: #D70C1F; font-weight: 600; }
    .sidebar-item svg { width: 14px; height: 14px; }

    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .content-title { font-size: 20px; font-weight: 700; color: #1a1a2e; }

    .card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .btn { padding: 8px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #D70C1F; color: #fff; }
    .btn-primary:hover { opacity: .9; }
    .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
    .btn-outline { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-outline:hover { background: #f5f5f5; }
    .btn-danger { background: #fff5f5; color: #e74c3c; border: 1px solid #ffcccc; }
    .btn-danger:hover { background: #ffeaea; }
    .btn-success { background: rgba(7,193,96,.1); color: #07c160; border: 1px solid rgba(7,193,96,.3); }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; font-size: 13px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; cursor: pointer; }
    .filter-btn.active { background: #D70C1F; color: #fff; border-color: #D70C1F; }

    .msg-list { display: flex; flex-direction: column; gap: 10px; }
    .msg-item { display: flex; gap: 14px; padding: 14px 16px; background: #fafafa; border-radius: 12px; align-items: center; }
    .msg-item:hover { background: #f5f5f5; }
    .msg-info { flex: 1; min-width: 0; }
    .msg-title { font-size: 15px; font-weight: 600; color: #1a1a2e; }
    .msg-meta { font-size: 12px; color: #999; margin-top: 4px; display: flex; gap: 12px; align-items: center; }
    .msg-type-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .msg-type-tag.platform { background: #E8F5E9; color: #2e7d32; }
    .msg-type-tag.activity { background: #FFF3E0; color: #e65100; }
    .msg-status-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .msg-status-tag.sent { background: #f6ffed; color: #52c41a; }
    .msg-status-tag.scheduled { background: #e6f7ff; color: #1890ff; }
    .msg-status-tag.draft { background: #f5f5f5; color: #999; }
    .msg-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
    .form-input:focus { border-color: #D70C1F; }
    .form-select { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
    .form-textarea { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; min-height: 120px; resize: vertical; }
    .form-textarea:focus { border-color: #D70C1F; }

    .editor-wrap { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .editor-tb { display: flex; gap: 2px; padding: 6px 8px; background: #f5f5f5; border-bottom: 1px solid #e0e0e0; }
    .et-btn { width: 28px; height: 28px; border: 1px solid transparent; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .et-btn:hover { background: #e8e8e8; }
    .et-sep { width: 1px; background: #ddd; margin: 2px 4px; }
    .editor-area { min-height: 150px; max-height: 350px; overflow-y: auto; padding: 12px; font-size: 14px; line-height: 1.8; outline: none; }
    .editor-area:focus-within { border-color: #D70C1F; }
    .editor-area img { max-width: 100%; border-radius: 6px; }

    .radio-group { display: flex; gap: 20px; }
    .radio-item { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
    .radio-item input { accent-color: #D70C1F; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 30px; height: 30px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }

    .empty-state { padding: 60px 0; text-align: center; color: #ccc; }
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; animation: slideIn .3s ease; color: #fff; }
    .toast.success { background: rgba(7,193,96,.9); }
    .toast.error { background: rgba(231,76,60,.9); }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">元宇宙商城 - 后台管理</div>
    <div class="header-user">管理员</div>
  </div>

  <div class="main-container">
    <div class="sidebar">
      <div class="sidebar-group-title">元宇宙管理</div>
      <div class="sidebar-item" onclick="navigateTo('hotspot-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>场景和热区</div>
      <div class="sidebar-item" onclick="navigateTo('path-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 19 19 12 12 5 5 12"/><circle cx="12" cy="12" r="3"/></svg>跳转路径</div>
      <div class="sidebar-item" onclick="navigateTo('map-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="3 9 12 15 21 9"/></svg>主地图管理</div>
      <div class="sidebar-item" onclick="navigateTo('space-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>商家元宇宙空间管理</div>
      <div class="sidebar-item" onclick="navigateTo('role-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>角色管理</div>
      <div class="sidebar-item" onclick="navigateTo('dashboard-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>元宇宙看板</div>
      <div class="sidebar-item" onclick="navigateTo('dice-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="4"/><text x="12" y="17" text-anchor="middle" font-size="10">?</text></svg>🎲 骰子游戏</div>
      <div class="sidebar-group-title">数字资产</div>
      <div class="sidebar-item" onclick="navigateTo('asset-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>数字资产管理</div>
      <div class="sidebar-item" onclick="navigateTo('digital-asset-detail.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>数字资产详情</div>
      <div class="sidebar-item" onclick="navigateTo('order-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>订单管理</div>
      <div class="sidebar-group-title">会员管理</div>
      <div class="sidebar-item" onclick="navigateTo('user-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>用户管理</div>
      <div class="sidebar-item" onclick="navigateTo('merchant-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>商家管理</div>
      <div class="sidebar-group-title">审核管理</div>
      <div class="sidebar-item" onclick="navigateTo('cert-review.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>商家审核管理</div>
      <div class="sidebar-item" onclick="navigateTo('story-review.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>文化故事审核</div>
      <div class="sidebar-group-title">内容管理</div>
      <div class="sidebar-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>消息管理</div>
      <div class="sidebar-group-title">系统管理</div>
      <div class="sidebar-item" onclick="navigateTo('wallet-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>钱包管理</div>
    </div>

    <div class="content">
      <div class="content-header">
        <div class="content-title">📬 消息管理</div>
        <button class="btn btn-primary" onclick="openMsgModal()">+ 新建消息</button>
      </div>

      <div class="card">
        <div style="font-size:12px;color:#999;margin-bottom:8px">消息类型</div>
        <div class="filter-bar" id="typeFilterBar">
          <button class="filter-btn active" onclick="filterByType('all')">全部</button>
          <button class="filter-btn" onclick="filterByType('platform')">平台消息</button>
          <button class="filter-btn" onclick="filterByType('activity')">活动消息</button>
        </div>
        <div style="font-size:12px;color:#999;margin-bottom:8px;margin-top:12px">发送状态</div>
        <div class="filter-bar" id="statusFilterBar">
          <button class="filter-btn active" onclick="filterByStatus('all')">全部</button>
          <button class="filter-btn" onclick="filterByStatus('draft')">草稿</button>
          <button class="filter-btn" onclick="filterByStatus('scheduled')">定时中</button>
          <button class="filter-btn" onclick="filterByStatus('sent')">已发送</button>
        </div>
        <div class="msg-list" id="msgList"></div>
        <div class="empty-state" id="emptyState" style="display:none">暂无消息</div>
      </div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="msgModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="msgModalTitle">新建消息</div>
        <div class="modal-close" onclick="closeMsgModal()">✕</div>
      </div>
      <div class="modal-body">
        <input type="hidden" id="msgEditId">
        <div class="form-group">
          <label class="form-label">消息类型</label>
          <select class="form-select" id="msgType">
            <option value="platform">平台消息</option>
            <option value="activity">活动消息</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">消息标题</label>
          <input class="form-input" id="msgTitle" placeholder="输入消息标题">
        </div>
        <div class="form-group">
          <label class="form-label">消息内容</label>
          <div class="editor-wrap">
            <div class="editor-tb">
              <button type="button" class="et-btn" onclick="execCmd('bold')" title="加粗"><b>B</b></button>
              <button type="button" class="et-btn" onclick="execCmd('italic')" title="斜体"><i>I</i></button>
              <button type="button" class="et-btn" onclick="execCmd('underline')" title="下划线"><u>U</u></button>
              <span class="et-sep"></span>
              <button type="button" class="et-btn" onclick="execCmd('formatBlock','h3')" title="小标题">H</button>
              <button type="button" class="et-btn" onclick="execCmd('insertUnorderedList')" title="列表">≡</button>
              <span class="et-sep"></span>
              <button type="button" class="et-btn" onclick="document.getElementById('imgUploadMsg').click()" title="插入图片">🖼</button>
              <input type="file" id="imgUploadMsg" accept="image/*" onchange="insertImage()" style="display:none">
            </div>
            <div class="editor-area" id="msgEditor" contenteditable="true"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">发送方式</label>
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="sendType" value="immediate" checked onchange="toggleSendTime()"> 立即发送</label>
            <label class="radio-item"><input type="radio" name="sendType" value="scheduled" onchange="toggleSendTime()"> 定时发送</label>
          </div>
        </div>
        <div class="form-group" id="scheduledTimeGroup" style="display:none">
          <label class="form-label">发送时间</label>
          <input class="form-input" id="msgScheduledTime" type="datetime-local">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="saveMsg('draft')">保存草稿</button>
        <button class="btn btn-primary" onclick="saveMsg('send')">发送</button>
      </div>
    </div>
  </div>

  <script>
    var STORAGE = 'adminMessages';
    var messages = [];
    var currentType = 'all';
    var currentStatus = 'all';

    function navigateTo(url) { window.location.href = url; }

    function execCmd(cmd, arg) { document.execCommand(cmd, false, arg || null); document.getElementById('msgEditor').focus(); }

    function insertImage() {
      var f = document.getElementById('imgUploadMsg').files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function(e) {
        document.execCommand('insertImage', false, e.target.result);
        document.getElementById('msgEditor').focus();
      };
      r.readAsDataURL(f);
      document.getElementById('imgUploadMsg').value = '';
    }

    function loadMsgs() {
      var saved = localStorage.getItem(STORAGE);
      if (saved) { try { messages = JSON.parse(saved); } catch(e) { messages = []; } }
      checkTimedMsgs();
      renderMsgs();
    }

    function saveData() { localStorage.setItem(STORAGE, JSON.stringify(messages)); }

    function checkTimedMsgs() {
      var now = new Date().toISOString();
      var changed = false;
      messages.forEach(function(m) {
        if (m.status === 'scheduled' && m.scheduledTime && m.scheduledTime <= now) {
          m.status = 'sent'; m.time = formatTime(new Date()); changed = true;
        }
      });
      if (changed) { saveData(); renderMsgs(); }
    }

    function filterByType(f) {
      currentType = f;
      document.querySelectorAll('#typeFilterBar .filter-btn').forEach(function(b) { b.classList.toggle('active', false); });
      event.target.classList.add('active');
      renderMsgs();
    }

    function filterByStatus(f) {
      currentStatus = f;
      document.querySelectorAll('#statusFilterBar .filter-btn').forEach(function(b) { b.classList.toggle('active', false); });
      event.target.classList.add('active');
      renderMsgs();
    }

    function renderMsgs() {
      var filtered = messages;
      if (currentType !== 'all') filtered = filtered.filter(function(m) { return m.type === currentType; });
      if (currentStatus !== 'all') filtered = filtered.filter(function(m) { return m.status === currentStatus; });

      filtered.sort(function(a, b) { return (b.time || b.scheduledTime || '').localeCompare(a.time || a.scheduledTime || ''); });

      var container = document.getElementById('msgList');
      var empty = document.getElementById('emptyState');
      if (filtered.length === 0) { container.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      var typeMap = { platform:'平台消息', activity:'活动消息' };
      var statusMap = { sent:'已发送', scheduled:'定时中', draft:'草稿' };
      container.innerHTML = filtered.map(function(m) {
        var timeLabel = m.status === 'scheduled' ? '⏰ ' + formatDisplayTime(m.scheduledTime) : (m.time || '—');
        var actions = '<button class="btn btn-sm btn-outline" onclick="openMsgModal(\'' + m.id + '\')">编辑</button>';
        if (m.status === 'draft') actions += '<button class="btn btn-sm btn-success" onclick="sendMsg(\'' + m.id + '\')">发送</button>';
        actions += '<button class="btn btn-sm btn-danger" onclick="deleteMsg(\'' + m.id + '\')">删除</button>';
        return '<div class="msg-item">' +
          '<div class="msg-info"><div class="msg-title"><span class="msg-type-tag ' + m.type + '">' + (typeMap[m.type] || m.type) + '</span> ' + m.title + '</div>' +
          '<div class="msg-meta"><span class="msg-status-tag ' + m.status + '">' + (statusMap[m.status] || m.status) + '</span><span>' + timeLabel + '</span></div></div>' +
          '<div class="msg-actions">' + actions + '</div></div>';
      }).join('');
    }

    function openMsgModal(id) {
      document.getElementById('msgEditId').value = '';
      document.getElementById('msgTitle').value = '';
      document.getElementById('msgEditor').innerHTML = '';
      document.getElementById('msgType').value = 'platform';
      document.querySelector('input[name="sendType"][value="immediate"]').checked = true;
      document.getElementById('msgScheduledTime').value = '';
      toggleSendTime();
      document.getElementById('msgModalTitle').textContent = '新建消息';

      if (id) {
        var m = messages.find(function(x) { return x.id === id; });
        if (!m) return;
        document.getElementById('msgEditId').value = id;
        document.getElementById('msgTitle').value = m.title || '';
        document.getElementById('msgEditor').innerHTML = m.body || '';
        document.getElementById('msgType').value = m.type || 'platform';
        var sendType = m.status === 'scheduled' ? 'scheduled' : 'immediate';
        document.querySelector('input[name="sendType"][value="' + sendType + '"]').checked = true;
        if (m.scheduledTime) document.getElementById('msgScheduledTime').value = m.scheduledTime.substring(0, 16);
        toggleSendTime();
        document.getElementById('msgModalTitle').textContent = '编辑消息';
      }
      document.getElementById('msgModal').classList.add('show');
    }

    function closeMsgModal() { document.getElementById('msgModal').classList.remove('show'); }

    function toggleSendTime() {
      var scheduled = document.querySelector('input[name="sendType"]:checked').value === 'scheduled';
      document.getElementById('scheduledTimeGroup').style.display = scheduled ? 'block' : 'none';
    }

    function saveMsg(action) {
      var title = document.getElementById('msgTitle').value.trim();
      var body = document.getElementById('msgEditor').innerHTML.trim();
      var type = document.getElementById('msgType').value;
      if (!title) { showToast('请输入消息标题', 'error'); return; }
      if (!body) { showToast('请输入消息内容', 'error'); return; }

      var sendType = document.querySelector('input[name="sendType"]:checked').value;
      var status = 'sent';
      var scheduledTime = '';
      var time = formatTime(new Date());

      if (action === 'draft') { status = 'draft'; }
      else if (sendType === 'scheduled') { status = 'scheduled'; scheduledTime = document.getElementById('msgScheduledTime').value; time = ''; }

      var editId = document.getElementById('msgEditId').value;
      if (editId) {
        var m = messages.find(function(x) { return x.id === editId; });
        if (m) { m.title = title; m.body = body; m.type = type; m.status = status; m.scheduledTime = scheduledTime; m.time = time || m.time; }
        showToast('消息已更新', 'success');
      } else {
        messages.push({ id: 'msg' + Date.now(), title: title, body: body, type: type, status: status, scheduledTime: scheduledTime, time: time || '', read: false });
        showToast(action === 'draft' ? '草稿已保存' : '消息已发送', 'success');
      }
      saveData();
      closeMsgModal();
      renderMsgs();
    }

    function sendMsg(id) {
      var m = messages.find(function(x) { return x.id === id; });
      if (!m) return;
      m.status = 'sent';
      m.time = formatTime(new Date());
      m.scheduledTime = '';
      saveData();
      renderMsgs();
      showToast('已发送', 'success');
    }

    function deleteMsg(id) {
      if (!confirm('确定删除该消息？')) return;
      messages = messages.filter(function(m) { return m.id !== id; });
      saveData();
      renderMsgs();
      showToast('已删除', 'success');
    }

    function formatTime(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()); }
    function pad(n) { return n < 10 ? '0' + n : n; }
    function formatDisplayTime(t) { if (!t) return ''; return t.replace('T', ' '); }

    function showToast(msg, type) {
      var t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
      document.body.appendChild(t); setTimeout(function() { t.remove(); }, 2000);
    }

    setInterval(checkTimedMsgs, 30000);
    loadMsgs();
  </script>
</body>
</html>
