<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的资产</title>
<style>
:root{
  --accent:#3F8B6D;--accent-contrast:#fff;--link:#3F8B6D;--muted:#a0a0a0;
  --bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;
  --border:#e0e0e0;--page-bg:#F0F0F0;
  --radius-sm:7px;--radius-card:7px;--radius-pill:9999px;
  --font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{margin:0;width:100%;min-height:100%}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部导航 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 16px}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.2);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:700;color:#fff}
.nav-placeholder{width:32px}

/* ── 总览卡片 ── */
.overview{background:var(--bg);border-radius:var(--radius-card);padding:20px;display:flex;justify-content:center;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.ov-item{flex:1}
.ov-num{font-size:28px;font-weight:700;color:var(--accent);margin-bottom:4px}
.ov-label{font-size:12px;color:var(--ink-subtle)}

/* ── 资产列表 ── */
.asset-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.asset-card{background:var(--bg);border-radius:var(--radius-card);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,.04);cursor:pointer;transition:transform .15s}
.asset-card:active{transform:scale(.98)}
.ac-img{width:56px;aspect-ratio:1/1;border-radius:var(--radius-sm);background-position:center;background-size:cover;flex-shrink:0}
.ac-info{flex:1;min-width:0}
.ac-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.ac-tag{font-size:10px;color:var(--ink-subtle);background:var(--page-bg);padding:2px 8px;border-radius:4px;display:inline-block}
.ac-right{text-align:right;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.ac-hold{font-size:18px;font-weight:700;color:var(--accent)}
.ac-hold-label{font-size:10px;color:var(--ink-subtle)}

/* ── 底部TabBar ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100;box-sizing:border-box}
.bnav .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:4px 10px;font-size:10px;color:var(--ink-subtle);transition:color .2s}
.bnav .ni .ico{width:22px;height:22px;transition:transform .15s}
.bnav .ni .ico svg{display:block;width:100%;height:100%}
.bnav .ni:active .ico{transform:scale(.8)}
.bnav .ni.on{color:var(--accent)}
.bnav .ni.on .ico{transform:scale(1.05)}
.bnav .ni span:last-child{font-size:10px;display:block}
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div class="nav-back" onclick="window.location.href='my.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">我的资产</div>
  <button onclick="window.location.href='transfer.html'" title="赠与管理" style="font-size:12px;border-radius:var(--radius-pill);padding:0 14px;gap:5px;background:rgba(255,255,255,.15);border:none;color:#fff;display:flex;align-items:center;cursor:pointer;height:32px;flex-shrink:0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    赠与管理
  </button>
</div>

<div class="overview">
  <div class="ov-item">
    <div class="ov-num" id="totalCount">5</div>
    <div class="ov-label">持有资产</div>
  </div>
</div>

<div class="asset-list" id="assetList"></div>

</div>



<script>
var assets = [
  { name:'兰亭碑刻', img:'asset/兰亭碑刻封面图.png', issuer:'绍兴兰亭产业数资', hold:2 },
  { name:'兰亭春禊', img:'asset/兰亭春禊封面图.png', issuer:'绍兴兰亭产业数资', hold:1, link:'asset_detail.html?product=lantingchunxi' },
  { name:'兰亭雅集', img:'asset/兰亭雅集封面图.png', issuer:'绍兴兰亭产业数资', hold:3, link:'asset_detail.html?product=lantingyaji' },
  { name:'曲水流觞', img:'asset/曲水流觞封面图.png', issuer:'古越龙山', hold:3, link:'asset_detail.html?product=qushuishang' },
  { name:'兰亭诗韵', img:'asset/兰亭诗韵封面图.png', issuer:'诸暨珠宝', hold:1 }
];

var total = assets.reduce(function(s,a){ return s + a.hold; }, 0);
document.getElementById('totalCount').textContent = total;

document.getElementById('assetList').innerHTML = assets.map(function(a){
  return '<div class="asset-card" onclick="'+(a.link ? 'window.location.href=\''+a.link+'\'' : '')+'">'+
    '<div class="ac-img" style="background-image:url(\''+a.img+'\')"></div>'+
    '<div class="ac-info">'+
      '<div class="ac-name">'+a.name+'</div>'+
      '<span class="ac-tag">'+a.issuer+'</span>'+
    '</div>'+
    '<div class="ac-right">'+
      '<div class="ac-hold">×'+a.hold+'</div>'+
      '<div class="ac-hold-label">持有</div>'+
    '</div>'+
  '</div>';
}).join('');
</script>

</body>
</html>
