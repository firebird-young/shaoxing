<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>数字资产市场</title>
<style>
:root{
  --accent:#3F8B6D;--accent-contrast:#fff;--link:#3F8B6D;--muted:#a0a0a0;
  --bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;
  --border:#e0e0e0;--page-bg:#F0F0F0;
  --radius-sm:7px;--radius-card:7px;--radius-pill:9999px;
  --font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{margin:0;width:100%;min-height:100%}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

.top-bar{display:flex;align-items:center;justify-content:center;padding:0 0 16px}
.nav-title{font-size:17px;font-weight:700;color:var(--ink)}

.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--radius-sm);padding:0 12px;height:40px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.search-box svg{width:18px;height:18px;color:var(--ink-subtle);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;font-size:13px;color:var(--ink);background:transparent;height:100%}
.search-box input::placeholder{color:#bbb}

/* ── 筛选栏 ── */
.filter-bar{display:flex;gap:8px;margin:12px 0}
.filter-btn{height:32px;padding:0 14px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--bg);font-size:12px;color:var(--ink-muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.filter-btn:active{background:var(--page-bg)}
.filter-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-btn.on svg{stroke:#fff}
.filter-btn svg{width:14px;height:14px}
.filter-wrap{position:relative;display:inline-flex}
.filter-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:8px 0;z-index:20;min-width:140px}
.filter-dropdown.show{display:block}
.filter-dropdown-item{padding:10px 16px;font-size:13px;color:var(--ink-muted);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.filter-dropdown-item:active{background:var(--page-bg)}
.filter-dropdown-item .check{width:16px;height:16px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center}
.filter-dropdown-item .check.on{border-color:var(--accent);background:var(--accent)}
.filter-dropdown-item .check svg{width:10px;height:10px;color:#fff;display:none}
.filter-dropdown-item .check.on svg{display:block}

.goods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.goods-card{background:var(--bg);border-radius:var(--radius-card);overflow:hidden;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.06);transition:transform .2s;display:flex;flex-direction:column}
.goods-card:active{transform:scale(.96)}
.goods-card .img-wrap{width:100%;aspect-ratio:1/1;background-position:center;background-size:cover;position:relative}
.goods-card .soldout-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1}
.goods-card .soldout-overlay span{color:#fff;font-size:16px;font-weight:700;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.goods-card .info{padding:12px 12px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
.goods-card .info h4{font-size:14px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.goods-card .info .tags{display:flex;gap:4px;flex-wrap:wrap}
.goods-card .info .tags span{font-size:9px;padding:2px 8px;border-radius:4px;font-weight:500;display:inline-block}
.t-sale-all{color:#2980b9;background:#E8F4FD}
.t-sale-prior{color:#f0ad4e;background:#FFF8EC}
.t-sale-lottery{color:#6c5ce7;background:#F3F0FF}
.goods-card .info .price{color:var(--accent);font-size:20px;font-weight:700}
.goods-card .info .price small{font-size:11px;font-weight:400;color:var(--ink-subtle)}
.goods-card .info .sold{color:var(--ink-subtle);font-size:10px}
.goods-card .info .issuer{color:var(--ink-subtle);font-size:10px;display:inline-block;padding:2px 8px;background:#f5f5f5;border-radius:4px;align-self:flex-start;margin-top:auto}

.empty-state{text-align:center;padding:60px 0;color:var(--ink-subtle);font-size:14px;display:none}

.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100;box-sizing:border-box}
.bnav .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:4px 10px;font-size:10px;color:var(--ink-subtle);transition:color .2s}
.bnav .ni .ico{width:22px;height:22px;transition:transform .15s}
.bnav .ni .ico svg{display:block;width:100%;height:100%}
.bnav .ni:active .ico{transform:scale(.8)}
.bnav .ni.on{color:var(--accent)}
.bnav .ni.on .ico{transform:scale(1.05)}
.bnav .ni span:last-child{font-size:10px;display:block}
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div class="nav-title">数字资产市场</div>
</div>

<div class="search-box">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" placeholder="搜索数字资产名称" id="searchInput" oninput="render()">
</div>

<div class="filter-bar">
  <div class="filter-wrap">
    <button class="filter-btn" id="dateBtn" onclick="toggleDropdown('date')">按发行时间 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
    <div class="filter-dropdown" id="dateDropdown">
      <div class="filter-dropdown-item" data-value="" onclick="selectFilter('date', '', this)"><span>不限</span><span class="check on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
      <div class="filter-dropdown-item" data-value="desc" onclick="selectFilter('date', 'desc', this)"><span>最近发行</span><span class="check"></span></div>
      <div class="filter-dropdown-item" data-value="asc" onclick="selectFilter('date', 'asc', this)"><span>最早发行</span><span class="check"></span></div>
    </div>
  </div>
  <div class="filter-wrap">
    <button class="filter-btn" id="statusBtn" onclick="toggleDropdown('status')">销售状态 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
    <div class="filter-dropdown" id="statusDropdown">
      <div class="filter-dropdown-item" data-value="" onclick="selectFilter('status', '', this)"><span>不限</span><span class="check on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
      <div class="filter-dropdown-item" data-value="selling" onclick="selectFilter('status', 'selling', this)"><span>未售罄</span><span class="check"></span></div>
      <div class="filter-dropdown-item" data-value="soldout" onclick="selectFilter('status', 'soldout', this)"><span>已售罄</span><span class="check"></span></div>
    </div>
  </div>
</div>

<div class="goods-grid" id="goodsGrid"></div>
<div class="empty-state" id="emptyState">暂无匹配资产</div>

</div>

<div class="bnav">
  <button class="ni" onclick="window.location.href='user-index.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span>首页</span>
  </button>
  <button class="ni on">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="20" y2="20"/><line x1="6" y1="16" x2="6" y2="20"/><line x1="10" y1="12" x2="10" y2="20"/><line x1="14" y1="8" x2="14" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/></svg></span>
    <span>市场</span>
  </button>
  <button class="ni" onclick="window.location.href='community.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
    <span>社区</span>
  </button>
  <button class="ni" onclick="window.location.href='my.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span>我的</span>
  </button>
</div>

<script>
var assets = [
  { name:'兰亭碑刻', img:'asset/兰亭碑刻封面图.png', sale:'优先购', saleCls:'t-sale-prior', issuer:'绍兴兰亭产业数资', price:299, sold:128, total:888, date:'2026-05-11', link:'#' },
  { name:'兰亭春禊', img:'asset/兰亭春禊封面图.png', sale:'全民购', saleCls:'t-sale-all', issuer:'绍兴兰亭产业数资', price:199, sold:256, total:888, date:'2026-05-11', link:'#' },
  { name:'兰亭雅集', img:'asset/兰亭雅集产品图.png', sale:'抽签购', saleCls:'t-sale-lottery', issuer:'绍兴兰亭产业数资', price:399, sold:67, total:666, date:'2026-05-12', link:'product_maotai1935.html' },
  { name:'曲水流觞', img:'asset/曲水流觞封面图.png', sale:'抽签购', saleCls:'t-sale-lottery', issuer:'古越龙山', price:259, sold:45, total:666, date:'2026-06-01', link:'#' },
  { name:'兰亭诗韵', img:'asset/兰亭诗韵封面图.png', sale:'优先购', saleCls:'t-sale-prior', issuer:'诸暨珠宝', price:459, sold:888, total:888, date:'2026-06-05', link:'#' }
];

var currentDateSort = '';
var currentStatus = '';

function render(){
  var kw = document.getElementById('searchInput').value.toLowerCase();
  var list = assets.filter(function(a){ return a.name.toLowerCase().includes(kw); });
  if(currentStatus === 'soldout') list = list.filter(function(a){ return a.sold >= a.total; });
  else if(currentStatus === 'selling') list = list.filter(function(a){ return a.sold < a.total; });
  if(currentDateSort === 'desc') list.sort(function(a,b){ return b.date.localeCompare(a.date); });
  else if(currentDateSort === 'asc') list.sort(function(a,b){ return a.date.localeCompare(b.date); });
  var grid = document.getElementById('goodsGrid');
  var empty = document.getElementById('emptyState');
  if(list.length === 0){ grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = list.map(function(a){
    return '<div class="goods-card" onclick="window.location.href=\''+a.link+'\'">'+
      '<div class="img-wrap" style="background-image:url(\''+a.img+'\')">'+
        (a.sold >= a.total ? '<div class="soldout-overlay"><span>已售罄</span></div>' : '')+
      '</div>'+
      '<div class="info">'+
        '<h4>'+a.name+'</h4>'+
        '<div class="tags"><span class="'+a.saleCls+'">'+a.sale+'</span></div>'+
        '<div class="price">¥'+a.price+'</div>'+
        '<div class="sold">已售 '+a.sold+'/'+a.total+'</div>'+
        '<div class="issuer">'+a.issuer+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleDropdown(type){
  document.querySelectorAll('.filter-dropdown').forEach(function(d){ if(d.id !== type + 'Dropdown') d.classList.remove('show'); });
  document.getElementById(type + 'Dropdown').classList.toggle('show');
}
function selectFilter(type, value, el){
  var dropdownId = type + 'Dropdown';
  document.querySelectorAll('#' + dropdownId + ' .check').forEach(function(c){ c.classList.remove('on'); });
  el.querySelector('.check').classList.add('on');
  if(type === 'date') currentDateSort = value;
  else if(type === 'status') currentStatus = value;
  document.getElementById(dropdownId).classList.remove('show');
  render();
}
document.addEventListener('click', function(e){
  if(!e.target.closest('.filter-wrap')) document.querySelectorAll('.filter-dropdown').forEach(function(d){ d.classList.remove('show'); });
});
render();
</script>

</body>
</html>
