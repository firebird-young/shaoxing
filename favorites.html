<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的收藏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #e8e9ee; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #333; display: flex; justify-content: center; }
.page { max-width: 430px; min-width: 320px; min-height: 100vh; background: #f5f6fa; padding: 0 16px 20px; width: 100%; }

.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
.nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.nav-back svg { width: 20px; height: 20px; color: #333; display: block; }
.nav-title { font-size: 17px; font-weight: 700; color: #1a1a2e; }

.list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.card { background: #fff; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.03); cursor: pointer; transition: .15s; }
.card:active { transform: scale(.98); }
.card-img { width: 56px; height: 68px; border-radius: 10px; background-position: center; background-size: cover; flex-shrink: 0; background-color: #f5f5f7; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
.card-issuer { font-size: 10px; color: #999; background: #f5f5f7; padding: 2px 8px; border-radius: 4px; display: inline-block; }
.card-price { font-size: 16px; font-weight: 700; color: #D70C1F; flex-shrink: 0; }
.card-arrow svg { width: 14px; height: 14px; color: #ccc; display: block; }

.empty { text-align: center; padding: 80px 0; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 13px; color: #ccc; }
.empty-link { display: inline-block; margin-top: 14px; padding: 10px 28px; border-radius: 20px; background: #D70C1F; color: #fff; font-size: 13px; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">我的收藏</div>
  <div style="width:32px"></div>
</div>

<div class="list" id="favList"></div>

</div>

<script>
var assets = {
  maotai1935: { name:'茅台1935·时光窖藏', issuer:'贵州茅台', img:'茅台1935.png', price:'¥599', url:'product_maotai1935.html' },
  feitian:     { name:'飞天茅台·元宇宙酒票', issuer:'贵州茅台', img:'飞天茅台·元宇宙酒票.png', price:'¥299', url:'product_maotai1935.html' },
  guojiu:      { name:'国酒·数字徽章', issuer:'贵州茅台', img:'国酒·数字徽章.png', price:'¥99', url:'product_maotai1935.html' },
  banana:      { name:'巴拿马金奖·复刻', issuer:'贵州茅台', img:'巴拿马金奖·复刻.png', price:'¥1999', url:'product_maotai1935.html' },
  shengxiao:   { name:'茅台生肖兔·典藏', issuer:'贵州茅台', img:'茅台生肖兔·典藏.png', price:'¥2999', url:'product_maotai1935.html' },
  guichuideng: { name:'鬼吹灯·数字资产', issuer:'鬼吹灯', img:'鬼吹灯.png', price:'¥499', url:'product_maotai1935.html' },
  santi:       { name:'三体·数字资产', issuer:'三体', img:'三体.png', price:'¥699', url:'product_maotai1935.html' },
  wuzhangye:   { name:'五粮液·数字珍藏', issuer:'五粮液', img:'五粮液·数字珍藏.png', price:'¥599', url:'product_maotai1935.html' },
  wangzhe:     { name:'王者荣耀·传说皮肤', issuer:'王者荣耀', img:'王者荣耀·传说皮肤.png', price:'¥999', url:'product_maotai1935.html' },
  dishengcao:  { name:'杜甫草堂·文旅数字藏品', issuer:'杜甫草堂', img:'杜甫草堂·文旅数字藏品.png', price:'¥99', url:'product_maotai1935.html' },
  haidilao:    { name:'海底捞·黑海会员数字卡', issuer:'海底捞', img:'海底捞·黑海会员数字卡.png', price:'¥199', url:'product_maotai1935.html' }
};

function render(){
  var list = JSON.parse(localStorage.getItem('favorites')||'[]');
  if(!list.length){
    document.getElementById('favList').innerHTML =
      '<div class="empty"><div class="empty-icon">♡</div><div class="empty-text">还没有收藏任何资产</div><a class="empty-link" href="user-index.html">去逛逛</a></div>';
    return;
  }
  var h = '';
  list.forEach(function(pid){
    var a = assets[pid] || { name:pid, issuer:'--', img:'', price:'--', url:'#' };
    h +=
      '<div class="card" onclick="window.location.href=\''+a.url+'\'">'+
        '<div class="card-img" style="background-image:url(\''+a.img+'\')"></div>'+
        '<div class="card-info"><div class="card-name">'+a.name+'</div><span class="card-issuer">'+a.issuer+'</span></div>'+
        '<div class="card-price">'+a.price+'</div>'+
        '<div class="card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>'+
      '</div>';
  });
  document.getElementById('favList').innerHTML = h;
}

render();
</script>

</body>
</html>
