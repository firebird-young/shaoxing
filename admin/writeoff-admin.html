<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>核销查询 - 后台管理</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}
    .header{background:linear-gradient(135deg,#D70C1F,#F12B3D);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
    .header-title{font-size:18px;font-weight:600}
    .header-user{font-size:14px}
    .main-container{display:flex;min-height:calc(100vh - 60px)}
    .sidebar{width:200px;background:#fff;border-right:1px solid #e8e8e8;padding:16px 0;flex-shrink:0}
    .sidebar-group-title{padding:8px 24px;font-size:12px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:1px}
    .sidebar-item{padding:10px 24px 10px 48px;font-size:14px;color:#666;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;text-decoration:none}
    .sidebar-item:hover{background:#f5f5f5;color:#D70C1F}
    .sidebar-item.active{background:rgba(215,12,31,.1);color:#D70C1F;font-weight:600}
    .sidebar-item svg{width:14px;height:14px;flex-shrink:0}
    .content{flex:1;padding:24px;overflow-y:auto}
    .page-title{font-size:20px;font-weight:600;color:#1a1a2e;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .page-title svg{width:22px;height:22px;color:#D70C1F}

    .card{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:20px;border:1px solid #f0f0f0}

    /* 搜索栏 */
    .search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .search-input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;min-width:120px;flex:1;max-width:170px}
    .search-input:focus{border-color:#D70C1F;box-shadow:0 0 0 3px rgba(215,12,31,.08)}
    .search-input[type=date]{min-width:135px;flex:0}
    .search-select{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;background:#fff;min-width:100px;height:36px}
    .btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;height:36px}
    .btn-primary{background:#D70C1F;color:#fff}
    .btn-primary:hover{background:#c60a1b}
    .btn-default{background:#f5f5f5;color:#666;border:1px solid #ddd}
    .btn-default:hover{background:#e8ecf0}

    /* 统计 */
    .stats-row{display:flex;gap:12px;margin-bottom:16px}
    .stat-card{flex:1;background:#f8f9fb;border-radius:8px;padding:14px 16px;text-align:center}
    .stat-num{font-size:24px;font-weight:700;color:#D70C1F;margin-bottom:4px}
    .stat-label{font-size:12px;color:#999}

    /* 表格 */
    .table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #eee}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:12px 14px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:13px}
    th{background:#f7f8fa;font-weight:600;color:#555;white-space:nowrap;font-size:12px;letter-spacing:.3px}
    th:first-child{border-radius:8px 0 0 0}
    th:last-child{border-radius:0 8px 0 0}
    tr:last-child td{border-bottom:none}
    tbody tr{transition:background .12s}
    tbody tr:hover{background:#fef2f2}
    tbody tr:nth-child(even){background:#fafbfc}
    tbody tr:nth-child(even):hover{background:#fef2f2}
    .cell-user{font-weight:600;color:#1a1a2e}
    .cell-user-sub{font-size:11px;color:#999;margin-top:2px;display:flex;align-items:center;gap:6px}
    .cell-user-sub .phone-icon{width:12px;height:12px;opacity:.5}
    .cell-asset{font-weight:500;color:#333}
    .cell-asset-sub{font-size:11px;color:#999;font-family:monospace;margin-top:2px}
    .cell-benefit{font-weight:500;color:#333}
    .cell-issuer{font-size:12px;color:#888}
    .cell-time{font-size:12px;color:#888;white-space:nowrap}
    .cell-id{font-family:monospace;font-size:11px;color:#999;letter-spacing:.2px}
    .tag{padding:3px 12px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block;letter-spacing:.3px}
    .tag-identity{background:rgba(102,126,234,.1);color:#667eea}
    .tag-ticket{background:rgba(206,147,216,.12);color:#8A5CFF}
    .detail-btn{padding:5px 14px;border:none;border-radius:6px;background:#D70C1F;color:#fff;font-size:12px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
    .detail-btn:hover{opacity:.85}
    .detail-btn:active{opacity:.7}

    .empty-state{text-align:center;padding:48px 0;color:#999;font-size:13px}
    .empty-state svg{width:48px;height:48px;color:#ddd;margin-bottom:12px}

    /* 分页 */
    .pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px}
    .page-btn{padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:12px;color:#666;cursor:pointer}
    .page-btn:hover{background:#f5f5f5}
    .page-btn.active{background:#D70C1F;color:#fff;border-color:#D70C1F}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    .page-info{font-size:12px;color:#999}

    /* 详情弹窗 */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
    .modal-overlay.show{display:flex}
    .modal-box{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:80vh;overflow-y:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #f0f0f0}
    .modal-title{font-size:16px;font-weight:600}
    .modal-close{width:28px;height:28px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#666;border:none}
    .modal-close:hover{background:#e8e8e8}
    .modal-body{padding:20px}
    .detail-row{display:flex;padding:7px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
    .detail-label{width:80px;color:#999;flex-shrink:0}
    .detail-value{flex:1;color:#333;word-break:break-all}

    @media(max-width:768px){
      .main-container{flex-direction:column}
      .sidebar{width:100%;display:flex;flex-wrap:wrap;padding:8px;gap:4px}
      .sidebar-group-title{display:none}
      .sidebar-item{padding:6px 12px;font-size:12px}
    }
  </style>
</head>

function applyFilter(){
  currentPage = 1;
  var userId = document.getElementById('sUserId').value.trim().toLowerCase();
  var benefitName = document.getElementById('sBenefitName').value.trim().toLowerCase();
  var assetName = document.getElementById('sAssetName').value.trim().toLowerCase();
  var issuer = document.getElementById('sIssuer').value.trim().toLowerCase();
  var phone = document.getElementById('sPhone').value.trim().toLowerCase();
  var assetNo = document.getElementById('sAssetNo').value.trim().toLowerCase();
  var type = document.getElementById('sType').value;
  var dateStart = document.getElementById('sDateStart').value;
  var dateEnd = document.getElementById('sDateEnd').value;

  filteredList = allRecords.filter(function(r){
    if(type !== 'all' && r.type !== type) return false;
    if((dateStart || dateEnd) && !isInRange(r.time, dateStart, dateEnd)) return false;
    if(userId && r.user.toLowerCase().indexOf(userId)===-1) return false;
    if(benefitName && r.title.toLowerCase().indexOf(benefitName)===-1) return false;
    if(assetName && r.assetName.toLowerCase().indexOf(assetName)===-1) return false;
    if(issuer && r.issuer.toLowerCase().indexOf(issuer)===-1) return false;
    if(phone && r.phone.indexOf(phone)===-1) return false;
    if(assetNo && r.assetNo.toLowerCase().indexOf(assetNo)===-1) return false;
    return true;
  });
  renderList();
}

function resetFilter(){
  document.getElementById('sUserId').value = '';
  document.getElementById('sBenefitName').value = '';
  document.getElementById('sAssetName').value = '';
  document.getElementById('sIssuer').value = '';
  document.getElementById('sPhone').value = '';
  document.getElementById('sAssetNo').value = '';
  document.getElementById('sType').value = 'all';
  document.getElementById('sDateStart').value = '';
  document.getElementById('sDateEnd').value = '';
  applyFilter();
}

// ── 渲染 ──
function renderList(){
  var total = filteredList.length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('identityCount').textContent = filteredList.filter(function(r){return r.type==='identity'}).length;
  document.getElementById('ticketCount').textContent = filteredList.filter(function(r){return r.type==='ticket'}).length;

  var totalPages = Math.ceil(total / pageSize) || 1;
  var start = (currentPage - 1) * pageSize;
  var paged = filteredList.slice(start, start + pageSize);
  var body = document.getElementById('listBody');
  var empty = document.getElementById('emptyState');

  if(paged.length === 0){
    body.innerHTML = '';
    empty.style.display = 'block';
    renderPagination(0);
    return;
  }
  empty.style.display = 'none';

  body.innerHTML = paged.map(function(r, i){
    var idx = start + i + 1;
    var tagCls = r.type === 'identity' ? 'tag-identity' : 'tag-ticket';
    var phoneIcon = '<svg class="phone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
    return '<tr>'+
      '<td style="color:#bbb;font-family:monospace;font-size:12px;text-align:center">'+idx+'</td>'+
      '<td class="cell-id">'+r.id+'</td>'+
      '<td><div class="cell-user">'+r.userName+'</div><div class="cell-user-sub">'+r.user+' <span style="color:#ddd">|</span> '+phoneIcon+' '+r.phone+'</div></td>'+
      '<td><div class="cell-asset">'+r.assetName+(r.assetSpec?' · '+r.assetSpec:'')+'</div><div class="cell-asset-sub">'+r.assetNo+'</div></td>'+
      '<td class="cell-issuer">'+r.issuer+'</td>'+
      '<td class="cell-benefit">'+r.title+'</td>'+
      '<td><span class="tag '+tagCls+'">'+r.label+'</span></td>'+
      '<td class="cell-issuer">'+(r.operator||'-')+'</td>'+
      '<td class="cell-time">'+formatTime(r.time)+'</td>'+
      '<td><button class="detail-btn" onclick="showDetail(\''+r.id+'\')">详情</button></td>'+
      '</tr>';
  }).join('');
  renderPagination(totalPages);
}

function renderPagination(totalPages){
  var el = document.getElementById('pagination');
  if(totalPages <= 1){ el.innerHTML = ''; return; }
  var h = '';
  h += '<button class="page-btn" onclick="goPage('+(currentPage-1)+')"'+(currentPage<=1?' disabled':'')+'>‹ 上一页</button>';
  for(var i=1; i<=totalPages; i++){
    h += '<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  }
  h += '<button class="page-btn" onclick="goPage('+(currentPage+1)+')"'+(currentPage>=totalPages?' disabled':'')+'>下一页 ›</button>';
  h += '<span class="page-info">第 '+currentPage+'/'+totalPages+' 页</span>';
  el.innerHTML = h;
}

function goPage(p){
  var total = filteredList.length;
  var totalPages = Math.ceil(total / pageSize) || 1;
  if(p < 1 || p > totalPages) return;
  currentPage = p;
  renderList();
}

function formatTime(t){
  var d = new Date(t);
  var m = (d.getMonth()+1).toString().padStart(2,'0');
  var day = d.getDate().toString().padStart(2,'0');
  var h = d.getHours().toString().padStart(2,'0');
  var mi = d.getMinutes().toString().padStart(2,'0');
  return d.getFullYear()+'-'+m+'-'+day+' '+h+':'+mi;
}

// ── 详情弹窗 ──
function showDetail(id){
  var r = allRecords.find(function(x){return x.id===id});
  if(!r) return;
  var h = '';
  h += '<div class="detail-row"><span class="detail-label">核销编号</span><span class="detail-value" style="font-family:monospace;color:#888">'+r.id+'</span></div>';
  h += '<div class="detail-row"><span class="detail-label">用户信息</span><span class="detail-value"><strong>'+r.userName+'</strong> ('+r.user+') '+r.phone+'</span></div>';
  h += '<div class="detail-row"><span class="detail-label">数字资产</span><span class="detail-value">'+r.assetName+(r.assetSpec?' · '+r.assetSpec:'')+' <span style="font-family:monospace;color:#999">'+r.assetNo+'</span></span></div>';
  h += '<div class="detail-row"><span class="detail-label">发行方</span><span class="detail-value">'+r.issuer+'</span></div>';
  h += '<div class="detail-row"><span class="detail-label">权益名称</span><span class="detail-value">'+r.title+'</span></div>';
  h += '<div class="detail-row"><span class="detail-label">权益类型</span><span class="detail-value"><span class="tag '+(r.type==='identity'?'tag-identity':'tag-ticket')+'">'+r.label+'</span></span></div>';
  h += '<div class="detail-row"><span class="detail-label">权益说明</span><span class="detail-value" style="color:#888">'+r.desc+'</span></div>';
  h += '<div class="detail-row"><span class="detail-label">操作员</span><span class="detail-value">'+(r.operator||'-')+'</span></div>';
  h += '<div class="detail-row"><span class="detail-label">核销时间</span><span class="detail-value">'+r.time+'</span></div>';
  document.getElementById('detailBody').innerHTML = h;
  document.getElementById('detailModal').classList.add('show');
}

// ── 初始化 ──
applyFilter();
</script>
</body>
</html>
