<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>核销成功 - 商家客户端</title>
<style>
:root{--accent:#3F8B6D;--accent-contrast:#fff;--bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;--border:#e0e0e0;--page-bg:#F0F0F0;--radius-sm:7px;--radius-card:7px;--radius-pill:9999px;--font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;--font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 16px}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.2);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:#fff}
.nav-placeholder{width:32px}

/* ── 成功动画 ── */
.success-banner{text-align:center;padding:32px 0 20px}
.success-icon{width:72px;height:72px;border-radius:50%;background:rgba(63,139,109,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;animation:pulse 1.2s ease-in-out}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.success-icon svg{width:36px;height:36px;color:var(--accent);display:block}
.success-title{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:4px}
.success-sub{font-size:12px;color:var(--ink-subtle)}

/* ── 核销信息卡片 ── */
.info-card{background:var(--bg);border-radius:var(--radius-card);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04);margin-bottom:12px}
.info-row{display:flex;align-items:center;padding:14px;border-bottom:1px solid var(--page-bg);gap:12px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:12px;color:var(--ink-subtle);width:64px;flex-shrink:0}
.info-value{font-size:13px;color:var(--ink);flex:1;min-width:0;word-break:break-all}

/* ── 权益类型标签 ── */
.type-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 14px;border-radius:var(--radius-pill);font-size:12px;font-weight:600}
.type-tag.identity{background:rgba(63,139,109,.1);color:var(--accent)}
.type-tag.ticket{background:rgba(206,147,216,.12);color:#8A5CFF}
.type-tag.physical{background:rgba(79,195,247,.12);color:#398BFF}

/* ── 用户信息 ── */
.user-info-card{background:var(--bg);border-radius:var(--radius-card);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,.04);margin-bottom:12px}
.user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0}
.user-detail{flex:1;min-width:0}
.user-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:1px}
.user-id{font-size:11px;color:var(--ink-subtle)}

/* ── 操作栏 ── */
.action-bar{display:flex;gap:10px;padding:8px 0}
.btn-primary{flex:1;height:46px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:active{opacity:.9}
.btn-outline{flex:1;height:46px;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--ink-muted);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-outline:active{background:var(--page-bg)}
.btn-primary svg,.btn-outline svg{width:16px;height:16px;display:block}

/* ── 底部导航 ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100;box-sizing:border-box}
.bnav .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:4px 10px;font-size:10px;color:var(--ink-subtle);transition:color .2s}
.bnav .ni .ico{width:22px;height:22px;transition:transform .15s}
.bnav .ni .ico svg{display:block;width:100%;height:100%}
.bnav .ni:active .ico{transform:scale(.8)}
.bnav .ni.on{color:var(--accent)}
.bnav .ni span:last-child{font-size:10px;display:block}
</style>
</head>
<body>
<div class="page">

<!-- 顶部 -->
<div class="top-bar">
  <div class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">核销结果</div>
  <div class="nav-placeholder"></div>
</div>

<!-- 成功动画 -->
<div class="success-banner">
  <div class="success-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  </div>
  <div class="success-title">核销成功</div>
  <div class="success-sub">权益已成功核销</div>
</div>

<!-- 用户信息 -->
<div class="user-info-card">
  <img class="user-avatar" src="../asset/logo.png" alt="" onerror="this.style.display='none'">
  <div class="user-detail">
    <div class="user-name" id="userName">-</div>
    <div class="user-id">用户ID: <span id="userId">-</span></div>
  </div>
</div>

<!-- 核销内容卡片 -->
<div class="info-card">
  <div class="info-row">
    <div class="info-label">资产名称</div>
    <div class="info-value" id="assetName">-</div>
  </div>
  <div class="info-row">
    <div class="info-label">资产编号</div>
    <div class="info-value" id="assetNo">-</div>
  </div>
  <div class="info-row">
    <div class="info-label">权益类型</div>
    <div class="info-value"><span id="typeTag" class="type-tag identity">身份权益</span></div>
  </div>
  <div class="info-row">
    <div class="info-label">权益内容</div>
    <div class="info-value" id="benefitTitle">-</div>
  </div>
  <div class="info-row">
    <div class="info-label">权益说明</div>
    <div class="info-value" id="benefitDesc">-</div>
  </div>
  <div class="info-row">
    <div class="info-label">核销时间</div>
    <div class="info-value" id="writeOffTime">-</div>
  </div>
  <div class="info-row">
    <div class="info-label">核销编号</div>
    <div class="info-value" id="writeOffCode">-</div>
  </div>
</div>

<!-- 操作栏 -->
<div class="action-bar">
  <button class="btn-outline" onclick="location.href='scan.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    继续扫码
  </button>
  <button class="btn-primary" onclick="location.href='history.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    查看记录
  </button>
</div>

</div>

<!-- 底部导航 -->
<div class="bnav">
  <button class="ni" onclick="location.href='scan.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span>首页</span>
  </button>
  <button class="ni" onclick="location.href='history.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
    <span>记录</span>
  </button>
  <button class="ni">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span>我的</span>
  </button>
</div>

<script>
// ── 解析参数 ──
var params = new URLSearchParams(window.location.search);
var raw = params.get('data');
var data = raw ? JSON.parse(decodeURIComponent(raw)) : null;

if(data){
  document.getElementById('userName').textContent = data.name || '-';
  document.getElementById('userId').textContent = data.user || '-';
  document.getElementById('assetDisplay').textContent = (data.assetName||'') + (data.assetSpec ? ' · ' + data.assetSpec : '') + (data.assetNo ? ' (' + data.assetNo + ')' : '');
  document.getElementById('benefitTitle').textContent = data.title || '-';
  document.getElementById('benefitDesc').textContent = data.desc || '-';
  document.getElementById('writeOffTime').textContent = data.time || '-';
  document.getElementById('writeOffCode').textContent = data.code || '-';

  // 设置权益类型标签
  var typeTag = document.getElementById('typeTag');
  var typeMap = {
    'identity': { label:'身份权益', cls:'identity' },
    'ticket': { label:'次数权益', cls:'ticket' },
    'physical': { label:'实物权益', cls:'physical' }
  };
  var tp = typeMap[data.type] || typeMap.identity;
  typeTag.textContent = tp.label;
  typeTag.className = 'type-tag ' + tp.cls;
}
</script>
</body>
</html>
