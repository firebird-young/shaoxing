<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的收藏</title>
<style>
:root{--accent:#3F8B6D;--accent-contrast:#fff;--bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;--border:#e0e0e0;--page-bg:#F0F0F0;--radius-sm:7px;--radius-card:7px;--radius-pill:9999px;--font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;--font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 16px}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.2);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:#fff}
.nav-placeholder{width:32px}

/* ── 收藏列表（2列网格，同 user-index 商品卡片） ── */
.goods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}
.goods-card{background:var(--bg);border-radius:var(--radius-card);overflow:hidden;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.goods-card:active{transform:scale(.96);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.goods-img{width:100%;aspect-ratio:1/1;background-position:center;background-size:cover;position:relative}
.goods-card h4{font-size:13px;font-weight:600;padding:10px 12px 0;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
.goods-card .price-row{display:flex;align-items:baseline;padding:4px 12px 0;gap:8px;justify-content:space-between}
.goods-card .price{color:var(--accent);font-size:20px;font-weight:700}
.goods-card .price small{font-size:11px;font-weight:400;color:var(--ink-subtle)}
.goods-card .issuer{color:var(--ink-subtle);font-size:10px;display:inline-block;padding:2px 8px;margin:6px 0 10px 12px;background:#f5f5f5;border-radius:4px;align-self:flex-start}
.goods-card .fav-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:transform .15s}
.goods-card .fav-btn:active{transform:scale(.8)}
.goods-card .fav-btn svg{width:14px;height:14px;display:block}

/* ── 空状态 ── */
.empty{text-align:center;padding-top:30vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty svg{width:48px;height:48px;color:#ddd;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.empty-text{font-size:13px;color:var(--ink-subtle);margin-bottom:16px}
.empty-link{display:inline-block;padding:10px 28px;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer}
.empty-link:active{opacity:.9}
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">我的收藏</div>
  <div class="nav-placeholder"></div>
</div>

<div class="goods-grid" id="favGrid" style="margin-top:0"></div>
<div id="emptyContainer"></div>

</div>

<script>
var assets = {
  lantingbeike:  { name:'兰亭碑刻', issuer:'绍兴兰亭产业数资', img:'asset/兰亭碑刻封面图.png', price:299, url:'asset_detail.html?product=lantingbeike' },
  lantingchunxi: { name:'兰亭春禊', issuer:'绍兴兰亭产业数资', img:'asset/兰亭春禊封面图.png', price:199, url:'asset_detail.html?product=lantingchunxi' },
  lantingyaji:   { name:'兰亭雅集', issuer:'绍兴兰亭产业数资', img:'asset/兰亭雅集封面图.png', price:399, url:'asset_detail.html?product=lantingyaji' },
  qushuishang:   { name:'曲水流觞', issuer:'古越龙山', img:'asset/曲水流觞封面图.png', price:259, url:'asset_detail.html?product=qushuishang' },
  lantingshiyun: { name:'兰亭诗韵', issuer:'诸暨珠宝', img:'asset/兰亭诗韵封面图.png', price:459, url:'asset_detail.html?product=lantingshiyun' }
};

function render(){
  var list = JSON.parse(localStorage.getItem('favorites')||'[]');
  var grid = document.getElementById('favGrid');
  var empty = document.getElementById('emptyContainer');
  if(!list.length){
    grid.style.display = 'none';
    empty.innerHTML =
      '<div class="empty">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'+
        '<div class="empty-text">还没有收藏任何资产</div>'+
        '<a class="empty-link" href="asset_market.html">去逛逛</a>'+
      '</div>';
    return;
  }
  var h = '';
  list.forEach(function(pid){
    var a = assets[pid] || { name:pid, issuer:'--', img:'', price:0, url:'#' };
    h +=
      '<div class="goods-card" onclick="window.location.href=\''+a.url+'\'">'+
        '<div class="goods-img" style="background-image:url(\''+a.img+'\')">'+
          '<button class="fav-btn" onclick="event.stopPropagation();removeFav(\''+pid+'\')">'+
            '<svg viewBox="0 0 24 24" fill="#e74c3c" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'+
          '</button>'+
        '</div>'+
        '<h4>'+a.name+'</h4>'+
        '<div class="price-row"><div class="price">¥'+a.price+'</div></div>'+
        '<div class="issuer">'+a.issuer+'</div>'+
      '</div>';
  });
  grid.style.display = 'grid';
  grid.innerHTML = h;
  document.getElementById('emptyContainer').innerHTML = '';
}

function removeFav(pid){
  var list = JSON.parse(localStorage.getItem('favorites')||'[]');
  var idx = list.indexOf(pid);
  if(idx > -1) list.splice(idx, 1);
  localStorage.setItem('favorites', JSON.stringify(list));
  render();
}

render();
</script>
</body>
</html>
