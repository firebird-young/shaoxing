<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>茅台 · VR全景</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;
  }
  .phone{
    width:860px;height:430px;
    border-radius:36px;background:#1a1a2e;
    padding:12px;
    box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 0 0 2px #333;
    animation:in .7s ease-out;
  }
  @keyframes in{0%{opacity:0;transform:translateY(60px) scale(.92)}100%{opacity:1;transform:translateY(0) scale(1)}}
  .screen{
    width:100%;height:100%;border-radius:24px;
    overflow:hidden;background:#0a0a1a;
    display:flex;flex-direction:column;
  }
  .top{
    display:flex;align-items:center;gap:8px;
    padding:6px 12px;border-bottom:1px solid rgba(0,212,255,.08);
    flex-shrink:0;
  }
  .back{
    display:flex;align-items:center;gap:4px;
    padding:6px 12px;border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;
    background:rgba(255,255,255,.08);color:#fff;
    border:1px solid rgba(255,255,255,.12);
    transition:background .2s;
  }
  .back:hover{background:rgba(255,255,255,.15)}
  .back:active{background:rgba(255,255,255,.05)}
  .top-t{flex:1;font-size:13px;font-weight:600;color:#fff}
  @media (max-width:768px){
    body{background:#000}
    .phone{width:100vw;height:100vh;border-radius:0;padding:0;box-shadow:none;animation:none}
    .screen{border-radius:0}
  }
  iframe{
    flex:1;width:100%;border:none;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="top">
      <div class="back" onclick="history.back()">← 返回</div>
      <div class="top-t">🎬 贵州茅台 · VR全景酒庄</div>
    </div>
    <iframe src="https://www.720yun.com/t/e2bje7uvzO4?scene_id=127471920" allow="fullscreen; gyroscope; accelerometer" allowfullscreen></iframe>
  </div>
</div>
</body>
</html>
