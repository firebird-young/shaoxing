<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>个人资料</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #2c2c2e; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #333; display: flex; flex-direction: column; align-items: center; }
.page { max-width: 430px; min-height: 100vh; background: linear-gradient(180deg,#1a6b4c 0%,#3f9b7a 25%,#e8f5ee 50%,#f6f7fb 100%); padding: 0; position: relative; width: 100%; }

.top-bar { display: flex; align-items: center; justify-content: center; padding: 12px 16px; position: relative; }
.nav-back { position: absolute; left: 16px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius:50%; background:rgba(255,255,255,.25); }
.nav-back svg { width: 18px; height: 18px; color: #fff; display: block; }
.nav-back:active{background:rgba(255,255,255,.4)}
.nav-title { font-size: 17px; font-weight: 600; color: #fff; }

.profile-card { background: #fff; margin: 12px 16px; border-radius: 14px; overflow: hidden; box-shadow:0 2px 12px rgba(26,107,76,.08); }
.profile-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f5f5f7; cursor: pointer; transition: background 0.15s; }
.profile-item:last-child { border-bottom: none; }
.profile-item:active { background: #f0faf5; }
.profile-item.no-edit { cursor: default; }
.profile-item.no-edit:active { background: transparent; }
.pi-label { font-size: 15px; color: #666; }
.pi-value { display: flex; align-items: center; gap: 8px; }
.pi-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border:2px solid rgba(26,107,76,.15); }
.pi-text { font-size: 15px; color: #1a1a2e; font-weight: 500; }
.pi-arrow svg { width: 16px; height: 16px; color: #ccc; }

/* ── 编辑弹窗 ── */
.modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-mask.show { opacity: 1; pointer-events: auto; }
.modal-box { width: calc(100% - 64px); max-width: 320px; background: #fff; border-radius: 16px; padding: 24px 20px 20px; text-align: center; box-shadow:0 8px 40px rgba(0,0,0,.18); }
.modal-box h3 { font-size: 17px; font-weight: 700; color: #222; margin-bottom: 16px; }
.modal-box input { width: 100%; height: 44px; border: 1px solid #e8e8ec; border-radius: 10px; padding: 0 14px; font-size: 15px; color: #333; outline: none; text-align: center; margin-bottom: 16px; }
.modal-box input:focus { border-color: #1a6b4c; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button { flex: 1; height: 42px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.modal-cancel { background: #f5f5f7; color: #666; }
.modal-cancel:active { background: #eee; }
.modal-confirm { background: linear-gradient(135deg,#1a6b4c,#3f9b7a); color: #fff; }
.modal-confirm:active { opacity: 0.9; }
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">个人资料</div>
</div>

<div class="profile-card">
  <div class="profile-item" onclick="document.getElementById('avatarInput').click()">
    <span class="pi-label">头像</span>
    <div class="pi-value">
      <img class="pi-avatar" id="avatarImg" src="头像.jpg" alt="头像">
      <div class="pi-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="changeAvatar(event)">
  </div>
  <div class="profile-item" onclick="showNicknameModal()">
    <span class="pi-label">昵称</span>
    <div class="pi-value">
      <span class="pi-text" id="nicknameText">元宇宙探索者</span>
      <div class="pi-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>
  <div class="profile-item no-edit">
    <span class="pi-label">手机号</span>
    <div class="pi-value">
      <span class="pi-text">138****5678</span>
    </div>
  </div>
</div>

</div>

<!-- 昵称编辑弹窗 -->
<div class="modal-mask" id="nicknameModal" onclick="closeNicknameModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>修改昵称</h3>
    <input type="text" id="nicknameInput" placeholder="请输入新昵称" maxlength="20">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeNicknameModal()">取消</button>
      <button class="modal-confirm" onclick="saveNickname()">保存</button>
    </div>
  </div>
</div>

<script>
// ── 头像上传 ──
function changeAvatar(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    document.getElementById('avatarImg').src = ev.target.result;
    localStorage.setItem('userAvatar', ev.target.result);
    alert('头像已更新');
  };
  reader.readAsDataURL(file);
}

// ── 昵称修改 ──
function showNicknameModal(){
  document.getElementById('nicknameInput').value = document.getElementById('nicknameText').textContent;
  document.getElementById('nicknameModal').classList.add('show');
}
function closeNicknameModal(e){
  if(e && e.target !== document.getElementById('nicknameModal')) return;
  document.getElementById('nicknameModal').classList.remove('show');
}
function saveNickname(){
  var val = document.getElementById('nicknameInput').value.trim();
  if(!val){ alert('昵称不能为空'); return; }
  document.getElementById('nicknameText').textContent = val;
  localStorage.setItem('userNickname', val);
  document.getElementById('nicknameModal').classList.remove('show');
  alert('昵称已更新');
}

// ── 初始化加载 localStorage ──
(function(){
  var savedAvatar = localStorage.getItem('userAvatar');
  if(savedAvatar) document.getElementById('avatarImg').src = savedAvatar;
  var savedNick = localStorage.getItem('userNickname');
  if(savedNick) document.getElementById('nicknameText').textContent = savedNick;
})();
</script>

</body>
</html>
