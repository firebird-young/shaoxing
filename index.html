﻿﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元宇宙商场 - 入口目录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    
    .logo {
      width: 100px;
      height: 100px;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #D70C1F, #F12B3D);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(215, 12, 31, 0.3);
    }
    
    .logo svg {
      width: 50px;
      height: 50px;
      color: #fff;
    }
    
    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 40px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }
    
    .menu-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 360px;
    }
    
    .menu-item {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .menu-item:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .menu-item:active {
      transform: translateY(0);
    }
    
    .menu-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .menu-icon svg {
      width: 28px;
      height: 28px;
    }
    
    .menu-icon.user {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    
    .menu-icon.admin {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
    }
    
    .menu-icon.app {
      background: linear-gradient(135deg, #3F8B6D 0%, #2d6b53 100%);
      color: #fff;
    }
    
    .menu-content {
      flex: 1;
      min-width: 0;
    }
    
    .menu-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }
    
    .menu-desc {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .menu-arrow {
      width: 20px;
      height: 20px;
      color: rgba(255, 255, 255, 0.4);
      transition: transform 0.3s ease;
    }
    
    .menu-item:hover .menu-arrow {
      transform: translateX(4px);
    }
    
    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/>
      <rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/>
    </svg>
  </div>
  
  <h1>元宇宙商场</h1>
  
  <div class="menu-container">
    <div class="menu-item" onclick="location.href='user-index.html'">
      <div class="menu-icon user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="menu-content">
        <div class="menu-title">用户端</div>
        <div class="menu-desc">用户浏览和购买数字资产</div>
      </div>
      <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </div>
    
    <div class="menu-item" onclick="location.href='admin/dashboard-admin.html'">
      <div class="menu-icon admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="9" x2="15" y2="9"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </div>
      <div class="menu-content">
        <div class="menu-title">后台端</div>
        <div class="menu-desc">管理场景、热区和跳转路径</div>
      </div>
      <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </div>
    
    <div class="menu-item" onclick="location.href='merchant/dashboard.html'">
      <div class="menu-icon merchant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="menu-content">
        <div class="menu-title">商家端（PC）</div>
        <div class="menu-desc">管理数字资产发行和销售</div>
      </div>
      <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </div>
    
    <div class="menu-item" onclick="location.href='merchantMiniProgram/scan.html'">
      <div class="menu-icon app">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
      </div>
      <div class="menu-content">
        <div class="menu-title">商家端（APP）</div>
        <div class="menu-desc">扫码核销商家权益</div>
      </div>
      <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </div>
  </div>
  
  <div class="footer">绍兴数资</div>
</body>
</html>
