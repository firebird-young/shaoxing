<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>核销记录 - 商家客户端</title>
<style>
:root{--accent:#3F8B6D;--accent-contrast:#fff;--bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;--border:#e0e0e0;--page-bg:#F0F0F0;--radius-sm:7px;--radius-card:7px;--radius-pill:9999px;--font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;--font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 16px}
.top-bar-left{display:flex;align-items:center;gap:10px}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.2);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:#fff}
.nav-placeholder{width:32px}

/* ── 统计概览 ── */
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--bg);border-radius:var(--radius-card);padding:14px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.stat-num{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:2px}
.stat-label{font-size:11px;color:var(--ink-subtle)}

/* ── 日期筛选 ── */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 16px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--bg);font-size:12px;color:var(--ink-muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.filter-btn:active{transform:scale(.95)}
.filter-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── 搜索 ── */
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--radius-pill);padding:0 14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.search-box svg{width:16px;height:16px;color:var(--ink-subtle);flex-shrink:0;display:block}
.search-box input{flex:1;height:40px;border:none;background:transparent;font-size:13px;color:var(--ink);outline:none;min-width:0}
.search-box input::placeholder{color:#bbb}

/* ── 记录列表 ── */
.section-title{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px}
.section-title span{font-size:14px;font-weight:600;color:var(--ink)}
.section-title .count{font-size:11px;color:var(--ink-subtle);font-weight:400}
.history-item{background:var(--bg);border-radius:var(--radius-card);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,.04);cursor:pointer;transition:background .15s}
.history-item:active{background:var(--page-bg)}
.hi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hi-icon svg{width:18px;height:18px;display:block}
.hi-info{flex:1;min-width:0}
.hi-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.hi-time{font-size:10px;color:var(--ink-subtle);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.hi-time .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-subtle);display:inline-block}
.hi-tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:var(--radius-pill);flex-shrink:0}
.hi-tag.success{background:rgba(63,139,109,.1);color:var(--accent)}
.hi-tag.identity{background:rgba(63,139,109,.1);color:var(--accent)}
.hi-tag.ticket{background:rgba(206,147,216,.12);color:#8A5CFF}
.hi-tag.physical{background:rgba(79,195,247,.12);color:#398BFF}
.hi-tag.cancel{background:rgba(255,77,79,.08);color:#ff4d4f}

/* ── 空状态 ── */
.empty-state{text-align:center;padding:40px 0 16px}
.empty-state .empty-icon{width:56px;height:56px;margin:0 auto 10px;opacity:.25}
.empty-state .empty-icon svg{width:100%;height:100%;color:var(--ink-subtle)}
.empty-state .empty-text{font-size:13px;color:var(--ink-subtle);margin-bottom:4px}
.empty-state .empty-sub{font-size:11px;color:var(--ink-subtle);opacity:.6}

/* ── 加载更多 ── */
.load-more{text-align:center;padding:16px 0 8px}
.load-more button{background:none;border:none;font-size:12px;color:var(--ink-subtle);cursor:pointer;padding:8px 20px}
.load-more button:active{opacity:.6}

/* ── 底部导航 ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100;box-sizing:border-box}
.bnav .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:4px 10px;font-size:10px;color:var(--ink-subtle);transition:color .2s}
.bnav .ni .ico{width:22px;height:22px;transition:transform .15s}
.bnav .ni .ico svg{display:block;width:100%;height:100%}
.bnav .ni:active .ico{transform:scale(.8)}
.bnav .ni.on{color:var(--accent)}
.bnav .ni span:last-child{font-size:10px;display:block}
</style>
</head>
<body>
<div class="page">

<!-- 顶部 -->
<div class="top-bar">
  <div class="nav-back" onclick="location.href='scan.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">核销记录</div>
  <div class="nav-placeholder"></div>
</div>

<!-- 统计概览 -->
<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-label">全部核销</div></div>
  <div class="stat-card"><div class="stat-num" id="identityCount">0</div><div class="stat-label">身份权益</div></div>
  <div class="stat-card"><div class="stat-num" id="ticketCount">0</div><div class="stat-label">次数权益</div></div>
</div>

<!-- 日期筛选 -->
<div class="filter-bar" id="filterBar">
  <button class="filter-btn on" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="today">今天</button>
  <button class="filter-btn" data-filter="week">本周</button>
  <button class="filter-btn" data-filter="month">本月</button>
  <button class="filter-btn" data-filter="identity">身份权益</button>
  <button class="filter-btn" data-filter="ticket">次数权益</button>
</div>

<!-- 搜索 -->
<div class="search-box">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="searchInput" placeholder="搜索用户ID或权益名称..." oninput="renderList()">
</div>

<!-- 记录列表 -->
<div class="section-title">
  <span>核销记录 <span class="count" id="resultCount"></span></span>
</div>

<div id="recordList">
  <!-- 由 JS 渲染 -->
</div>

<div class="empty-state" id="emptyState" style="display:none">
  <div class="empty-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
  </div>
  <div class="empty-text">暂无核销记录</div>
  <div class="empty-sub">扫码核销后记录将在此展示</div>
</div>

</div>

<!-- 底部导航 -->
<div class="bnav">
  <button class="ni" onclick="location.href='scan.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span>首页</span>
  </button>
  <button class="ni on">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
    <span>记录</span>
  </button>
  <button class="ni" onclick="location.href='profile.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span>我的</span>
  </button>
</div>

<script>
// ── 模拟核销记录数据 ──
var allRecords = [
  { id:'WO20260713001', user:'U20240001', userName:'兰亭泼墨人', type:'identity', label:'身份权益', assetName:'兰亭雅集', assetSpec:'优享版', assetNo:'#0001', title:'景区VIP通行权', desc:'鹅池碑、御碑亭、曲水流觞、兰亭江', time:'2026-07-13 17:26', status:'success', tagText:'已核销' },
  { id:'WO20260713002', user:'U20240003', userName:'江南游客', type:'ticket', label:'次数权益', assetName:'兰亭雅集', assetSpec:'畅行版', assetNo:'#0002', title:'研学课程 · 第1次', desc:'书法研学体验', time:'2026-07-13 16:52', status:'success', tagText:'已核销' },
  { id:'WO20260713003', user:'U20240005', userName:'文化收藏家', type:'identity', label:'身份权益', assetName:'兰亭春禊', assetSpec:'学韵版', assetNo:'#0003', title:'跨城特权', desc:'绍兴、杭州、上海三地优先入场', time:'2026-07-13 15:30', status:'success', tagText:'已核销' },
  { id:'WO20260712001', user:'U20240001', userName:'兰亭泼墨人', type:'ticket', label:'次数权益', assetName:'兰亭雅集', assetSpec:'优享版', assetNo:'#0001', title:'研学课程 · 第2次', desc:'拓印体验', time:'2026-07-12 14:10', status:'success', tagText:'已核销' },
  { id:'WO20260712002', user:'U20240002', userName:'墨韵书生', type:'identity', label:'身份权益', assetName:'兰亭碑刻', assetSpec:'珍藏版', assetNo:'#0004', title:'景区VIP通行权', desc:'鹅池碑、御碑亭', time:'2026-07-12 11:05', status:'success', tagText:'已核销' },
  { id:'WO20260711001', user:'U20240001', userName:'兰亭泼墨人', type:'ticket', label:'次数权益', assetName:'兰亭雅集', assetSpec:'优享版', assetNo:'#0001', title:'研学课程 · 第3次', desc:'非遗手作体验', time:'2026-07-11 09:30', status:'success', tagText:'已核销' },
  { id:'WO20260710001', user:'U20240004', userName:'越地旅人', type:'identity', label:'身份权益', assetName:'兰亭春禊', assetSpec:'畅行版', assetNo:'#0005', title:'景区VIP通行权', desc:'曲水流觞、兰亭江', time:'2026-07-10 16:20', status:'success', tagText:'已核销' },
  { id:'WO20260709001', user:'U20240003', userName:'江南游客', type:'ticket', label:'次数权益', assetName:'兰亭雅集', assetSpec:'畅行版', assetNo:'#0002', title:'研学课程 · 第2次', desc:'书法研学体验', time:'2026-07-09 13:45', status:'success', tagText:'已核销' },
  { id:'WO20260708001', user:'U20240006', userName:'书法爱好者', type:'identity', label:'身份权益', assetName:'兰亭诗韵', assetSpec:'基础版', assetNo:'#0006', title:'跨城特权', desc:'绍兴、杭州优先入场', time:'2026-07-08 10:00', status:'success', tagText:'已核销' },
  { id:'WO20260705001', user:'U20240005', userName:'文化收藏家', type:'ticket', label:'次数权益', assetName:'兰亭春禊', assetSpec:'学韵版', assetNo:'#0003', title:'研学课程 · 第1次', desc:'书法研学体验', time:'2026-07-05 14:30', status:'success', tagText:'已核销' }
];

var currentFilter = 'all';
var pageSize = 5;
var currentPage = 1;

// ── 图标映射 ──
var iconMap = {
  identity: { bg:'rgba(63,139,109,.1)', c:'#3F8B6D', s:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>' },
  ticket: { bg:'rgba(206,147,216,.12)', c:'#8A5CFF', s:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/>' },
  physical: { bg:'rgba(79,195,247,.12)', c:'#398BFF', s:'<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>' }
};

// ── 筛选函数 ──
function isInToday(d){
  var n=new Date();var t=new Date(d);
  return t.getFullYear()===n.getFullYear()&&t.getMonth()===n.getMonth()&&t.getDate()===n.getDate();
}
function isInThisWeek(d){
  var n=new Date();var t=new Date(d);
  var start=new Date(n);start.setDate(n.getDate()-n.getDay());
  start.setHours(0,0,0,0);
  return t>=start;
}
function isInThisMonth(d){
  var n=new Date();var t=new Date(d);
  return t.getFullYear()===n.getFullYear()&&t.getMonth()===n.getMonth();
}

function getFilteredRecords(){
  var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  var list = allRecords.filter(function(r){
    // 类型筛选
    if(currentFilter==='identity' && r.type!=='identity') return false;
    if(currentFilter==='ticket' && r.type!=='ticket') return false;
    if(currentFilter==='today' && !isInToday(r.time)) return false;
    if(currentFilter==='week' && !isInThisWeek(r.time)) return false;
    if(currentFilter==='month' && !isInThisMonth(r.time)) return false;
    // 关键词搜索
    if(keyword){
      return r.user.toLowerCase().indexOf(keyword)!==-1 ||
             r.title.toLowerCase().indexOf(keyword)!==-1 ||
             r.userName.toLowerCase().indexOf(keyword)!==-1;
    }
    return true;
  });
  return list;
}

function renderList(){
  var list = getFilteredRecords();
  var total = list.length;

  // 更新统计
  document.getElementById('totalCount').textContent = total;
  document.getElementById('identityCount').textContent = list.filter(function(r){return r.type==='identity'}).length;
  document.getElementById('ticketCount').textContent = list.filter(function(r){return r.type==='ticket'}).length;
  document.getElementById('resultCount').textContent = '共'+total+'条';

  // 分页
  var paged = list.slice(0, currentPage * pageSize);
  var container = document.getElementById('recordList');
  var emptyEl = document.getElementById('emptyState');

  if(paged.length===0){
    container.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  var html = '';
  paged.forEach(function(r){
    var ico = iconMap[r.type] || iconMap.identity;
    html +=
      '<div class="history-item" onclick="viewDetail(\''+r.id+'\')">'+
        '<div class="hi-icon" style="background:'+ico.bg+';color:'+ico.c+'">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ico.s+'</svg>'+
        '</div>'+
        '<div class="hi-info">'+
          '<div class="hi-name">'+r.title+'</div>'+
          '<div class="hi-time">'+r.assetName+' ('+r.assetNo+') <span class="dot"></span> '+formatTime(r.time)+'</div>'+
          '<div class="hi-time" style="margin-top:1px">'+r.userName+' ('+r.user+')</div>'+
        '</div>'+
        '<span class="hi-tag '+r.type+'">'+r.label+'</span>'+
      '</div>';
  });
  container.innerHTML = html;

  // 加载更多
  if(paged.length < list.length){
    container.innerHTML +=
      '<div class="load-more">'+
        '<button onclick="loadMore()">加载更多 '+ (list.length - paged.length) +' 条</button>'+
      '</div>';
  }
}

function loadMore(){
  currentPage++;
  renderList();
}

function formatTime(t){
  var d = new Date(t);
  var now = new Date();
  var diff = (now - d) / 1000;
  if(diff < 60) return '刚刚';
  if(diff < 3600) return Math.floor(diff/60)+'分钟前';
  if(diff < 86400 && isInToday(t)) return Math.floor(diff/3600)+'小时前';
  var m = (d.getMonth()+1).toString().padStart(2,'0');
  var day = d.getDate().toString().padStart(2,'0');
  var h = d.getHours().toString().padStart(2,'0');
  var mi = d.getMinutes().toString().padStart(2,'0');
  if(d.getFullYear()===now.getFullYear()) return m+'月'+day+'日 '+h+':'+mi;
  return d.getFullYear()+'年'+m+'月'+day+'日';
}

function viewDetail(id){
  var r = allRecords.find(function(item){return item.id===id});
  if(!r) return;
  var data = {
    user: r.user,
    name: r.userName,
    type: r.type,
    label: r.label,
    assetName: r.assetName,
    assetSpec: r.assetSpec,
    assetNo: r.assetNo,
    title: r.title,
    desc: r.desc,
    time: r.time,
    code: r.id
  };
  var param = encodeURIComponent(JSON.stringify(data));
  location.href = 'success.html?data=' + param;
}

// ── 筛选切换 ──
document.getElementById('filterBar').addEventListener('click', function(e){
  var btn = e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  currentFilter = btn.dataset.filter;
  currentPage = 1;
  renderList();
});

// ── 初始化 ──
renderList();
</script>
</body>
</html>
