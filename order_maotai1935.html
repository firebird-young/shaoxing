<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>选择规格</title>
<style>
:root{
  --accent:#3F8B6D;--accent-contrast:#fff;--link:#3F8B6D;--muted:#a0a0a0;
  --bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;
  --border:#e0e0e0;--page-bg:#F0F0F0;
  --radius-sm:7px;--radius-card:7px;--radius-pill:9999px;
  --font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:var(--page-bg);position:relative;box-sizing:border-box;padding-bottom:90px}

/* ── 顶部导航 ── */
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--accent)}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#fff}
.nav-placeholder{width:32px}

/* ── 系列卡片 ── */
.series-card{margin:12px 16px;background:var(--bg);border-radius:var(--radius-card);padding:16px;display:flex;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.series-img{width:72px;aspect-ratio:1/1;border-radius:var(--radius-sm);background-position:center;background-size:cover;flex-shrink:0;background-color:#f5f5f5}
.series-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.series-name{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px}
.series-desc{font-size:11px;color:var(--ink-subtle)}
.series-tag{display:inline-block;font-size:10px;padding:2px 10px;border-radius:var(--radius-pill);background:rgba(63,139,109,.1);color:var(--accent);margin-top:6px;font-weight:600}

/* ── 区块卡片 ── */
.section-card{margin:12px 16px;background:var(--bg);border-radius:var(--radius-card);padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.sec-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px}
.sec-sub{font-size:11px;color:var(--ink-subtle);font-weight:400;margin-left:4px}

/* ── 规格列表 ── */
.spec-list{display:flex;flex-direction:column;gap:8px}
.spec-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;position:relative}
.spec-item:active{background:var(--page-bg)}
.spec-item.selected{border-color:var(--accent);background:rgba(63,139,109,.04)}
.spec-item.sold-out{opacity:.5;cursor:not-allowed;background:#f9f9f9}
.spec-item.sold-out:active{background:#f9f9f9}
.spec-item.sold-out .spec-price{color:#bbb}
.spec-sold-tag{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 8px;border-radius:4px;background:#eee;color:var(--ink-subtle);font-weight:600}
.spec-img{width:48px;aspect-ratio:1/1;border-radius:8px;background-position:center;background-size:cover;flex-shrink:0;background-color:#f5f5f7}
.spec-info{flex:1;min-width:0}
.spec-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.spec-benefits{display:flex;gap:4px;flex-wrap:wrap}
.spec-bf{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--page-bg);color:var(--ink-subtle)}
.spec-price{font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0}
.spec-check{width:20px;height:20px;border:2px solid #ddd;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.spec-item.selected .spec-check{border-color:var(--accent);background:var(--accent)}
.spec-check svg{width:12px;height:12px;color:#fff;display:none}
.spec-item.selected .spec-check svg{display:block}

/* ── 数量选择 ── */
.quantity-row{display:flex;align-items:center;justify-content:space-between}
.quantity-label{font-size:14px;color:var(--ink-muted)}
.quantity-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.quantity-ctrl button{width:36px;height:36px;border:none;background:var(--page-bg);font-size:18px;color:var(--ink-muted);cursor:pointer}
.quantity-ctrl button:active{background:#e8e8e8}
.quantity-ctrl button:disabled{color:#ccc;cursor:not-allowed}
.quantity-ctrl input{width:50px;height:36px;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-size:15px;font-weight:600;color:var(--ink);outline:none;background:var(--bg)}

/* ── 底部栏 ── */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid rgba(0,0,0,.05);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,4px));z-index:100;display:flex;align-items:center;justify-content:space-between}
.bottom-left{display:flex;flex-direction:column;gap:2px}
.total-price{display:flex;align-items:baseline;gap:4px}
.total-label{font-size:13px;color:var(--ink-muted)}
.total-value{font-size:22px;font-weight:700;color:var(--accent)}
.total-value small{font-size:13px}
.stock-warn{font-size:11px;color:var(--accent)}
.btn-submit{height:44px;padding:0 32px;border:none;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-submit:active{opacity:.9}
.btn-submit:disabled{background:#ccc;cursor:not-allowed}

/* ── Toast ── */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;font-size:14px;padding:12px 24px;border-radius:8px;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="page">

<div class="nav-bar">
  <div class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">选择规格</div>
  <div class="nav-placeholder"></div>
</div>

<div class="series-card">
  <div class="series-img" id="seriesImg" style="background-image:url('asset/兰亭雅集封面图.png')"></div>
  <div class="series-info">
    <div class="series-name">兰亭雅集</div>
  </div>
</div>

<div class="section-card">
  <div class="sec-title">选择规格<span class="sec-sub">不同规格对应不同权益</span></div>
  <div class="spec-list" id="specList"></div>
</div>

<div class="section-card">
  <div class="sec-title">购买数量</div>
  <div class="quantity-row">
    <span class="quantity-label">数量</span>
    <div class="quantity-ctrl">
      <button onclick="changeQty(-1)" id="btnMinus">−</button>
      <input type="number" value="1" min="1" max="10" id="qtyInput" readonly>
      <button onclick="changeQty(1)" id="btnPlus">+</button>
    </div>
  </div>
</div>

</div>

<div class="bottom-bar">
  <div class="bottom-left">
    <div class="total-price">
      <span class="total-label">合计：</span>
      <span class="total-value"><small>¥</small><span id="totalPrice">199</span></span>
    </div>
    <div class="stock-warn" id="stockWarn" style="display:none"></div>
  </div>
  <button class="btn-submit" id="btnSubmit" onclick="goConfirm()">下一步</button>
</div>

<div class="toast" id="toast"></div>

<script>
var specs = [
  { name:'畅行版', img:'asset/畅行版.png', price:199, benefits:['景区VIP通行权'], stock:999 },
  { name:'学韵版', img:'asset/学韵版.png', price:299, benefits:['景区VIP通行权','研学课程'] },
  { name:'优享版', img:'asset/优享版.png', price:399, benefits:['景区VIP通行权','研学课程','文创实物','跨城特权'] }
];

var selIdx = 0;
var quantity = 1;

function renderSpecs(){
  var html = '';
  specs.forEach(function(sp, i){
    var sel = i === selIdx ? ' selected' : '';
    var so  = sp.soldOut ? ' sold-out' : '';
    var checked = i === selIdx && !sp.soldOut ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : '';
    var tag = sp.soldOut ? '<span class="spec-sold-tag">售罄</span>' : '';
    html +=
      '<div class="spec-item'+sel+so+'" onclick="'+(sp.soldOut?'':'selectSpec('+i+')')+'">'+
        '<div class="spec-img" style="background-image:url(\''+sp.img+'\')"></div>'+
        '<div class="spec-info"><div class="spec-name">'+sp.name+'</div><div class="spec-benefits">'+sp.benefits.map(function(b){ return '<span class="spec-bf">'+b+'</span>'; }).join('')+'</div></div>'+
        '<div class="spec-price">¥'+sp.price+'</div>'+
        '<div class="spec-check">'+checked+'</div>'+
        tag+
      '</div>';
  });
  document.getElementById('specList').innerHTML = html;
}

function selectSpec(i){
  var sp = specs[i];
  if(sp.soldOut) return;
  selIdx = i;
  if(sp.stock && quantity > sp.stock) quantity = sp.stock;
  document.getElementById('qtyInput').value = quantity;
  document.getElementById('seriesImg').style.backgroundImage = 'url('+sp.img+')';
  renderSpecs();
  updateControls();
}

function updateTotal(){
  document.getElementById('totalPrice').textContent = specs[selIdx].price * quantity;
}

function updateControls(){
  var sp = specs[selIdx];
  updateTotal();
  var btnMax = sp.stock ? sp.stock + 1 : 999;
  document.getElementById('btnMinus').disabled = quantity <= 1;
  document.getElementById('btnPlus').disabled = quantity >= btnMax || sp.soldOut;
  document.getElementById('btnSubmit').disabled = sp.soldOut || (sp.stock && quantity > sp.stock);
  document.getElementById('stockWarn').style.display = 'none';
}

function changeQty(delta){
  var n = quantity + delta;
  var sp = specs[selIdx];
  if(n < 1) return;
  if(sp.stock && n > sp.stock + 1) return;
  if(sp.stock && n > sp.stock){ showToast('超出限购数或商品库存上限'); return; }
  quantity = n;
  document.getElementById('qtyInput').value = quantity;
  updateControls();
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show'); void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function goConfirm(){
  var sp = specs[selIdx];
  if(sp.soldOut || (sp.stock && quantity > sp.stock)) return;
  location.href = 'order_confirm.html?spec='+encodeURIComponent(sp.name)+'&img='+encodeURIComponent(sp.img)+'&price='+sp.price+'&qty='+quantity+'&bfs='+encodeURIComponent(sp.benefits.join(','))+'&series=兰亭雅集';
}

renderSpecs();
selectSpec(0);
</script>

</body>
</html>
