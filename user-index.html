<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>绍兴数资</title>
<style>
:root{
  --accent:#3F8B6D;--accent-contrast:#fff;--link:#3F8B6D;--muted:#a0a0a0;
  --bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;
  --border:#e0e0e0;--page-bg:#F0F0F0;
  --radius-sm:7px;--radius-card:7px;--radius-pill:9999px;
  --font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部 ── */
.header{display:flex;justify-content:space-between;align-items:center}
.logo{height:32px;width:auto}
.logo-text{font-size:15px;font-weight:700;color:var(--ink);margin-left:6px;white-space:nowrap;font-family:var(--font-display)}
.header-icons{display:flex;gap:16px}
.header-icons .hi{width:22px;height:22px;color:#fff;cursor:pointer;transition:transform .15s}
.header-icons .hi:active{transform:scale(.8)}
.header-icons .hi svg{display:block;width:100%;height:100%}

/* ── 用户卡 ── */
.user-card{margin-top:16px;background:linear-gradient(135deg,#3F8B6D,#2d6b53);border-radius:var(--radius-card);padding:20px;color:var(--accent-contrast);display:flex;justify-content:space-between;align-items:center;animation:fadeUp .4s ease-out}
.user-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.avatar{width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,.25);object-fit:cover;display:block;flex-shrink:0}
.user-left h2{font-size:17px;font-weight:700;margin:0 0 2px}
.user-left p{font-size:10px;margin:0;opacity:.55;display:flex;align-items:center;gap:3px;cursor:pointer}
.user-left p svg{width:11px;height:11px;opacity:.7}
.verify-btn{height:40px;padding:0 18px;border:none;border-radius:var(--radius-pill);background:rgba(255,255,255,.25);color:#fff;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;letter-spacing:.5px;transition:background .2s}
.verify-btn:active{background:rgba(255,255,255,.35)}

/* ── Banner 轮播 ── */
.banner-wrap{margin-top:16px;border-radius:var(--radius-card);overflow:hidden;position:relative;animation:fadeUp .4s ease-out .08s both}
.banner-slider{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.banner-slider img{width:100%;flex-shrink:0;display:block;border-radius:var(--radius-card)}
.banner-dots{display:flex;justify-content:center;gap:4px;padding:8px 0 0}
.banner-dots span{width:5px;height:5px;border-radius:50%;background:#ddd;transition:all .3s;cursor:pointer}
.banner-dots span.on{width:18px;border-radius:3px;background:var(--accent)}

/* ── 消息走马灯 ── */
.marquee-wrap{margin-top:14px;background:#fff;border-radius:var(--radius-card);padding:12px 14px;display:flex;align-items:center;gap:10px;animation:fadeUp .4s ease-out .12s both;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.marquee-icon{width:20px;height:20px;flex-shrink:0;color:var(--accent)}
.marquee-icon svg{display:block;width:100%;height:100%}
.marquee-track{flex:1;overflow:hidden;height:46px;position:relative}
.marquee-list{position:absolute;left:0;top:0;width:100%;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.marquee-item{height:23px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-muted);overflow:hidden;cursor:pointer;padding:0}
.marquee-tag{flex-shrink:0;font-size:9px;padding:1px 7px;border-radius:3px;font-weight:600;white-space:nowrap}
.marquee-tag.platform{background:#E8F4FD;color:#2980b9}
.marquee-tag.activity{background:#FFF3E0;color:#e65100}
.marquee-item .mt-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;line-height:23px;color:#666}
.marquee-item:hover .mt-text{color:var(--accent)}
.marquee-more{flex-shrink:0;font-size:11px;color:#bbb;cursor:pointer;white-space:nowrap;transition:color .2s}
.marquee-more:active{color:var(--accent)}

/* ── 区块标题 ── */
.section{margin-top:24px;animation:fadeUp .4s ease-out .16s both}
.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title span{font-size:17px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
.section-title span::before{content:'';display:inline-block;width:3px;height:16px;background:var(--accent);border-radius:2px}
.section-title a{font-size:12px;color:var(--ink-subtle);cursor:pointer;padding:4px 0;transition:color .2s}
.section-title a:active{color:var(--accent)}

/* ── 当下热卖（2列网格） ── */
.goods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.goods-card{background:var(--bg);border-radius:var(--radius-card);overflow:hidden;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.goods-card:active{transform:scale(.96);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.goods-img{width:100%;aspect-ratio:1/1;background-position:center;background-size:cover;position:relative}
.goods-card h4{font-size:13px;font-weight:600;padding:10px 12px 0;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
.goods-card .tags{padding:0 12px;margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.goods-card .tags span{display:inline-block;font-size:9px;padding:2px 8px;border-radius:4px;font-weight:500}
.goods-card .t-sale-all{color:#2980b9;background:#E8F4FD}
.goods-card .t-sale-prior{color:#f0ad4e;background:#FFF8EC}
.goods-card .t-sale-lottery{color:#6c5ce7;background:#F3F0FF}
.goods-card .price-row{display:flex;align-items:baseline;padding:4px 12px 0;gap:8px;justify-content:space-between}
.goods-card .price{color:var(--accent);font-size:20px;font-weight:700}
.goods-card .price small{font-size:11px;font-weight:400;color:var(--ink-subtle)}
.goods-card .sold{color:var(--ink-subtle);font-size:10px}
.goods-card .issuer{color:var(--ink-subtle);font-size:10px;display:inline-block;padding:4px 10px;margin:6px 0 10px 12px;background:#f5f5f5;border-radius:4px;align-self:flex-start}

/* ── 底部TabBar ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100;box-sizing:border-box}
.bnav .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:4px 10px;font-size:10px;color:var(--ink-subtle);transition:color .2s}
.bnav .ni .ico{width:22px;height:22px;transition:transform .15s}
.bnav .ni .ico svg{display:block;width:100%;height:100%}
.bnav .ni:active .ico{transform:scale(.8)}
.bnav .ni.on{color:var(--accent)}
.bnav .ni.on .ico{transform:scale(1.05)}
.bnav .ni span:last-child{font-size:10px;display:block}

/* ── 发售日历 ── */
.calendar-wrap{background:var(--bg);border-radius:var(--radius-card);padding:16px 14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.cal-day-block{margin-bottom:18px}
.cal-day-block:last-child{margin-bottom:0}
.cal-day-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cal-day-hdr-date{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#3a6b52;background:#E8F4F0;padding:5px 12px;border-radius:8px;white-space:nowrap}
.cal-prod{display:flex;align-items:stretch;gap:0;margin-bottom:12px;cursor:pointer;transition:background .12s;border-radius:var(--radius-sm)}
.cal-prod:last-child{margin-bottom:0}
.cal-prod:active{background:#fafafa}
.cal-prod-timeline{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:54px;padding-top:2px}
.cal-prod-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0}
.cal-prod-line{flex:1;width:1.5px;background:#e0e0e0;margin:4px 0;min-height:10px}
.cal-prod:last-child .cal-prod-line{background:transparent}
.cal-prod-time-top{font-size:11px;font-weight:700;color:#3a6b52;margin-bottom:6px;padding:3px 9px;background:#E8F4F0;border-radius:6px;white-space:nowrap}
.cal-prod-body{flex:1;display:flex;align-items:flex-start;gap:12px;min-width:0;padding:0 4px}
.cal-prod-img{width:60px;aspect-ratio:1/1;border-radius:var(--radius-sm);background-position:center;background-size:cover;flex-shrink:0}
.cal-prod-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.cal-prod-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-prod-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:0}
.cal-prod-tags span{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500}
.cal-prod-tags .t-sale-all{color:#fff;background:#4A90D9}
.cal-prod-tags .t-sale-prior{color:#fff;background:#F5A623}
.cal-prod-tags .t-sale-lottery{color:#fff;background:#6c5ce7}
.cal-prod-price{font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0;align-self:center}
.cal-prod-price small{font-size:10px;font-weight:400;color:var(--ink-subtle)}

/* ── 发售日历弹窗 ── */
.cal-modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.cal-modal-mask.show{opacity:1;pointer-events:auto}
.cal-modal{width:100%;max-width:430px;max-height:75vh;background:var(--bg);border-radius:var(--radius-card) var(--radius-card) 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.cal-modal-mask.show .cal-modal{transform:translateY(0)}
.cal-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 20px;background:var(--accent);border-radius:var(--radius-card) var(--radius-card) 0 0;position:sticky;top:0;z-index:2}
.cal-modal-hdr h3{font-size:16px;font-weight:700;color:#fff}
.cal-modal-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.cal-modal-close svg{width:16px;height:16px;color:#fff}
.cal-modal-body{padding:16px 20px 24px;background:var(--bg)}

/* ── 动画 ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<script>
// ═══ 发售日历数据 ═══
var calendarData = [
  { date:'05/11 周六', time:'10:00', name:'兰亭碑刻', img:'asset/兰亭碑刻封面图.png', cat:'tour', catLabel:'文旅', sale:'优先购', saleCls:'t-sale-prior', limit:'限量888份', price:'¥299', status:'优先购' },
  { date:'05/11 周六', time:'14:00', name:'兰亭春禊', img:'asset/兰亭春禊封面图.png', cat:'tour', catLabel:'文旅', sale:'全民购', saleCls:'t-sale-all', limit:'限量2000份', price:'¥199', status:'全民购' },
  { date:'05/12 周日', time:'10:00', name:'兰亭雅集', img:'asset/兰亭雅集封面图.png', cat:'tour', catLabel:'文旅', sale:'抽签购', saleCls:'t-sale-lottery', limit:'限量666份', price:'¥399', status:'抽签购' }
];

var catBadgeCls = { food:'ba-food', ent:'ba-ent', tour:'ba-tour' };

// ═══ 首页预览（时间线样式，最多2条） ═══
function renderCalendarPreview(){
  var list = calendarData.slice(0, 2);
  var grouped = {};
  list.forEach(function(item){
    if(!grouped[item.date]) grouped[item.date] = [];
    grouped[item.date].push(item);
  });
  var html = '';
  Object.keys(grouped).forEach(function(date){
    html += '<div class="cal-day-block">';
    html +=   '<div class="cal-day-hdr"><span class="cal-day-hdr-date">'+date+'</span></div>';
    grouped[date].forEach(function(item, idx, arr){
      var isLast = idx === arr.length - 1;
      html +=
        '<div class="cal-prod" onclick="showCalendarModal()">'+
          '<div class="cal-prod-timeline">'+
            '<div class="cal-prod-time-top">'+item.time+'</div>'+
            '<div class="cal-prod-dot"></div>'+
            (isLast ? '' : '<div class="cal-prod-line"></div>')+
          '</div>'+
          '<div class="cal-prod-body">'+
            '<div class="cal-prod-img" style="background-image:url(\''+item.img+'\')"></div>'+
            '<div class="cal-prod-info">'+
              '<div class="cal-prod-name">'+item.name+'</div>'+
              '<div class="cal-prod-tags">'+
                '<span class="'+item.saleCls+'">'+item.sale+'</span>'+
                '<span style="color:var(--ink-subtle);background:#f0f0f0">'+item.limit+'</span>'+
              '</div>'+
            '</div>'+
            '<div class="cal-prod-price">'+item.price+'</div>'+
          '</div>'+
        '</div>';
    });
    html += '</div>';
  });
  document.getElementById('calendarPreview').innerHTML = html;
}

// ═══ 弹窗完整列表 ═══
function renderCalendarFull(){
  var grouped = {};
  calendarData.forEach(function(item){
    if(!grouped[item.date]) grouped[item.date] = [];
    grouped[item.date].push(item);
  });
  var html = '';
  Object.keys(grouped).forEach(function(date){
    html += '<div class="cal-day-group" style="margin-bottom:20px">';
    html +=   '<div class="cal-day-hdr" style="margin-bottom:12px"><span class="cal-day-hdr-date">'+date+'</span></div>';
    grouped[date].forEach(function(item, idx, arr){
      var isLast = idx === arr.length - 1;
      html +=
        '<div class="cal-prod" onclick="event.stopPropagation()">'+
          '<div class="cal-prod-timeline">'+
            '<div class="cal-prod-time-top">'+item.time+'</div>'+
            '<div class="cal-prod-dot"></div>'+
            (isLast ? '' : '<div class="cal-prod-line"></div>')+
          '</div>'+
          '<div class="cal-prod-body">'+
            '<div class="cal-prod-img" style="background-image:url(\''+item.img+'\')"></div>'+
            '<div class="cal-prod-info">'+
              '<div class="cal-prod-name">'+item.name+'</div>'+
              '<div class="cal-prod-tags">'+
                '<span class="'+item.saleCls+'">'+item.sale+'</span>'+
                '<span style="color:var(--ink-subtle);background:#f0f0f0">'+item.limit+'</span>'+
              '</div>'+
            '</div>'+
            '<div class="cal-prod-price">'+item.price+'</div>'+
          '</div>'+
        '</div>';
    });
    html += '</div>';
  });
  document.getElementById('calendarFull').innerHTML = html;
}

function showCalendarModal(){
  renderCalendarFull();
  document.getElementById('calendarModal').classList.add('show');
}
function closeCalendar(e){
  if(e && e.target !== document.getElementById('calendarModal')) return;
  document.getElementById('calendarModal').classList.remove('show');
}

// ═══ Banner 自动轮播 ═══
(function(){
  var slider = document.getElementById('bannerSlider');
  var dots = document.querySelectorAll('#bannerDots span');
  var idx = 0, total = 2;
  setInterval(function(){
    idx = (idx + 1) % total;
    slider.style.transform = 'translateX(-' + (idx * 100) + '%)';
    dots.forEach(function(d,i){ d.className = i === idx ? 'on' : ''; });
  }, 4000);
  dots.forEach(function(d,i){
    d.addEventListener('click',function(){
      idx = i;
      slider.style.transform = 'translateX(-' + (idx * 100) + '%)';
      dots.forEach(function(dd,j){ dd.className = j === idx ? 'on' : ''; });
    });
  });
})();
