<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>资产详情</title>
<style>
:root{
  --accent:#3F8B6D;--accent-contrast:#fff;--link:#3F8B6D;--muted:#a0a0a0;
  --bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;
  --border:#e0e0e0;--page-bg:#F0F0F0;
  --radius-sm:7px;--radius-card:7px;--radius-pill:9999px;
  --font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{margin:0;width:100%;min-height:100%}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 16px}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.2);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:700;color:#fff}
.nav-placeholder{width:32px}

.overview-card{background:var(--bg);border-radius:var(--radius-card);padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.ov-img{width:64px;aspect-ratio:1/1;border-radius:var(--radius-sm);background-position:center;background-size:cover;flex-shrink:0}
.ov-info{flex:1;min-width:0}
.ov-name{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:10px}
.ov-hold{display:inline-flex;align-items:center;gap:4px;background:var(--page-bg);border-radius:var(--radius-pill);padding:4px 12px}
.ov-hold-num{font-size:18px;font-weight:700;color:var(--accent)}
.ov-hold-label{font-size:11px;color:var(--ink-subtle)}

.sec-title{display:flex;align-items:center;gap:8px;padding:14px 0 8px}
.sec-title::before{content:'';width:4px;height:16px;background:var(--accent);border-radius:2px;flex-shrink:0}
.sec-title span{font-size:15px;font-weight:700;color:var(--ink)}

.asset-instance{background:var(--bg);border-radius:20px;margin-bottom:14px;box-shadow:var(--shadow,0 4px 20px rgba(0,0,0,.06));overflow:hidden}
.ai-header{padding:16px 18px;cursor:pointer;transition:all .2s}
.ai-header:active{background:var(--page-bg)}
.ai-header-row1{display:flex;align-items:center;gap:14px}
.ai-thumb{width:52px;aspect-ratio:1/1;border-radius:14px;background-position:center;background-size:cover;flex-shrink:0}
.ai-header-left{flex:1;min-width:0}
.ai-number{font-size:16px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ai-spec-name{font-size:12px;font-weight:500;color:var(--ink-muted)}
.ai-number svg{width:18px;height:18px;color:var(--accent);flex-shrink:0}
.ai-header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.ai-sum-tag{font-size:11px;padding:5px 14px;border-radius:var(--radius-pill);font-weight:600;white-space:nowrap}
.st-verified{background:rgba(63,139,109,.1);color:var(--accent)}
.st-partial{background:#FFF8EC;color:#f0ad4e}
.st-unverified{background:var(--page-bg);color:var(--ink-subtle)}
.ai-expand{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--page-bg);transition:all .25s}
.ai-expand.open{background:rgba(63,139,109,.08)}
.ai-expand svg{width:14px;height:14px;color:var(--ink-subtle);transition:transform .25s}
.ai-expand.open svg{transform:rotate(180deg);color:var(--accent)}
.ai-header-row2{display:flex;align-items:center;gap:10px;padding-top:10px;margin-top:10px}
.ai-time{font-size:11px;color:var(--ink-subtle)}
.ai-dot{color:var(--border);font-size:10px}
.ai-hash{font-size:11px;color:var(--ink-subtle);font-family:'SF Mono','Menlo','Consolas',monospace;cursor:pointer;text-decoration:none}
.ai-hash:active{color:var(--accent)}

.ai-benefits{display:none;padding:4px 0 8px}
.ai-benefits.show{display:block;animation:slideDown .25s ease-out}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:500px}}
.ai-benefit{display:flex;align-items:center;padding:12px 18px;cursor:pointer;transition:background .15s;gap:12px}
.ai-benefit:hover{background:var(--page-bg)}
.ai-bf-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-bf-icon svg{width:18px;height:18px}
.ai-bf-name{font-size:14px;font-weight:600;color:var(--ink);flex:1;min-width:0}
.ai-bf-extra{font-size:11px;color:var(--ink-subtle);margin-right:8px;flex-shrink:0}
.ai-bf-tag{font-size:11px;padding:4px 12px;border-radius:var(--radius-pill);font-weight:600;white-space:nowrap}
.bt-verified{background:rgba(63,139,109,.1);color:var(--accent)}
.bt-unverified{background:var(--page-bg);color:var(--ink-subtle)}

.hint-text{text-align:center;font-size:11px;color:var(--ink-subtle);padding:12px 0 8px}

.action-bar{display:flex;gap:10px;padding:14px 0}
.btn-outline{flex:1;height:44px;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--ink-muted);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-outline:active{background:var(--page-bg)}
.btn-primary{flex:1;height:44px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:active{opacity:.9}
.btn-outline svg,.btn-primary svg{width:16px;height:16px}

.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-mask.show{opacity:1;pointer-events:auto}
.modal-card{width:100%;max-width:430px;max-height:80vh;background:var(--bg);border-radius:var(--radius-card) var(--radius-card) 0 0;padding:0 20px 24px;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.modal-mask.show .modal-card{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.modal-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--ink-subtle);margin-bottom:18px}

.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--ink-subtle);margin-bottom:6px;display:block;font-weight:500}
.form-input{width:100%;height:44px;border:1px solid var(--border);border-radius:10px;padding:0 14px;font-size:14px;color:var(--ink);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{height:80px;padding:12px 14px;resize:none}
.form-submit{width:100%;height:48px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px}
.form-submit:active{opacity:.9}
.form-submit.loading{opacity:.7;pointer-events:none}

.logistics{padding:4px 0}
.logis-item{display:flex;gap:12px;padding:12px 0;position:relative}
.logis-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;position:relative;z-index:1}
.logis-dot.active{background:var(--accent);box-shadow:0 0 0 4px rgba(63,139,109,.12)}
.logis-dot.done{background:var(--accent)}
.logis-dot.pending{background:#ddd}
.logis-info{flex:1;min-width:0}
.logis-info .l-tit{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.logis-info .l-time{font-size:11px;color:var(--ink-subtle);margin-bottom:2px}
.logis-info .l-desc{font-size:11px;color:var(--ink-subtle)}
.logis-line{position:absolute;left:4px;top:22px;width:2px;height:calc(100% - 10px);background:var(--border);z-index:0}
.logis-item:last-child .logis-line{display:none}

.shipping-info{background:var(--page-bg);border-radius:12px;padding:14px;margin-bottom:16px}
.si-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px}
.si-row .si-l{color:var(--ink-subtle)}
.si-row .si-r{color:var(--ink);font-weight:500}

.success-box{text-align:center;padding:24px 0 8px}
.success-box .s-check{width:56px;height:56px;border-radius:50%;background:rgba(63,139,109,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.success-box .s-check svg{width:28px;height:28px;color:var(--accent)}
.success-box .s-tit{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px}
.success-box .s-desc{font-size:12px;color:var(--ink-subtle)}

/* ── 权益弹窗 ── */
.benefit-modal .modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.benefit-modal .modal-hdr .mh-left{flex:1}
.benefit-modal .modal-hdr .mh-left .modal-title{margin-bottom:0}
.benefit-modal .modal-hdr .mh-left .modal-sub{margin-bottom:0;margin-top:4px}
.benefit-status{flex-shrink:0;font-size:12px;font-weight:600;padding:5px 14px;border-radius:var(--radius-pill);white-space:nowrap}
.benefit-status.valid{background:rgba(63,139,109,.1);color:var(--accent)}
.benefit-status.partial{background:#FFF8EC;color:#f0ad4e}
.benefit-status.used{background:var(--page-bg);color:var(--ink-muted);border:1px solid var(--border)}

.benefit-desc{font-size:13px;color:var(--ink-muted);line-height:1.6;background:var(--page-bg);padding:14px 16px;border-radius:12px;margin-bottom:18px}

.qr-section{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;padding:4px 0 8px;-webkit-overflow-scrolling:touch}
.qr-section::-webkit-scrollbar{display:none}
.qr-card{flex-shrink:0;width:170px;background:var(--bg);border-radius:14px;padding:14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);position:relative}
.qr-card .qr-img{width:140px;height:140px;border-radius:10px;overflow:hidden;position:relative;border:2px solid var(--border);padding:4px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
.qr-card .qr-img img{width:100%;height:100%;object-fit:contain;display:block;border-radius:6px}
.qr-card .qr-used{position:absolute;inset:4px;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;border-radius:6px;z-index:1}
.qr-card .qr-used span{background:var(--page-bg);color:var(--ink-subtle);font-size:13px;font-weight:600;padding:5px 16px;border-radius:6px;border:1px solid var(--border)}
.qr-expiry{font-size:12px;color:var(--ink-subtle);margin-top:14px;display:flex;align-items:center;gap:6px;padding-top:12px;border-top:1px dashed var(--border)}
.qr-expiry svg{width:14px;height:14px;flex-shrink:0}
</style>
</head>

function calcSummary(bf){
  var allV = true, noneV = true;
  for(var i=0;i<bf.length;i++){
    if(bf[i].v) noneV = false; else allV = false;
  }
  if(allV) return 'verified';
  if(noneV) return 'unverified';
  return 'partial';
}

function toggleCard(cid){
  var card = document.getElementById(cid);
  var bf = card.querySelector('.ai-benefits');
  var exp = card.querySelector('.ai-expand');
  if(bf.classList.contains('show')){
    bf.classList.remove('show'); exp.classList.remove('open');
  } else {
    document.querySelectorAll('.ai-benefits.show').forEach(function(el){
      el.classList.remove('show');
      el.parentNode.querySelector('.ai-expand').classList.remove('open');
    });
    bf.classList.add('show'); exp.classList.add('open');
  }
}

  if(usedDate) html += '<div style="font-size:10px;color:var(--ink-subtle);margin-top:6px;text-align:center">'+usedDate+'</div>';
  html += '</div>';
  return html;

function submitWenChuang(idx, bi){
  var name = document.getElementById('fName').value.trim();
  var phone = document.getElementById('fPhone').value.trim();
  var addr = document.getElementById('fAddr').value.trim();
  if(!name){ alert('请输入收件人姓名'); return; }
  if(!phone){ alert('请输入联系电话'); return; }
  if(!addr){ alert('请输入详细地址'); return; }

  var btn = document.getElementById('fSubmit');
  btn.textContent = '提交中...';
  btn.classList.add('loading');

  setTimeout(function(){
    var bf = data.list[idx].bf[bi];
    bf.v = true;
    bf.d = '2026-07-15';
    bf.a = addr;
    bf.cd = 'WC20260715'+(idx+1);
    delete bf.x;
    bf.shipping = {
      name: name,
      phone: phone.substring(0,3)+'****'+phone.substring(phone.length-4),
      addr: addr,
      exp: '顺丰速运',
      expNo: 'SF'+Date.now().toString().substring(5)
    };
    bf.logistics = [
      { s:'active', t:'2026-06-10 '+new Date().toTimeString().substring(0,8), d:'核销成功，商家正在备货中', loc:'茅台酒厂' }
    ];

    var content = document.getElementById('modalContent');
    content.innerHTML =
      '<div class="success-box">'+
        '<div class="s-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'+
        '<div class="s-tit">核销提交成功</div>'+
        '<div class="s-desc">商家将在1-3个工作日内安排发货，届时可在此查看物流信息</div>'+
        '<button class="form-submit" style="margin-top:20px" onclick="closeModal();location.reload()">我知道了</button>'+
      '</div>';
  }, 1200);
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modalMask')) return;
  document.getElementById('modalMask').classList.remove('show');
  document.body.style.overflow = '';
}
