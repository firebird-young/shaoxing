<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的 - 商家客户端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;width:100%;background:#fff;font-family:-apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;color:#555;display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#1a6b4c 0%,#3f9b7a 25%,#e8f5ee 50%,#f5f5f5 100%);padding:0 0 80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部返回 + 标题 ── */
.top-bar{display:flex;align-items:center;padding:12px 16px;gap:12px}
.top-bar .back-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.25);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;transition:background .2s}
.top-bar .back-btn:active{background:rgba(255,255,255,.4)}
.top-bar .back-btn svg{width:18px;height:18px;display:block}
.top-bar .title{font-size:17px;font-weight:600;color:#fff;flex:1;text-align:center;margin-right:32px}

/* ── 顶部头像区 ── */
.profile-header{text-align:center;padding:20px 16px 24px}
.profile-avatar-wrap{position:relative;width:80px;height:80px;margin:0 auto 14px;cursor:pointer}
.profile-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.5);display:block;box-shadow:0 4px 16px rgba(26,107,76,.2)}
.profile-avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s}
.profile-avatar-wrap:active .profile-avatar-overlay{opacity:1}
.profile-avatar-overlay svg{width:24px;height:24px;color:#fff;display:block}
.profile-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,.1)}
.profile-account{font-size:13px;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;gap:5px}
.profile-account svg{width:13px;height:13px;display:block}

/* ── 统计卡片 ── */
.stats-card{background:#fff;border-radius:14px;margin:0 16px 14px;padding:18px 12px;display:flex;align-items:center;box-shadow:0 2px 12px rgba(26,107,76,.08)}
.stats-item{flex:1;text-align:center;position:relative}
.stats-item:not(:last-child)::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:1px;height:30px;background:#f0f0f0}
.stats-num{font-size:24px;font-weight:800;color:#1a6b4c;margin-bottom:2px;line-height:1.2}
.stats-label{font-size:11px;color:#999}

/* ── 菜单卡片 ── */
.menu-card{background:#fff;border-radius:14px;margin:0 16px 14px;overflow:hidden;box-shadow:0 2px 12px rgba(26,107,76,.06)}
.menu-item{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid #f5f5f5}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:#f0faf5}
.menu-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-icon svg{width:17px;height:17px;display:block}
.menu-text{flex:1;font-size:14px;font-weight:500;color:#222}
.menu-extra{font-size:11px;color:#bbb;display:flex;align-items:center;gap:4px}
.menu-arrow{width:14px;height:14px;color:#ccc;flex-shrink:0;display:block}

/* ── 退出按钮 ── */
.logout-btn{display:block;margin:16px 16px 0;height:46px;border:none;border-radius:12px;background:linear-gradient(135deg,#1a6b4c,#3f9b7a);color:#fff;font-size:15px;font-weight:600;cursor:pointer;text-align:center;line-height:46px;transition:opacity .2s;letter-spacing:1px}
.logout-btn:active{opacity:.85}

/* ── 版本信息 ── */
.version-info{text-align:center;padding:20px 16px 0}
.version-info span{font-size:11px;color:rgba(255,255,255,.3)}

/* ── 底部导航 ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100;box-sizing:border-box}
.bnav .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:4px 10px;font-size:10px;color:#bbb;transition:color .2s}
.bnav .ni .ico{width:22px;height:22px;transition:transform .15s}
.bnav .ni .ico svg{display:block;width:100%;height:100%}
.bnav .ni:active .ico{transform:scale(.8)}
.bnav .ni.on{color:#1a6b4c}
.bnav .ni span:last-child{font-size:10px;display:block}

/* ── 退出确认弹窗 ── */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center}
.modal-mask.show{display:flex}
.modal-box{background:#fff;border-radius:16px;width:280px;padding:28px 24px 20px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-box .modal-title{font-size:16px;font-weight:600;color:#222;margin-bottom:8px}
.modal-box .modal-desc{font-size:13px;color:#999;margin-bottom:20px;line-height:1.6}
.modal-box .modal-actions{display:flex;gap:10px}
.modal-box .modal-actions button{flex:1;height:42px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
.modal-box .btn-cancel{border:1px solid #e0e0e0;background:#fff;color:#666}
.modal-box .btn-cancel:active{background:#f5f5f5}
.modal-box .btn-confirm{border:none;background:linear-gradient(135deg,#1a6b4c,#3f9b7a);color:#fff}
.modal-box .btn-confirm:active{opacity:.9}
</style>
</head>
<body>
<div class="page">

<!-- 顶部返回 -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <span class="title">个人中心</span>
</div>

<!-- 顶部个人信息 -->
<div class="profile-header">
  <div class="profile-avatar-wrap" onclick="document.getElementById('avatarInput').click()">
    <img class="profile-avatar" id="avatarImg" src="../asset/绍兴兰亭logo.png" alt="" onerror="this.style.display='none'">
    <div class="profile-avatar-overlay">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="changeAvatar(event)">
  </div>
  <div class="profile-name" id="merchantName">-</div>
  <div class="profile-account">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
    <span id="merchantAccount">-</span>
  </div>
</div>

<!-- 统计数据 -->
<div class="stats-card">
  <div class="stats-item">
    <div class="stats-num">128</div>
    <div class="stats-label">今日核销</div>
  </div>
  <div class="stats-item">
    <div class="stats-num">1,560</div>
    <div class="stats-label">本月核销</div>
  </div>
  <div class="stats-item">
    <div class="stats-num">99%</div>
    <div class="stats-label">核销率</div>
  </div>
</div>

<!-- 菜单列表 -->
<div class="menu-card">
  <div class="menu-item" onclick="location.href='history.html'">
    <div class="menu-icon" style="background:rgba(26,107,76,.1);color:#1a6b4c">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <span class="menu-text">核销记录</span>
    <span class="menu-extra">查看全部 <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
  </div>
  <div class="menu-item" onclick="location.href='../merchant/dashboard.html'">
    <div class="menu-icon" style="background:rgba(26,107,76,.1);color:#1a6b4c">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    </div>
    <span class="menu-text">商家管理中心</span>
    <span class="menu-extra">PC 端 <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
  </div>
  <div class="menu-item" onclick="showLogoutModal()">
    <div class="menu-icon" style="background:rgba(255,77,79,.08);color:#ff4d4f">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    </div>
    <span class="menu-text" style="color:#ff4d4f">退出登录</span>
  </div>
</div>

<!-- 版本信息 -->
<div class="version-info">
  <span>商家核销系统 v1.0.0</span>
</div>

</div>

<!-- 底部导航 -->
<div class="bnav">
  <button class="ni" onclick="location.href='scan.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span>首页</span>
  </button>
  <button class="ni" onclick="location.href='history.html'">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
    <span>记录</span>
  </button>
  <button class="ni on">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <span>我的</span>
  </button>
</div>

<!-- 退出确认弹窗 -->
<div class="modal-mask" id="logoutModal" onclick="closeLogoutModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">确认退出</div>
    <div class="modal-desc">确定要退出当前商家账号吗？</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLogoutModal()">取消</button>
      <button class="btn-confirm" onclick="doLogout()">退出</button>
    </div>
  </div>
</div>

<script>
// ── 加载商家信息 ──
function loadMerchantInfo(){
  var login = JSON.parse(localStorage.getItem('merchantLogin') || '{}');
  document.getElementById('merchantName').textContent = login.name || '未登录';
  document.getElementById('merchantAccount').textContent = login.account || '-';
  var saved = localStorage.getItem('merchantAvatar');
  if(saved) document.getElementById('avatarImg').src = saved;
}
loadMerchantInfo();

// ── 头像更换 ──
function changeAvatar(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var dataUrl = ev.target.result;
    document.getElementById('avatarImg').src = dataUrl;
    localStorage.setItem('merchantAvatar', dataUrl);
  };
  reader.readAsDataURL(file);
}

// ── 退出 ──
function showLogoutModal(){
  document.getElementById('logoutModal').classList.add('show');
}
function closeLogoutModal(e){
  if(e && e.target !== document.getElementById('logoutModal')) return;
  document.getElementById('logoutModal').classList.remove('show');
}
function doLogout(){
  localStorage.removeItem('merchantLogin');
  location.href = 'login.html';
}
</script>
</body>
</html>
