<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的</title>
<style>
:root { --accent: #3F8B6D; --accent-contrast: #fff; --bg: #fff; --ink: #222; --ink-muted: #555; --ink-subtle: #888; --border: #e0e0e0; --page-bg: #F0F0F0; --radius-sm: 7px; --radius-card: 7px; --radius-pill: 9999px; --font-display: "Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; --font-body: "Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #fff; font-family: var(--font-body); color: var(--ink-muted); display: flex; justify-content: center; min-height: 100%; }
.page { max-width: 430px; width: 100%; min-height: 100vh; background: linear-gradient(180deg, #3F8B6D 0%, #a8c9bb 8%, #f0f0f0 20%); padding: 16px; padding-bottom: 80px; position: relative; box-sizing: border-box; }

/* ── 顶部 ── */
.header{display:flex;justify-content:space-between;align-items:center}
.header-icons{display:flex;gap:16px}
.header-icons .hi{width:22px;height:22px;color:#fff;cursor:pointer;transition:transform .15s}
.header-icons .hi:active{transform:scale(.8)}
.header-icons .hi svg{display:block;width:100%;height:100%}

/* ── 用户卡片 ── */
.user-card { position: relative; display: flex; align-items: center; padding: 20px 16px; border-radius: var(--radius-card); background: var(--bg); box-shadow: 0 1px 6px rgba(0,0,0,.04); overflow: hidden; cursor: pointer; }
.avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; margin-left: 12px; }
.nickname { color: var(--ink); font-size: 16px; font-weight: 700; }
.wallet-addr { margin-top: 4px; color: var(--ink-subtle); font-size: 11px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.wallet-addr svg { width: 11px; height: 11px; }
.vip-tag { padding: 6px 14px; border-radius: var(--radius-pill); color: var(--accent); font-size: 11px; font-weight: 600; background: rgba(63,139,109,.1); flex-shrink: 0; border: none; cursor: pointer; }

/* ── 资产卡片 ── */
.asset-card { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; padding: 18px 16px; border-radius: var(--radius-card); background: var(--bg); box-shadow: 0 1px 6px rgba(0,0,0,.04); cursor: pointer; }
.asset-left { }
.asset-label { font-size: 11px; color: var(--ink-subtle); margin-bottom: 2px; }
.asset-num { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1.1; }
.asset-link { font-size: 11px; color: var(--accent); margin-top: 4px; }
.asset-card img { width: 80px; height: 60px; object-fit: contain; opacity: .8; }

/* ── 菜单 ── */
.service-card { margin-top: 12px; background: var(--bg); border-radius: var(--radius-card); overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.04); }
.menu-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--page-bg); cursor: pointer; transition: background .15s; }
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: var(--page-bg); }
.menu-left { display: flex; align-items: center; }
.mi-icon { width: 36px; height: 36px; border-radius: 10px; margin-right: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mi-icon svg { width: 18px; height: 18px; display: block; }
.mi-wallet { background: rgba(63,139,109,.1); color: var(--accent); }
.mi-order { background: rgba(52,152,219,.1); color: #3498db; }
.mi-auth { background: rgba(206,147,216,.12); color: #8A5CFF; }
.mi-contact { background: rgba(255,183,77,.12); color: #F08A24; }
.mi-setting { background: var(--page-bg); color: var(--ink-subtle); }
.mi-text { font-size: 14px; font-weight: 500; color: var(--ink); }
.mi-arrow svg { width: 14px; height: 14px; color: var(--border); display: block; }

/* ── 底部导航 ── */
.bnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: 64px; background: rgba(255,255,255,.96); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(0,0,0,.06); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; padding-bottom: env(safe-area-inset-bottom,4px); z-index: 100; box-sizing: border-box; }
.bnav .ni { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; border: none; background: none; padding: 4px 10px; font-size: 10px; color: var(--ink-subtle); transition: color .2s; }
.bnav .ni .ico { width: 22px; height: 22px; transition: transform .15s; }
.bnav .ni .ico svg { display: block; width: 100%; height: 100%; }
.bnav .ni:active .ico { transform: scale(.8); }
.bnav .ni.on { color: var(--accent); }
.bnav .ni.on .ico { transform: scale(1.05); }
.bnav .ni span:last-child { font-size: 10px; display: block; }
</style>
</head>
<body>

<!-- 顶部（消息图标） -->
