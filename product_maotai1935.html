<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>1935 时光窖藏 · 数字资产</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #2c2c2e; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #333; display: flex; justify-content: center; overflow-x: hidden; }
.page { max-width: 430px; width: 100%; height: 100vh; background: #f6f7fb; position: relative; box-sizing: border-box; overflow: hidden; }
.page-scroll { height: 100%; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
@media(max-width:430px) { .page { max-width: 100%; } }

/* ── 顶部导航 ── */
.nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; background: #fff; }
.nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.nav-back svg { width: 20px; height: 20px; color: #333; display: block; }
.nav-title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; color: #1a1a2e; }

/* ── 主卡片 ── */
.main-card { margin: 12px 16px; background: linear-gradient(135deg, #D70C1F, #F12B3D); border-radius: 20px; padding: 20px; position: relative; overflow: hidden; }
.main-card::after { content: ''; position: absolute; top: 50%; right: -30px; transform: translateY(-50%); width: 120px; height: 120px; background: url('data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><polygon points=\"50,10 60,35 85,35 65,55 75,80 50,65 25,80 35,55 15,35 40,35\" fill=\"rgba(255,255,255,0.08)\"/></svg>'); opacity: 0.6; }
.main-row { display: flex; gap: 16px; position: relative; z-index: 1; }
.main-img { width: 100px; height: 120px; border-radius: 12px; background: url('茅台1935.png') center/contain no-repeat; background-color: rgba(0,0,0,0.1); flex-shrink: 0; }
.main-info { flex: 1; min-width: 0; }
.main-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 10px; }
.main-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.main-tags span { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.1); }
.main-badge { display: inline-block; font-size: 11px; padding: 4px 12px; border-radius: 20px; background: #fff; color: #D70C1F; font-weight: 600; margin-bottom: 12px; }
.main-progress { margin-top: 4px; }
.main-progress .bar { height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.main-progress .bar div { height: 100%; background: #fff; border-radius: 2px; width: 35%; }
.main-progress .nums { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.8); }

/* ── 3D欣赏 ── */
.block-3d { margin: 12px 16px; background: #fff; border-radius: 16px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.block-3d:active { transform: scale(0.98); }
.block-3d-left { display: flex; align-items: center; gap: 10px; }
.block-3d-left svg { width: 24px; height: 24px; color: #333; }
.block-3d-left span { font-size: 14px; font-weight: 600; color: #1a1a2e; }
.block-3d-right svg { width: 16px; height: 16px; color: #999; }

/* ── 区块标题 ── */
.sec-title { display: flex; align-items: center; gap: 8px; padding: 16px 16px 10px; }
.sec-title::before { content: ''; width: 4px; height: 16px; background: #D70C1F; border-radius: 2px; }
.sec-title span { font-size: 15px; font-weight: 700; color: #1a1a2e; }

/* ── 信息列表 ── */
.info-list { margin: 0 16px; background: #fff; border-radius: 16px; padding: 8px 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.info-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f5f7; }
.info-item:last-child { border-bottom: none; }
.info-item-left { display: flex; align-items: center; gap: 10px; }
.info-item-left svg { width: 18px; height: 18px; color: #999; }
.info-item-left span { font-size: 13px; color: #666; }
.info-item-right { font-size: 13px; color: #1a1a2e; font-weight: 500; }

/* ── 图片详情 ── */
.detail-img { margin: 12px 16px; border-radius: 16px; overflow: hidden; }
.detail-img img { width: 100%; display: block; }

/* ── 底部购买栏 ── */
.buy-bar { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; max-width: 430px; display: flex; gap: 12px; padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 4px)); background: #fff; border-top: 1px solid rgba(0,0,0,0.05); z-index: 100; box-sizing: border-box; }
.btn-collect { flex-shrink: 0; width: 80px; height: 48px; border: 1px solid #e8e8ec; border-radius: 12px; background: #fff; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; font-size: 13px; color: #666; }
.btn-collect:active { background: #f5f5f7; }
.btn-collect.active{color:#f0ad4e;border-color:#f0ad4e;background:#FFF8EC}.btn-collect svg { width: 18px; height: 18px; }
.btn-buy { flex: 1; height: 48px; border: none; border-radius: 12px; background: #D70C1F; color: #fff; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
.btn-buy:active { opacity: 0.9; }
.btn-buy svg { width: 18px; height: 18px; }

/* ── 3D浮层 ── */
.d3-mask { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
.d3-mask.show { opacity: 1; pointer-events: auto; }
.d3-box { width: 280px; height: 280px; position: relative; perspective: 800px; margin-bottom: 20px; }
.d3-model { width: 100%; height: 100%; background: url('茅台1935.png') center/contain no-repeat; animation: d3spin 8s linear infinite; transform-style: preserve-3d; }
@keyframes d3spin { 0% { transform: rotateY(0deg) rotateX(5deg); } 50% { transform: rotateY(180deg) rotateX(5deg); } 100% { transform: rotateY(360deg) rotateX(5deg); } }
.d3-hint { color: rgba(255,255,255,0.3); font-size: 11px; margin-bottom: 16px; }
.d3-close { height: 44px; padding: 0 36px; border: none; border-radius: 22px; background: rgba(255,255,255,0.1); color: #fff; font-size: 13px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); }
.d3-close:active { background: rgba(255,255,255,0.2); }

/* ── 发售时间轴 ── */
.sale-timeline { margin: 12px 16px; background: #fff; border-radius: 16px; padding: 16px 18px 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.sale-timeline .stl-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.sale-timeline .stl-title::before { content: ''; width: 4px; height: 16px; background: #D70C1F; border-radius: 2px; }
.stl-scroll { max-height: 170px; overflow-y: auto; scrollbar-width: none; }
.stl-scroll::-webkit-scrollbar { display: none; }
.stl-item { display: flex; gap: 10px; padding: 6px 0; position: relative; }
.stl-dot-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 14px; }
.stl-dot { width: 10px; height: 10px; border-radius: 50%; background: #D70C1F; flex-shrink: 0; position: relative; z-index: 1; }
.stl-dot.done { background: #bbb; }
.stl-line { width: 2px; flex: 1; background: #f0f0f0; min-height: 20px; }
.stl-info { flex: 1; padding-bottom: 13px; }
.stl-info .stl-label { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 2px; }
.stl-info .stl-label.done { color: #bbb; }
.stl-info .stl-desc { font-size: 11px; color: #999; }
.stl-info .stl-desc .active { color: #D70C1F; font-weight: 600; }
.stl-item:last-child .stl-line { display: none; }
.tl-tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
.tl-tag.now { background: #FFF2F3; color: #D70C1F; }
.tl-tag.done-tag { background: #f5f5f7; color: #bbb; }

/* ── 浏览倒计时条 ── */
.browse-timer-bar{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  background:rgba(26,26,46,.92);border-radius:14px;
  padding:10px 8px;border:1px solid rgba(255,255,255,.12);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  backdrop-filter:blur(8px);
  z-index:200;
  transition:opacity .3s,transform .3s;
}
.browse-timer-bar.hidden{opacity:0;pointer-events:none;transform:translateY(-50%) scale(.8)}
.browse-timer-circle{
  position:relative;width:48px;height:48px;
}
.browse-timer-circle svg{width:48px;height:48px;transform:rotate(-90deg)}
.browse-timer-circle .bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:3}
.browse-timer-circle .fg{fill:none;stroke:#26de81;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .3s linear}
.browse-timer-text{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
}
.browse-timer-label{
  font-size:10px;color:rgba(255,255,255,.6);
  text-align:center;line-height:1.3;
}
.browse-timer-done{
  display:none;flex-direction:column;align-items:center;gap:6px;
}
.browse-timer-bar.done .browse-timer-circle{display:none}
.browse-timer-bar.done .browse-timer-label{display:none}
.browse-timer-bar.done .browse-timer-done{display:flex}
.browse-timer-done-icon{font-size:32px}
.browse-timer-done-text{font-size:11px;color:#26de81;font-weight:600;text-align:center}
.browse-timer-back-btn{
  margin-top:2px;padding:4px 12px;
  background:linear-gradient(135deg,#26de81,#20bf6b);
  border:none;border-radius:12px;
  color:#fff;font-size:11px;font-weight:600;cursor:pointer;
  transition:transform .2s;
}
.browse-timer-back-btn:active{transform:scale(.9)}
</style>
</head>

    </svg>

<script>
var PID="maotai1935";

// ── 浏览倒计时逻辑 ──
(function initBrowseTimer(){
  // 检查是否从 assets_maotai.html 进入
  var ref = document.referrer || '';
  var fromAssets = ref.indexOf('assets_maotai.html') !== -1;
  // 也支持通过 URL 参数标记（兜底）
  var params = new URLSearchParams(window.location.search);
  var fromTask = params.get('from') === 'assets';

  if(fromAssets || fromTask){
    var timerBar = document.getElementById('browseTimerBar');
    var timerFg = document.getElementById('browseTimerFg');
    var timerText = document.getElementById('browseTimerText');
    var totalSeconds = 10;
    var remaining = totalSeconds;
    var circumference = 131.95; // 2*π*21

    // 显示倒计时条
    timerBar.classList.remove('hidden');

    var countdown = setInterval(function(){
      remaining--;
      timerText.textContent = remaining;
      // 更新环形进度
      var offset = circumference * (1 - (totalSeconds - remaining) / totalSeconds);
      timerFg.style.strokeDashoffset = circumference - offset;

      if(remaining <= 0){
        clearInterval(countdown);
        // 显示完成状态
        timerBar.classList.add('done');
        // 设置奖励标记，供任务中心读取
        localStorage.setItem('metaProductRewardFlag', '1');
      }
    }, 1000);
  }
})();

function goBackWithReward(){
  localStorage.setItem('metaProductRewardFlag', '1');
  history.back();
}

function toggleCollect(){
  var list = JSON.parse(localStorage.getItem("favorites") || "[]");
  var i = list.indexOf(PID);
  var btn = document.getElementById("btnCollect");
  var txt = document.getElementById("collectText");
  if (i >= 0) {
    list.splice(i, 1);
    btn.classList.remove("active");
    if (txt) txt.textContent = "收藏";
  } else {
    list.push(PID);
    btn.classList.add("active");
    if (txt) txt.textContent = "已收藏";
  }
  localStorage.setItem("favorites", JSON.stringify(list));
}
function show3D(){ document.getElementById('d3Mask').classList.add('show'); }
function hide3D(e){ if(e&&e.target!==document.getElementById('d3Mask'))return;document.getElementById('d3Mask').classList.remove('show'); }
// init
(function(){
  var list = JSON.parse(localStorage.getItem("favorites") || "[]");
  if (list.indexOf(PID) >= 0) {
    document.getElementById("btnCollect").classList.add("active");
    var t = document.getElementById("collectText");
    if (t) t.textContent = "已收藏";
  }
})();
</script></body>
