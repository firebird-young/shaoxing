<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的资产</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #2c2c2e; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #333; display: flex; flex-direction: column; align-items: center; }
.page { max-width: 430px; min-height: 100vh; background: #f6f7fb; padding: 0 16px 80px; position: relative; width: 100%; }

/* ── 顶部导航 ── */
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border-bottom: 1px solid #f0f0f0; margin: 0 -16px; }
.nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.nav-back svg { width: 20px; height: 20px; color: #333; display: block; }
.nav-title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; color: #1a1a2e; }
.nav-placeholder { width: 32px; }

/* ── 总览卡片 ── */
.overview { background: linear-gradient(135deg, #1a1a2e, #2d1f1f); border-radius: 20px; padding: 20px; margin: 14px 0; display: flex; justify-content: space-around; text-align: center; }
.ov-item { position: relative; z-index: 1; flex: 1; }
.ov-num { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.ov-label { font-size: 11px; color: rgba(255,255,255,0.5); }

/* ── 资产列表 ── */
.asset-list { display: flex; flex-direction: column; gap: 10px; }
.asset-card { background: #fff; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); cursor: pointer; transition: transform 0.15s; }
.asset-card:active { transform: scale(0.98); }
.ac-img { width: 56px; height: 56px; border-radius: 10px; background-position: center; background-size: cover; flex-shrink: 0; }
.ac-info { flex: 1; min-width: 0; }
.ac-name { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
.ac-tag { font-size: 10px; color: #999; background: #f5f5f7; padding: 2px 8px; border-radius: 4px; display: inline-block; }
.ac-right { text-align: right; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ac-hold { font-size: 16px; font-weight: 700; color: #D70C1F; }
.ac-hold-label { font-size: 10px; color: #999; }
.ac-arrow svg { width: 16px; height: 16px; color: #ccc; }

/* ── 底部TabBar ── */
.bnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: 64px; background: rgba(255,255,255,.96); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(0,0,0,.05); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; padding-bottom: env(safe-area-inset-bottom, 4px); z-index: 100; }
.bnav .ni { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; border: none; background: none; padding: 4px 10px; font-size: 10px; color: #999; transition: color .2s; }
.bnav .ni .ico { width: 22px; height: 22px; transition: transform .15s; }
.bnav .ni .ico svg { display: block; width: 100%; height: 100%; }
.bnav .ni:active .ico { transform: scale(.8); }
.bnav .ni.on { color: #D70C1F; }
.bnav .ni.on .ico { transform: scale(1.05); }
.bnav .ni span:last-child { font-size: 10px; display: block; }
</style>
</head>
<body>
