<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>设置</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #2c2c2e; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #333; display: flex; flex-direction: column; align-items: center; }
.page { max-width: 430px; min-height: 100vh; background: #f6f7fb; padding: 0; position: relative; width: 100%; }

/* ── 顶部导航 ── */
.top-bar { display: flex; align-items: center; justify-content: center; padding: 12px 16px; background: #D70C1F; position: relative; }
.nav-back { position: absolute; left: 16px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.nav-back svg { width: 20px; height: 20px; color: #fff; display: block; }
.nav-title { font-size: 17px; font-weight: 600; color: #fff; }

/* ── 菜单列表 ── */
.menu-group { background: #fff; margin: 12px 16px; border-radius: 12px; overflow: hidden; }
.menu-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; cursor: pointer; border-bottom: 1px solid #f5f5f7; transition: background 0.15s; }
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: #fafafa; }
.menu-item .mi-name { font-size: 15px; color: #1a1a2e; }
.menu-item .mi-arrow svg { width: 16px; height: 16px; color: #ccc; }

/* ── 退出登录 ── */
.logout-btn { display: block; width: calc(100% - 32px); margin: 24px 16px; height: 48px; border: none; border-radius: 8px; background: #D70C1F; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
.logout-btn:active { opacity: 0.9; }
</style>
</head>
<body>
<div class="page">

<!-- 顶部导航 -->
<div class="top-bar">
  <div class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">设置</div>
</div>

<!-- 设置菜单 -->
<div class="menu-group">
  <div class="menu-item" onclick="window.location.href='profile.html'">
    <span class="mi-name">个人资料</span>
    <div class="mi-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
  <div class="menu-item" onclick="alert('即将开放')">
    <span class="mi-name">隐私政策</span>
    <div class="mi-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
  <div class="menu-item" onclick="alert('即将开放')">
    <span class="mi-name">用户协议</span>
    <div class="mi-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
  <div class="menu-item" onclick="alert('即将开放')">
    <span class="mi-name">其他协议</span>
    <div class="mi-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
  <div class="menu-item" onclick="alert('即将开放')">
    <span class="mi-name">关于我们</span>
    <div class="mi-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
  <div class="menu-item" onclick="if(confirm('注销后账号数据将全部清除，确定要注销吗？')){ alert('账号已注销'); location.href='user-index.html'; }">
    <span class="mi-name" style="color:#D70C1F">注销账号</span>
    <div class="mi-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
</div>

<!-- 退出登录 -->
<button class="logout-btn" onclick="if(confirm('确定要退出登录吗？')){ alert('已退出登录'); window.location.href='user-index.html'; }">退出登录</button>

</div>

</body>
</html>
