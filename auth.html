<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>实名认证</title>
<style>
:root{--accent:#3F8B6D;--accent-contrast:#fff;--bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;--border:#e0e0e0;--page-bg:#F0F0F0;--radius-sm:7px;--radius-card:7px;--radius-pill:9999px;--font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;--font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:0;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.2);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:#fff}
.nav-placeholder{width:32px}

/* ── 表单 ── */
.form-section{padding:16px}
.form-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:10px}
.form-item{background:var(--bg);border-radius:12px;padding:0 14px;height:48px;display:flex;align-items:center;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.fi-label{font-size:13px;color:var(--ink-subtle);white-space:nowrap;flex-shrink:0}
.fi-input{flex:1;border:none;outline:none;font-size:14px;color:var(--ink);background:transparent;text-align:right;margin-left:12px}
.fi-input::placeholder{color:#bbb}

/* ── 温馨提示 ── */
.tip-box{background:rgba(63,139,109,.06);border-radius:12px;padding:14px 16px;margin-top:4px;margin-bottom:16px;border:1px solid rgba(63,139,109,.1)}
.tip-icon{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;float:left;margin-right:10px}
.tip-text{font-size:12px;color:var(--ink-muted);line-height:1.7}

/* ── 勾选 ── */
.agree-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.agree-checkbox{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.agree-checkbox.checked{background:var(--accent);border-color:var(--accent)}
.agree-checkbox svg{width:12px;height:12px;color:#fff;display:none}
.agree-checkbox.checked svg{display:block}
.agree-text{font-size:12px;color:var(--ink-muted)}
.agree-text a{color:var(--accent);text-decoration:none}

/* ── 提交 ── */
.submit-btn{width:100%;height:48px;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.submit-btn:active{opacity:.85}
.submit-btn:disabled{background:#ccc;cursor:not-allowed}

/* ── 已认证 ── */
.auth-success{display:none;padding:40px 16px;text-align:center}
.auth-success.show{display:block}
.success-icon{width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.success-icon svg{width:36px;height:36px;color:#fff}
.success-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px}
.success-desc{font-size:13px;color:var(--ink-subtle);margin-bottom:20px}
.info-card{background:var(--bg);border-radius:var(--radius-card);padding:16px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.04);text-align:left}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--page-bg);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--ink-subtle)}
.info-value{font-weight:600;color:var(--ink)}
.confirm-btn{width:100%;height:48px;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.confirm-btn:active{opacity:.85}

/* ── 滑块验证 ── */
.captcha-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
.captcha-overlay.show{display:flex}
.captcha-box{background:var(--bg);border-radius:16px;padding:24px;width:100%;max-width:340px;position:relative;text-align:center}
.captcha-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:var(--page-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.captcha-close svg{width:14px;height:14px;color:var(--ink-subtle)}
.captcha-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:16px}
.slider-container{position:relative;height:120px;background:var(--page-bg);border-radius:12px;overflow:hidden;margin-bottom:12px}
.slider-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-subtle)}
.slider-track{position:absolute;bottom:16px;left:16px;right:16px;height:40px;background:var(--bg);border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.slider-gap{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;background:var(--page-bg);border-radius:12px;border:2px dashed var(--border)}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;background:var(--accent);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;cursor:grab;transition:box-shadow .15s;left:0}
.slider-btn:active{cursor:grabbing;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.slider-btn svg{width:20px;height:20px;color:#fff}
.captcha-tip{text-align:center;font-size:12px;color:var(--ink-subtle)}
.captcha-tip.success{color:var(--accent)}
.captcha-tip.error{color:#e74c3c}
.reset-btn{margin:10px 0 6px 10px;height:32px;padding:0 20px;border:1px dashed rgba(0,0,0,.2);border-radius:16px;background:transparent;color:rgba(0,0,0,.3);font-size:11px;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:rgba(0,0,0,.4);color:rgba(0,0,0,.5)}
</style>
</head>
<body>
<button class="reset-btn" onclick="resetAll()">清空开通</button>
<div class="page">

<div class="top-bar">
  <div class="nav-back" onclick="location.href='my.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">实名认证</div>
  <div class="nav-placeholder"></div>
</div>

<!-- 未认证表单 -->
<div class="form-section" id="authForm">
  <div class="form-title">真实姓名</div>
  <div class="form-item">
    <span class="fi-label">姓名</span>
    <input class="fi-input" id="realName" placeholder="请输入姓名">
  </div>
  <div class="form-title">身份证号</div>
  <div class="form-item">
    <span class="fi-label">身份证号</span>
    <input class="fi-input" id="idCard" placeholder="请输入18位身份证号">
  </div>
  <div class="tip-box">
    <div class="tip-icon">!</div>
    <div class="tip-text">根据国家相关法规，为保障交易安全，所有用户均需完成实名认证。认证完成后将与账户永久绑定，请填写真实信息。</div>
  </div>
  <div class="agree-row">
    <div class="agree-checkbox" id="agreeCheckbox" onclick="toggleAgree()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <span class="agree-text">同意并授权用于实名认证</span>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="showCaptcha()">同意授权并认证</button>
</div>

<!-- 已认证 -->
<div class="auth-success" id="authSuccess">
  <div class="success-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="success-title">已实名认证</div>
  <div class="success-desc">认证信息如下</div>
  <div class="info-card">
    <div class="info-row"><span class="info-label">姓名</span><span class="info-value" id="showName">-</span></div>
    <div class="info-row"><span class="info-label">身份证号</span><span class="info-value" id="showIdCard">-</span></div>
  </div>
  <button class="confirm-btn" onclick="goBack()">确定</button>
</div>

</div>

<!-- 滑块验证弹窗 -->
<div class="captcha-overlay" id="captchaOverlay">
  <div class="captcha-box">
    <button class="captcha-close" onclick="closeCaptcha()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="captcha-title">安全验证</div>
    <div class="slider-container" id="sliderContainer">
      <div class="slider-bg">拖动滑块完成验证</div>
      <div class="slider-track">
        <div class="slider-gap" id="sliderGap"></div>
        <div class="slider-btn" id="sliderBtn" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 5 12 19"/><polyline points="5 12 19 12"/></svg>
        </div>
      </div>
    </div>
    <div class="captcha-tip" id="captchaTip">请拖动滑块完成验证</div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',function(){
  if(localStorage.getItem('authenticated')==='true'){
    document.getElementById('authForm').style.display='none';
    document.getElementById('authSuccess').classList.add('show');
    var n=localStorage.getItem('realName');
    var c=localStorage.getItem('idCard');
    if(n) document.getElementById('showName').textContent=n;
    if(c) document.getElementById('showIdCard').textContent=maskIdCard(c);
  }
});
function goBack(){ location.href='my.html'; }
function resetAll(){
  localStorage.removeItem('authenticated');
  localStorage.removeItem('realName');
  localStorage.removeItem('idCard');
  alert('已清空认证状态，页面将刷新');
  window.location.reload();
}
function toggleAgree(){ document.getElementById('agreeCheckbox').classList.toggle('checked'); }
function showCaptcha(){
  var n=document.getElementById('realName').value.trim();
  var c=document.getElementById('idCard').value.trim();
  var a=document.getElementById('agreeCheckbox').classList.contains('checked');
  if(!n){alert('请输入姓名');return;}
  if(!c||c.length!==18){alert('请输入正确的18位身份证号');return;}
  if(!a){alert('请同意授权协议');return;}
  localStorage.setItem('realName',n);
  localStorage.setItem('idCard',c);
  document.getElementById('captchaOverlay').classList.add('show');
  initSlider();
}
function closeCaptcha(){
  document.getElementById('captchaOverlay').classList.remove('show');
  document.getElementById('captchaTip').textContent='请拖动滑块完成验证';
  document.getElementById('captchaTip').className='captcha-tip';
}
var sliderBtn,sliderGap,sliderTrack,isDragging=false,startX=0,gapLeft=0;
function initSlider(){
  sliderBtn=document.getElementById('sliderBtn');
  sliderGap=document.getElementById('sliderGap');
  sliderTrack=document.querySelector('.slider-track');
  var tw=sliderTrack.offsetWidth,gw=sliderGap.offsetWidth;
  gapLeft=tw*0.3+Math.random()*(tw*0.4);
  sliderGap.style.left=gapLeft+'px';
  sliderBtn.style.left='0px';
}
function startDrag(e){
  isDragging=true;
  startX=e.type.includes('touch')?e.touches[0].clientX:e.clientX;
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',stopDrag);
  document.addEventListener('touchmove',onDrag);
  document.addEventListener('touchend',stopDrag);
}
function onDrag(e){
  if(!isDragging)return;
  var tw=sliderTrack.offsetWidth,bw=sliderBtn.offsetWidth;
  var cx=e.type.includes('touch')?e.touches[0].clientX:e.clientX;
  sliderBtn.style.left=Math.max(0,Math.min(cx-startX,tw-bw))+'px';
}
function stopDrag(){
  if(!isDragging)return;
  isDragging=false;
  document.removeEventListener('mousemove',onDrag);
  document.removeEventListener('mouseup',stopDrag);
  document.removeEventListener('touchmove',onDrag);
  document.removeEventListener('touchend',stopDrag);
  var bl=parseFloat(sliderBtn.style.left);
  if(Math.abs(bl-gapLeft)<15){
    document.getElementById('captchaTip').textContent='验证成功！';
    document.getElementById('captchaTip').className='captcha-tip success';
    setTimeout(function(){closeCaptcha();completeAuth();},600);
  }else{
    document.getElementById('captchaTip').textContent='验证失败，请重试';
    document.getElementById('captchaTip').className='captcha-tip error';
    sliderBtn.style.transition='left .3s ease';
    sliderBtn.style.left='0px';
    setTimeout(function(){sliderBtn.style.transition='';document.getElementById('captchaTip').textContent='请拖动滑块完成验证';document.getElementById('captchaTip').className='captcha-tip';},500);
  }
}
function completeAuth(){
  localStorage.setItem('authenticated','true');
  document.getElementById('authForm').style.display='none';
  document.getElementById('authSuccess').classList.add('show');
  var n=localStorage.getItem('realName');
  var c=localStorage.getItem('idCard');
  if(n) document.getElementById('showName').textContent=n;
  if(c) document.getElementById('showIdCard').textContent=maskIdCard(c);
}
function maskIdCard(c){
  return c.length===18 ? c.substring(0,6)+'***********'+c.substring(17) : c;
}
</script>
</body>
</html>
