<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>确认订单</title>
<style>
:root{
  --accent:#3F8B6D;--accent-contrast:#fff;--link:#3F8B6D;--muted:#a0a0a0;
  --bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;
  --border:#e0e0e0;--page-bg:#F0F0F0;
  --radius-sm:7px;--radius-card:7px;--radius-pill:9999px;
  --font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:var(--page-bg);position:relative;box-sizing:border-box;padding-bottom:90px}

/* ── 顶部导航 ── */
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--accent)}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#fff}
.nav-placeholder{width:32px}

/* ── 订单商品 ── */
.order-card{margin:12px 16px;background:var(--bg);border-radius:var(--radius-card);padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.order-prod{display:flex;gap:12px;align-items:center}
.order-img{width:64px;aspect-ratio:1/1;border-radius:var(--radius-sm);background-position:center;background-size:cover;flex-shrink:0;background-color:#f5f5f7}
.order-info{flex:1;min-width:0}
.order-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px}
.order-spec{font-size:11px;color:var(--ink-subtle);margin-bottom:6px}
.order-bfs{display:flex;gap:4px;flex-wrap:wrap}
.order-bf{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--page-bg);color:var(--ink-subtle)}
.order-price-row{display:flex;align-items:baseline;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.order-qty{font-size:12px;color:var(--ink-subtle)}
.order-total{font-size:18px;font-weight:700;color:var(--accent);margin-left:auto}

/* ── 分区卡片 ── */
.section-card{margin:12px 16px;background:var(--bg);border-radius:var(--radius-card);padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.sec-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px}

/* ── 支付方式 ── */
.pay-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
.pay-item:last-child{border-bottom:none}
.pay-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.pay-icon.hf{background:linear-gradient(135deg,#ff6b6b,#ee5a24)}
.pay-icon.zj{background:linear-gradient(135deg,#c41e3a,#8b1a1a)}
.pay-info{flex:1;min-width:0}
.pay-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px;display:flex;align-items:center;gap:8px}
.pay-limit{font-size:11px;color:var(--ink-subtle)}
.pay-status{font-size:12px;color:var(--accent);margin-right:8px}
.pay-status.disabled{color:var(--ink-subtle)}
.pay-check{width:20px;height:20px;border:2px solid #ddd;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.pay-check.active{border-color:var(--accent);background:var(--accent)}
.pay-check svg{width:12px;height:12px;color:#fff;display:none}
.pay-check.active svg{display:block}

/* ── 协议 ── */
.agreement-section{margin:12px 16px}
.agreement-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.agreement-check{width:18px;height:18px;border:2px solid #ddd;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.agreement-check.active{border-color:var(--accent);background:var(--accent)}
.agreement-check svg{width:12px;height:12px;color:#fff;display:none}
.agreement-check.active svg{display:block}
.agreement-text{font-size:12px;color:var(--ink-muted);line-height:1.6}
.agreement-text a{color:var(--accent);text-decoration:none}
.agreement-text .warning{color:var(--accent);margin-top:4px;display:block}

/* ── 底部 ── */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid rgba(0,0,0,.05);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,4px));z-index:100;display:flex;align-items:center;justify-content:space-between}
.total-price{display:flex;align-items:baseline;gap:4px}
.total-label{font-size:13px;color:var(--ink-muted)}
.total-value{font-size:22px;font-weight:700;color:var(--accent)}
.total-value small{font-size:13px}
.btn-submit{height:44px;padding:0 32px;border:none;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-submit:active{opacity:.9}
.btn-submit:disabled{background:#ccc;cursor:not-allowed}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;opacity:0;pointer-events:none;transition:all .3s;z-index:999}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>
<div class="page">

<div class="nav-bar">
  <div class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">确认订单</div>
  <div class="nav-placeholder"></div>
</div>

<div class="order-card">
  <div class="order-prod">
    <div class="order-img" id="orderImg"></div>
    <div class="order-info">
      <div class="order-name" id="orderSeries"></div>
      <div class="order-spec" id="orderSpec"></div>
      <div class="order-bfs" id="orderBfs"></div>
    </div>
  </div>
  <div class="order-price-row">
    <span class="order-qty" id="orderQty">×1</span>
    <span class="order-total" id="orderTotal">¥199</span>
  </div>
</div>

<div class="section-card">
  <div class="sec-title">选择支付方式</div>
  <div class="pay-item" onclick="selectPay(this, false)">
    <div class="pay-icon hf">汇</div>
    <div class="pay-info">
      <div class="pay-name">汇付钱包<span class="pay-status disabled">服务维护中</span></div>
      <div class="pay-limit">查看限额</div>
    </div>
    <div class="pay-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  </div>
  <div class="pay-item" onclick="selectPay(this, true)">
    <div class="pay-icon zj">中</div>
    <div class="pay-info">
      <div class="pay-name">中金钱包</div>
      <div class="pay-limit">查看限额</div>
    </div>
    <div class="pay-check active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  </div>
</div>

<div class="agreement-section">
  <div class="agreement-item" onclick="toggleAgreement()">
    <div class="agreement-check" id="agreementCheck">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="agreement-text">
      同意<a href="#">《绍兴数资购买协议》</a>
      <span class="warning">*您所购买商品因属性及价格的特殊性，同意购买商品后不支持7天无理由退款</span>
    </div>
  </div>
</div>

</div>

<div class="bottom-bar">
  <div class="total-price">
    <span class="total-label">合计：</span>
    <span class="total-value"><small>¥</small><span id="totalPrice">199</span></span>
  </div>
  <button class="btn-submit" id="submitBtn" onclick="submitOrder()">提交订单</button>
</div>

<div class="toast" id="toast"></div>

<script>
var params = new URLSearchParams(window.location.search);
var specName = decodeURIComponent(params.get('spec') || '');
var specImg  = decodeURIComponent(params.get('img') || 'asset/兰亭雅集封面图.png');
var price    = parseInt(params.get('price') || '199');
var qty      = parseInt(params.get('qty') || '1');
var bfStr    = decodeURIComponent(params.get('bfs') || '');
var series   = decodeURIComponent(params.get('series') || '兰亭雅集');
var total    = price * qty;

var agreementChecked = false;
var selectedPay = '中金钱包';

document.getElementById('orderImg').style.backgroundImage = 'url('+specImg+')';
document.getElementById('orderSeries').textContent = series;
document.getElementById('orderSpec').textContent = specName;
document.getElementById('orderBfs').innerHTML = bfStr.split(',').map(function(b){ return '<span class="order-bf">'+b+'</span>'; }).join('');
document.getElementById('orderQty').textContent = '×'+qty;
document.getElementById('orderTotal').textContent = '¥'+total;
document.getElementById('totalPrice').textContent = total;

function selectPay(el, available){
  if(!available){ showToast('该支付方式暂不可用'); return; }
  document.querySelectorAll('.pay-check').forEach(function(c){ c.classList.remove('active'); });
  el.querySelector('.pay-check').classList.add('active');
  selectedPay = el.querySelector('.pay-name').childNodes[0].textContent.trim();
}

function toggleAgreement(){
  agreementChecked = !agreementChecked;
  document.getElementById('agreementCheck').classList.toggle('active', agreementChecked);
}

function submitOrder(){
  if(!agreementChecked){ showToast('请同意购买协议'); return; }
  location.href = 'pay_success.html?qty='+qty+'&pay='+encodeURIComponent(selectedPay)+'&total='+total+'&spec='+encodeURIComponent(specName)+'&series='+encodeURIComponent(series);
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}
</script>

</body>
</html>
