<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #e8e9ee; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #333; display: flex; justify-content: center; }
.page { max-width: 430px; min-width: 320px; min-height: 100vh; background: #f5f6fa; padding: 30px 16px 130px; position: relative; width: 100%; }

/* ── 用户卡片 ── */
.user-card { position: relative; display: flex; align-items: center; padding: 24px 20px; border-radius: 18px; background: linear-gradient(135deg, #D70C1F 0%, #F12B3D 50%, #ff6d7f 100%); box-shadow: 0 10px 30px rgba(215,12,31,.25); overflow: hidden; cursor: pointer; }
.user-card::before { content: ''; position: absolute; right: -40px; top: -30px; width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,.18), transparent 70%); pointer-events: none; }
.user-card::after { content: ''; position: absolute; left: -20px; bottom: -20px; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,.1), transparent 70%); pointer-events: none; }
.avatar { width: 56px; height: 56px; border-radius: 28px; border: 3px solid rgba(255,255,255,.8); box-shadow: 0 0 15px rgba(255,255,255,.3); object-fit: cover; flex-shrink: 0; position: relative; z-index: 1; }
.user-info { flex: 1; min-width: 0; margin-left: 14px; position: relative; z-index: 1; }
.nickname { color: #fff; font-size: 18px; font-weight: 700; }
.wallet-addr { margin-top: 6px; color: rgba(255,255,255,.75); font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.wallet-addr svg { width: 11px; height: 11px; opacity: .6; }
.vip-tag { padding: 8px 18px; border-radius: 20px; color: #D70C1F; font-size: 11px; font-weight: 600; background: rgba(255,255,255,.92); backdrop-filter: blur(10px); flex-shrink: 0; position: relative; z-index: 1; border: none; cursor: pointer; }

/* ── 资产卡片 ── */
.asset-card { margin-top: 14px; display: flex; justify-content: space-between; align-items: center; padding: 24px 20px; border-radius: 18px; background: linear-gradient(135deg, #0f172a, #111827, #1e293b); box-shadow: 0 10px 30px rgba(0,0,0,.15); cursor: pointer; overflow: hidden; position: relative; }
.asset-card::after { content: ''; position: absolute; right: -30px; top: -20px; width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, rgba(215,12,31,.15), transparent 70%); pointer-events: none; }
.asset-left { position: relative; z-index: 1; }
.asset-label { font-size: 12px; color: rgba(255,255,255,.5); margin-bottom: 4px; }
.asset-num { font-size: 32px; font-weight: 800; background: linear-gradient(180deg, #ff4d7a, #D70C1F); -webkit-background-clip: text; color: transparent; line-height: 1; }
.asset-link { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 6px; display: flex; align-items: center; gap: 2px; }
.asset-right-img { width: 100px; height: 80px; object-fit: contain; position: relative; z-index: 1; opacity: .85; }

/* ── 菜单 ── */
.service-card { margin-top: 16px; background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.04); }
.menu-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid #f3f3f5; cursor: pointer; transition: background .15s; }
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: #fafafa; }
.menu-left { display: flex; align-items: center; }
.mi-icon { width: 40px; height: 40px; border-radius: 12px; margin-right: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mi-icon svg { width: 20px; height: 20px; display: block; }
.mi-wallet { background: linear-gradient(135deg, #FFE4B5, #FFD54F); color: #b8860b; }
.mi-order { background: linear-gradient(135deg, #D4F8D4, #4CAF50); color: #2e7d32; }
.mi-auth { background: linear-gradient(135deg, #D6E8FF, #2196F3); color: #1565c0; }
.mi-contact { background: linear-gradient(135deg, #FCE4EC, #e91e63); color: #c2185b; }
.mi-setting { background: linear-gradient(135deg, #E8E8EC, #9e9e9e); color: #555; }
.mi-text { font-size: 14px; font-weight: 500; color: #1a1a2e; }
.mi-arrow svg { width: 14px; height: 14px; color: #ccc; display: block; }

/* ── 悬浮底部导航 ── */
.bnav { position: fixed; left: 12px; right: 12px; bottom: 16px; height: 56px; border-radius: 28px; background: rgba(255,255,255,.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 8px 30px rgba(0,0,0,.08); display: flex; align-items: center; justify-content: space-around; padding: 0 8px; z-index: 100; max-width: 406px; margin: 0 auto; }
.bnav .ni { display: flex; flex-direction: column; align-items: center; gap: 1px; cursor: pointer; border: none; background: none; padding: 4px 6px; font-size: 9px; color: #999; transition: color .2s; }
.bnav .ni .ico { width: 20px; height: 20px; transition: transform .15s; }
.bnav .ni .ico svg { display: block; width: 100%; height: 100%; }
.bnav .ni:active .ico { transform: scale(.8); }
.bnav .ni.on { color: #D70C1F; }
.bnav .ni.on .ico { transform: scale(1.05); }
.bnav .ni span:last-child { font-size: 9px; display: block; }
</style>
</head>
<body>
<div class="page">

<!-- 用户卡片 -->
