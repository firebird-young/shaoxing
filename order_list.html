<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>订单管理</title>
<style>
:root{--accent:#3F8B6D;--accent-contrast:#fff;--bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;--border:#e0e0e0;--page-bg:#F0F0F0;--radius-sm:7px;--radius-card:7px;--radius-pill:9999px;--font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;--font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:0;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.2);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:#fff}
.nav-placeholder{width:32px}

/* ── 状态标签 ── */
.status-tabs{display:flex;padding:0 16px;overflow-x:auto}
.status-tabs::-webkit-scrollbar{display:none}
.st-tab{padding:12px 16px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;flex-shrink:0}
.st-tab:active{color:#fff}
.st-tab.on{color:#fff;border-bottom-color:#fff;font-weight:600}

/* ── 订单卡片 ── */
.orders-container{padding:12px 16px}
.order-card{background:var(--bg);border-radius:var(--radius-card);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.oc-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--page-bg)}
.oc-shop{display:flex;align-items:center;gap:8px}
.oc-shop-icon{width:22px;height:22px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.oc-shop-icon svg{width:12px;height:12px;color:#fff}
.oc-shop-name{font-size:12px;font-weight:600;color:var(--ink)}
.oc-status{font-size:11px;font-weight:600;padding:2px 10px;border-radius:var(--radius-pill)}
.os-pending{background:rgba(255,152,0,.1);color:#ff9800}
.os-completed{background:rgba(63,139,109,.1);color:var(--accent)}
.os-cancelled{background:var(--page-bg);color:var(--ink-subtle)}

/* ── 商品 ── */
.oc-goods{padding:12px 14px;cursor:pointer}
.og-item{display:flex;gap:12px;margin-bottom:8px}
.og-item:last-child{margin-bottom:0}
.og-img{width:64px;height:64px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0;background:var(--page-bg)}
.og-info{flex:1;min-width:0}
.og-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.og-desc{font-size:10px;color:var(--ink-subtle);margin-bottom:4px}
.og-price-row{display:flex;justify-content:space-between;align-items:center}
.og-price{font-size:14px;font-weight:700;color:var(--accent)}
.og-count{font-size:11px;color:var(--ink-subtle)}

/* ── 底部 ── */
.oc-footer{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:1px solid var(--page-bg)}
.oc-total{font-size:11px;color:var(--ink-muted)}
.oc-total strong{font-size:13px;color:var(--accent)}
.oc-actions{display:flex;gap:6px}
.oa-btn{height:28px;padding:0 14px;border-radius:var(--radius-pill);font-size:11px;cursor:pointer;transition:all .15s;border:none}
.oa-btn.default{border:1px solid var(--border);background:var(--bg);color:var(--ink-muted)}
.oa-btn.default:active{background:var(--page-bg)}
.oa-btn.primary{background:var(--accent);color:#fff}
.oa-btn.primary:active{opacity:.85}

/* ── 空状态 ── */
.empty-state{padding:60px 0;text-align:center}
.empty-icon{width:64px;height:64px;margin:0 auto 12px;background:var(--page-bg);border-radius:50%;display:flex;align-items:center;justify-content:center}
.empty-icon svg{width:32px;height:32px;color:#ccc}
.empty-text{font-size:13px;color:var(--ink-subtle)}

/* ── 详情弹窗 ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:999}
.detail-overlay.show{display:flex}
.detail-box{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--page-bg);position:sticky;top:0;background:var(--bg)}
.detail-title{font-size:15px;font-weight:600;color:var(--ink)}
.detail-close{width:26px;height:26px;border-radius:50%;background:var(--page-bg);display:flex;align-items:center;justify-content:center;cursor:pointer}
.detail-close svg{width:13px;height:13px;color:var(--ink-subtle)}
.detail-content{padding:16px}
.detail-section{margin-bottom:16px}
.detail-section-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--page-bg)}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px}
.detail-label{color:var(--ink-subtle)}
.detail-value{color:var(--ink)}
.detail-goods{background:var(--page-bg);border-radius:10px;padding:10px;margin-top:8px}
.detail-total{font-size:15px;font-weight:700;color:var(--accent);text-align:right;padding-top:10px;border-top:1px solid var(--page-bg);margin-top:10px}
.detail-actions{padding:12px 16px;border-top:1px solid var(--page-bg);display:flex;gap:10px;position:sticky;bottom:0;background:var(--bg)}
.detail-btn{flex:1;height:42px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.detail-btn.cancel{background:var(--bg);color:var(--ink-muted);border:1px solid var(--border)}
.detail-btn.cancel:active{background:var(--page-bg)}
.detail-btn.confirm,.detail-btn.pay{background:var(--accent);color:#fff}
.detail-btn.confirm:active,.detail-btn.pay:active{opacity:.85}
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div class="nav-back" onclick="location.href='my.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">订单管理</div>
  <div class="nav-placeholder"></div>
</div>

<div class="status-tabs">
  <div class="st-tab on" data-status="all" onclick="switchTab('all')">全部</div>
  <div class="st-tab" data-status="pending" onclick="switchTab('pending')">待支付</div>
  <div class="st-tab" data-status="completed" onclick="switchTab('completed')">已完成</div>
  <div class="st-tab" data-status="cancelled" onclick="switchTab('cancelled')">已取消</div>
</div>

<div class="orders-container" id="ordersContainer"></div>

</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-box" id="detailBox">
    <div class="detail-header">
      <div class="detail-title">订单详情</div>
      <div class="detail-close" onclick="closeDetail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>

<script>
var orders = [
  {
    id: 'DD20260701001',
    shopName: '绍兴兰亭产业数资',
    status: 'pending',
    createTime: '2026-07-01 10:30:00',
    goods: [
      { name:'兰亭雅集', desc:'优享版 · 限量666份', price:399, count:1, img:'asset/兰亭雅集封面图.png' }
    ],
    total: 399
  },
  {
    id: 'DD20260630001',
    shopName: '绍兴兰亭产业数资',
    status: 'completed',
    createTime: '2026-06-30 14:20:00',
    payTime: '2026-06-30 14:25:00',
    completeTime: '2026-06-30 14:30:00',
    goods: [
      { name:'兰亭碑刻', desc:'限量888份', price:299, count:2, img:'asset/兰亭碑刻封面图.png', assetIds:['#0128','#0129'] }
    ],
    total: 598
  },
  {
    id: 'DD20260628001',
    shopName: '绍兴兰亭产业数资',
    status: 'completed',
    createTime: '2026-06-28 09:15:00',
    payTime: '2026-06-28 09:20:00',
    completeTime: '2026-06-28 09:25:00',
    goods: [
      { name:'兰亭春禊', desc:'限量2000份', price:199, count:1, img:'asset/兰亭春禊封面图.png', assetIds:['#0256'] }
    ],
    total: 199
  },
  {
    id: 'DD20260625001',
    shopName: '古越龙山',
    status: 'completed',
    createTime: '2026-06-25 16:00:00',
    payTime: '2026-06-25 16:05:00',
    completeTime: '2026-06-25 16:10:00',
    goods: [
      { name:'曲水流觞', desc:'限量666份', price:259, count:1, img:'asset/曲水流觞封面图.png', assetIds:['#0345'] }
    ],
    total: 259
  },
  {
    id: 'DD20260620001',
    shopName: '绍兴兰亭产业数资',
    status: 'cancelled',
    createTime: '2026-06-20 12:00:00',
    cancelTime: '2026-06-20 12:30:00',
    goods: [
      { name:'兰亭诗韵', desc:'限量888份', price:459, count:1, img:'asset/兰亭诗韵封面图.png' }
    ],
    total: 459
  }
];

var currentStatus = 'all';

function switchTab(status){
  currentStatus = status;
  document.querySelectorAll('.st-tab').forEach(function(t){ t.classList.toggle('on', t.dataset.status===status); });
  renderOrders();
}

function renderOrders(){
  var container = document.getElementById('ordersContainer');
  var filtered = currentStatus==='all' ? orders : orders.filter(function(o){ return o.status===currentStatus; });
  if(!filtered.length){
    container.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div><div class="empty-text">暂无相关订单</div></div>';
    return;
  }
  container.innerHTML = filtered.map(function(order){
    return '<div class="order-card">'+
      '<div class="oc-header">'+
        '<div class="oc-shop">'+
          '<div class="oc-shop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>'+
          '<span class="oc-shop-name">'+order.shopName+'</span>'+
        '</div>'+
        '<span class="oc-status os-'+order.status+'">'+getStatusText(order.status)+'</span>'+
      '</div>'+
      '<div class="oc-goods" onclick="showDetail(\''+order.id+'\')">'+
        order.goods.map(function(g){
          return '<div class="og-item">'+
            '<img class="og-img" src="'+g.img+'" alt="'+g.name+'" onerror="this.style.background=\'#f0f0f0\'">'+
            '<div class="og-info">'+
              '<div class="og-name">'+g.name+'</div>'+
              '<div class="og-desc">'+g.desc+'</div>'+
              '<div class="og-price-row"><span class="og-price">¥'+g.price+'</span><span class="og-count">x'+g.count+'</span></div>'+
            '</div>'+
          '</div>';
        }).join('')+
      '</div>'+
      '<div class="oc-footer">'+
        '<div class="oc-total">共'+order.goods.reduce(function(s,g){return s+g.count;},0)+'件，合计<strong>¥'+order.total+'</strong></div>'+
        '<div class="oc-actions">'+getOrderActions(order)+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function getStatusText(s){ return {pending:'待支付',completed:'已完成',cancelled:'已取消'}[s]||s; }

function getOrderActions(order){
  if(order.status==='pending') return '<button class="oa-btn default" onclick="event.stopPropagation();cancelOrder(\''+order.id+'\')">取消</button><button class="oa-btn primary" onclick="event.stopPropagation();payOrder(\''+order.id+'\')">去支付</button>';
  return '<button class="oa-btn default" onclick="event.stopPropagation();showDetail(\''+order.id+'\')">查看详情</button>';
}

function showDetail(orderId){
  var order = orders.find(function(o){ return o.id===orderId; });
  if(!order) return;
  var content = document.getElementById('detailContent');
  var actionsHtml = order.status==='pending'
    ? '<button class="detail-btn cancel" onclick="cancelOrder(\''+order.id+'\');closeDetail()">取消订单</button><button class="detail-btn pay" onclick="payOrder(\''+order.id+'\')">去支付</button>'
    : '<button class="detail-btn confirm" onclick="closeDetail()">确定</button>';
  content.innerHTML =
    '<div class="detail-section"><div class="detail-section-title">订单信息</div>'+
      '<div class="detail-row"><span class="detail-label">订单编号</span><span class="detail-value">'+order.id+'</span></div>'+
      '<div class="detail-row"><span class="detail-label">下单时间</span><span class="detail-value">'+order.createTime+'</span></div>'+
      (order.payTime?'<div class="detail-row"><span class="detail-label">支付时间</span><span class="detail-value">'+order.payTime+'</span></div>':'')+
      (order.completeTime?'<div class="detail-row"><span class="detail-label">完成时间</span><span class="detail-value">'+order.completeTime+'</span></div>':'')+
      (order.cancelTime?'<div class="detail-row"><span class="detail-label">取消时间</span><span class="detail-value">'+order.cancelTime+'</span></div>':'')+
    '</div>'+
    '<div class="detail-section"><div class="detail-section-title">商品信息</div>'+
      order.goods.map(function(g){
        return '<div class="detail-goods"><div class="og-item">'+
          '<img class="og-img" src="'+g.img+'" alt="'+g.name+'" onerror="this.style.background=\'#f0f0f0\'">'+
          '<div class="og-info">'+
            '<div class="og-name">'+g.name+'</div>'+
            '<div class="og-desc">'+g.desc+'</div>'+
            '<div class="og-price-row"><span class="og-price">¥'+g.price+'</span><span class="og-count">x'+g.count+'</span></div>'+
            (order.status==='completed'&&g.assetIds?'<div style="margin-top:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap"><span style="font-size:10px;color:#999">编号：</span>'+g.assetIds.map(function(id){return '<span style="font-size:10px;padding:1px 6px;background:rgba(63,139,109,.1);color:var(--accent);border-radius:4px;font-weight:600">'+id+'</span>';}).join('')+'</div>':'')+
          '</div>'+
        '</div></div>';
      }).join('')+
    '</div>'+
    '<div class="detail-total">合计：¥'+order.total+'</div>'+
    '<div class="detail-actions">'+actionsHtml+'</div>';
  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail(){ document.getElementById('detailOverlay').classList.remove('show'); }
document.getElementById('detailOverlay').addEventListener('click',function(e){ if(e.target===this) closeDetail(); });

function payOrder(id){ alert('即将跳转到支付页面，订单号：'+id); }
function cancelOrder(id){
  if(confirm('确定要取消该订单吗？')){
    var o = orders.find(function(x){return x.id===id;});
    if(o){ o.status='cancelled'; o.cancelTime=new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}).replace(/\//g,'-'); renderOrders(); alert('订单已取消'); }
  }
}

renderOrders();
</script>
</body>
</html>
