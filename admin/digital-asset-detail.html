function calcBenefitStatus(bf){
  var now = Date.now();

  if(now > exp && used < total) return 'expired';
  if(now < eff) return 'pending';
  if(used > 0 && used < total) return 'partial';
  return 'unused';
}

  var hasPartial = false, hasDone = false, hasEnding = false, hasExpired = false;

var saleMap = { sold:'已售出', unsold:'未售出' };
var saleCls = { sold:'tag-sold', unsold:'tag-unsold' };
var tagExpired = { background:'#fff2f3', color:'#D70C1F' };

function navigateTo(url) { window.location.href = url; }

function renderList(list) {
  var body = document.getElementById('listBody');
  var empty = document.getElementById('emptyState');
  if (list.length === 0) { body.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  body.innerHTML = list.map(function(a) {
    var pStatus = calcPackageStatus(a.bf);
    var pm = P_STA[pStatus] || P_STA.unused;
    return '<tr>' +
      '<td><img class="asset-thumb" src="' + a.img + '" alt=""></td>' +
      '<td style="font-weight:600">' + a.name + '</td>' +
      '<td style="color:#666">' + a.spec + '</td>' +
      '<td>' + a.issuer + '</td>' +
      '<td style="font-size:11px;color:#999;font-family:monospace">' + a.number + '</td>' +
      '<td>' + a.phone + '</td>' +
      '<td><a class="on-chain-link" href="' + EXPLORER_URL + '&token_id=' + (Math.floor(Math.random()*50)+1) + '" target="_blank" title="查看链上记录">' + a.chainAddr.substring(0,10) + '...</a></td>' +
      '<td><span class="tag ' + saleCls[a.saleStatus] + '">' + saleMap[a.saleStatus] + '</span></td>' +
      '<td><span class="tag ' + pm.c + '">' + pm.t + '</span></td>' +
      '<td><button class="search-btn" style="padding:4px 10px;font-size:11px" onclick="showDetail(\'' + a.id + '\')">详情</button></td>' +
      '</tr>';
  }).join('');
}

function applyFilter() {
  var issuer = document.getElementById('sIssuer').value.trim().toLowerCase();
  var name = document.getElementById('sName').value.trim().toLowerCase();
  var spec = document.getElementById('sSpec').value.trim().toLowerCase();
  var number = document.getElementById('sNumber').value.trim().toLowerCase();
  var list = assets.filter(function(a) {
    if (issuer && a.issuer.toLowerCase().indexOf(issuer) < 0) return false;
    if (name && a.name.toLowerCase().indexOf(name) < 0) return false;
    if (spec && a.spec.toLowerCase().indexOf(spec) < 0) return false;
    if (number && a.number.toLowerCase().indexOf(number) < 0) return false;
    return true;
  });
  renderList(list);
}

function showDetail(id) {
  var a = assets.find(function(x) { return x.id === id; });
  if (!a) return;
  var pStatus = calcPackageStatus(a.bf);
  var pm = P_STA[pStatus] || P_STA.unused;
  var h = '';
  h += '<div class="detail-section">';
  h += '<div class="detail-section-title">基本信息</div>';
  h += '<div style="display:flex;gap:12px;margin-bottom:12px">';
  h += '<img src="' + a.img + '" style="width:60px;height:74px;border-radius:8px;object-fit:cover;background:#f5f5f7">';
  h += '<div><div style="font-size:15px;font-weight:600;margin-bottom:4px">' + a.name + '</div><div style="font-size:12px;color:#666">' + a.spec + '</div></div>';
  h += '</div>';
  h += '<div class="detail-row"><span class="detail-label">发行方</span><span class="detail-value" style="color:#D70C1F;font-weight:600">' + a.issuer + '</span></div>';
  h += '<div class="detail-row"><span class="detail-label">编号</span><span class="detail-value">' + a.number + '</span></div>';
  h += '<div class="detail-row"><span class="detail-label">持有人</span><span class="detail-value">' + a.phone + '</span></div>';
  h += '<div class="detail-row"><span class="detail-label">持有人地址</span><span class="detail-value" style="font-family:monospace;font-size:12px">' + a.holderAddr + '</span></div>';
  h += '<div class="detail-row"><span class="detail-label">链上地址</span><span class="detail-value"><a class="chain-link" href="' + EXPLORER_URL + '&token_id=' + (Math.floor(Math.random()*50)+1) + '" target="_blank">' + a.chainAddr + '</a></span></div>';
  h += '<div class="detail-row"><span class="detail-label">销售状态</span><span class="detail-value"><span class="tag ' + saleCls[a.saleStatus] + '">' + saleMap[a.saleStatus] + '</span></span></div>';
  h += '<div class="detail-row"><span class="detail-label">权益包</span><span class="detail-value"><span class="tag ' + pm.c + '">' + pm.t + '</span></span></div>';
  h += '</div>';

  h += '<div class="detail-section">';
  h += '<div class="detail-section-title">权益详情</div>';
  if (a.bf && a.bf.length) {
    h += '<div style="background:#f5f7fa;border-radius:10px;padding:10px">';
    a.bf.forEach(function(b) {
      var s = calcBenefitStatus(b);
      var st = B_STA[s] || B_STA.unused;
      var extra = '';
      var det = '';
      if(b.type === 'ticket') {
        extra = '已用'+b.used+'/'+b.total+'次';
        if(b.slots){
          var usedSlots = b.slots.filter(function(sl){ return sl.u && sl.t; });
          if(usedSlots.length > 0){
            det += '<div style="margin-top:4px;padding-top:4px;border-top:1px dashed #ddd">';
            usedSlots.forEach(function(sl){ det += '<div style="font-size:10px;color:#888;padding:1px 4px 1px 12px">• '+sl.t+'</div>'; });
            det += '</div>';
          }
        }
      }
      else if(b.type === 'identity' && b.used > 0) {
        var isId = b.usedTimes && b.usedTimes.length > 0;
        extra = '已使用'+b.used+'次';
        if(isId) extra = '<span style="cursor:pointer;text-decoration:underline dashed;text-underline-offset:2px" onclick="event.stopPropagation();showIdTimes(\''+b.n+'\','+b.used+',\''+encodeURIComponent(JSON.stringify(b.usedTimes))+'\')">已使用'+b.used+'次</span>';
      }
      else if(b.type === 'physical') {
        if(b.used > 0 && b.ship){
          det += '<div style="margin-top:4px;padding-top:4px;border-top:1px dashed #ddd;font-size:10px;color:#888">📦 '+(b.ship.exp||'')+' '+b.ship.expNo+'<br>📍 '+b.ship.addr+'</div>';
        }
      }
      h += '<div class="benefit-item" style="flex-wrap:wrap;padding:10px 12px">';
      h += '<span class="benefit-name"><strong>'+b.n+'</strong></span>';
      if(extra) h += '<span style="font-size:10px;color:#999;margin:0 6px">'+extra+'</span>';
      h += '<span class="benefit-status tag ' + st[1] + '">' + st[0] + '</span>';
      if(b.desc) h += '<div style="width:100%;font-size:10px;color:#888;margin-top:2px">'+b.desc+'</div>';
      if(det) h += det;
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<div style="padding:12px 0;font-size:13px;color:#999;text-align:center">暂无权益信息</div>';
  }
  h += '</div>';

  document.getElementById('detailBody').innerHTML = h;
  document.getElementById('detailModal').classList.add('show');
}

function showIdTimes(name, count, encoded){
  document.getElementById('useTimeTitle').textContent = '使用详情 - '+name;
  var body = document.getElementById('useTimeBody');
  var times = [];
  try { if(encoded) times = JSON.parse(decodeURIComponent(encoded)); } catch(e){}
  var h = '<div style="padding:4px 0">';
  h += '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f0f0f0">';
  h += '<span style="font-size:26px;font-weight:700;color:#D70C1F">'+count+'</span>';
  h += '<span style="font-size:13px;color:#666">次使用记录</span></div>';
  if(times.length > 0){
    times.forEach(function(t, i){
      var n = (i+1).toString().padStart(2,'0');
      h += '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;margin-bottom:3px;background:'+(i%2===0?'#f9f9f9':'#fff')+';border-radius:6px">';
      h += '<span style="font-size:10px;color:#bbb;font-family:monospace;min-width:18px">#'+n+'</span>';
      h += '<span style="font-size:12px;color:#555">'+t+'</span></div>';
    });
  } else {
    h += '<div style="padding:12px;background:#f5f7fa;border-radius:8px;font-size:12px;color:#888;text-align:center">暂无详细使用时间记录</div>';
  }
  h += '</div>';
  body.innerHTML = h;
  document.getElementById('useTimeModal').classList.add('show');
}

renderList(assets);
</script>
