<!DOCTYPE html>
<html lang="zh-CN">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

    .header { background: linear-gradient(135deg, #D70C1F, #F12B3D); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-user { font-size: 14px; }

    .main-container { display: flex; min-height: calc(100vh - 60px); }
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
    .sidebar-group-title { padding: 8px 24px; font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-item { padding: 10px 24px 10px 48px; font-size: 14px; color: #666; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .sidebar-item:hover { background: #f5f5f5; color: #D70C1F; }
    .sidebar-item.active { background: rgba(215, 12, 31, 0.1); color: #D70C1F; font-weight: 600; }
    .sidebar-item svg { width: 14px; height: 14px; }

    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .content-title { font-size: 18px; font-weight: 600; color: #333; }

    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }

    .btn { padding: 6px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #D70C1F; color: #fff; }
    .btn-primary:hover { background: #c60a1b; }
    .btn-default { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-default:hover { background: #f5f5f5; }
    .btn-info { background: #1890ff; color: #fff; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .btn-warn { background: #fa8c16; color: #fff; }
    .btn-success { background: #52c41a; color: #fff; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 13px; color: #999; border-bottom: 2px solid #f0f0f0; font-weight: 600; }
    td { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 14px; vertical-align: middle; }
    tr:hover td { background: #fafafa; }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .status-dot.active { background: #52c41a; }
    .status-dot.frozen { background: #ff4d4f; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-active { background: #f6ffed; color: #52c41a; }
    .badge-frozen { background: #fff2f0; color: #ff4d4f; }
    .badge-open { background: #e6f7ff; color: #1890ff; }
    .badge-closed { background: #f5f5f5; color: #999; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 860px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .modal-close svg { width: 14px; height: 14px; color: #666; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }

    .info-section { margin-bottom: 20px; }
    .info-section-title { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
    .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
    .info-label { color: #999; width: 100px; flex-shrink: 0; }
    .info-value { color: #333; font-weight: 500; }
    .wallet-status { display: flex; gap: 12px; padding: 16px; background: #f8fafc; border-radius: 10px; margin-bottom: 12px; }
    .wallet-item { flex: 1; text-align: center; }
    .wallet-item .w-num { font-size: 20px; font-weight: 700; }
    .wallet-item .w-label { font-size: 11px; color: #999; margin-top: 4px; }

    .history-list { max-height: 200px; overflow-y: auto; }
    .history-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
    .history-item:last-child { border-bottom: none; }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .history-dot.register { background: #1890ff; }
    .history-dot.verify { background: #52c41a; }
    .history-dot.freeze { background: #ff4d4f; }
    .history-dot.unfreeze { background: #fa8c16; }
    .history-content { flex: 1; }
    .history-action { font-weight: 500; }
    .history-time { font-size: 11px; color: #999; margin-top: 2px; }

    .search-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-input { height: 36px; padding: 0 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; width: 200px; }
    .search-input:focus { border-color: #D70C1F; }
    .filter-select { height: 36px; padding: 0 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }

    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; animation: slideIn 0.3s ease; }
    .toast.success { background: rgba(7, 193, 96, 0.9); color: #fff; }
    .toast.error { background: rgba(215, 12, 31, 0.9); color: #fff; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  </style>
</head>

function renderList() {
  var keyword = (document.getElementById('searchInput').value || '').toLowerCase();
  var filter = document.getElementById('statusFilter').value;
  var list = users.filter(function(u) {
    var match = !keyword || u.name.toLowerCase().includes(keyword) || u.phone.includes(keyword) || u.id.toLowerCase().includes(keyword) || u.realName.includes(keyword);
    if (filter !== 'all') match = match && u.status === filter;
    return match;
  });
  var tbody = document.getElementById('userTbody');
  tbody.innerHTML = list.map(function(u) {
    return '<tr>' +
      '<td style="color:#667eea;font-weight:500">' + u.id + '</td>' +
      '<td style="font-weight:600">' + u.name + '</td>' +
      '<td>' + u.realName + '</td>' +
      '<td>' + u.account + '</td>' +
      '<td><span class="badge ' + (u.wallet.some(function(w){return w.status==='open'})?'badge-open':'badge-closed') + '">' + (u.wallet.some(function(w){return w.status==='open'})?'已开通':'未开通') + '</span></td>' +
      '<td><span class="status-dot ' + u.status + '"></span><span class="badge badge-' + u.status + '">' + (u.status==='active'?'正常':'已冻结') + '</span></td>' +
      '<td><span class="badge ' + (u.certStatus==='verified'?'badge-active':'badge-frozen') + '">' + (u.certStatus==='verified'?'已认证':'未认证') + '</span></td>' +
      '<td style="font-size:12px;color:#999">' + u.regDate + '</td>' +
      '<td><button class="btn btn-info" onclick="openDetail(\'' + u.id + '\')">详情</button> ' + (u.status==='active' ? '<button class="btn btn-warn" onclick="toggleFreeze(\'' + u.id + '\',true)">冻结</button>' : '<button class="btn btn-success" onclick="toggleFreeze(\'' + u.id + '\',false)">解冻</button>') + '</td>' +
      '</tr>';
  }).join('');
}

function openDetail(id) {
  var u = users.find(function(u) { return u.id === id; });
  if (!u) return;
  var h = '';

  // 用户信息
  h += '<div class="info-section"><div class="info-section-title">用户信息</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 32px">';
  h += '<div class="info-row"><span class="info-label">用户编号</span><span class="info-value">' + u.id + '</span></div>';
  h += '<div class="info-row"><span class="info-label">用户姓名</span><span class="info-value">' + u.realName + '</span></div>';
  h += '<div class="info-row"><span class="info-label">用户账号</span><span class="info-value">' + u.account + '</span></div>';
  h += '<div class="info-row"><span class="info-label">用户昵称</span><span class="info-value">' + u.name + '</span></div>';
  h += '<div class="info-row"><span class="info-label">性别</span><span class="info-value">' + u.gender + '</span></div>';
  h += '<div class="info-row"><span class="info-label">出生日期</span><span class="info-value">' + u.birthday + '</span></div>';
  h += '<div class="info-row"><span class="info-label">类型</span><span class="info-value">' + u.userType + '</span></div>';
  h += '<div class="info-row"><span class="info-label">证件号码</span><span class="info-value">' + u.idNumber + '</span></div>';
  h += '<div class="info-row"><span class="info-label">注册时间</span><span class="info-value">' + u.regDate + '</span></div>';
  h += '<div class="info-row"><span class="info-label">认证时间</span><span class="info-value">' + u.verifyDate + '</span></div>';
  h += '<div class="info-row"><span class="info-label">认证状态</span><span class="info-value"><span class="badge ' + (u.certStatus==='verified'?'badge-active':'badge-frozen') + '">' + (u.certStatus==='verified'?'已认证':'未认证') + '</span></span></div>';
  h += '<div class="info-row"><span class="info-label">账户状态</span><span class="info-value"><span class="badge badge-' + u.status + '">' + (u.status==='active'?'正常':'已冻结') + '</span></span></div>';
  h += '</div></div>';

  // 支付钱包 - 两行
  h += '<div class="info-section"><div class="info-section-title">支付钱包</div>';
  u.wallet.forEach(function(w) {
    var isOpen = w.status === 'open';
    h += '<div style="background:#f8fafc;border-radius:10px;padding:14px 16px;margin-bottom:8px">';
    h += '<div style="font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:10px">' + w.platform + '</div>';
    h += '<div style="display:flex;gap:24px;flex-wrap:wrap">';
    h += '<div><span style="font-size:11px;color:#999">状态</span><span class="badge ' + (isOpen?'badge-open':'badge-closed') + '" style="margin-left:8px">' + (isOpen?'已开通':'未开通') + '</span></div>';
    h += '<div><span style="font-size:11px;color:#999">开通时间</span><span style="margin-left:8px;font-size:13px;color:#333">' + w.walletDate + '</span></div>';
    h += '<div><span style="font-size:11px;color:#999">可用余额</span><span style="margin-left:8px;font-size:14px;font-weight:700;color:#52c41a">¥' + w.balance.toLocaleString('zh-CN',{minimumFractionDigits:2}) + '</span></div>';
    h += '<div><span style="font-size:11px;color:#999">冻结余额</span><span style="margin-left:8px;font-size:14px;font-weight:700;color:#fa8c16">¥' + w.frozenBalance.toLocaleString('zh-CN',{minimumFractionDigits:2}) + '</span></div>';
    h += '</div></div>';
  });
  h += '</div>';

  // 资产概况
  h += '<div class="info-section"><div class="info-section-title">资产概况</div>';
  h += '<div style="display:flex;gap:16px">';
  h += '<div style="flex:1;text-align:center;padding:16px;background:#f8fafc;border-radius:10px"><div style="font-size:11px;color:#999;margin-bottom:4px">数字资产合集数量</div><div style="font-size:18px;font-weight:700;color:#667eea">' + (u.collectionCount||0) + '</div></div>';
  h += '<div style="flex:1;text-align:center;padding:16px;background:#f8fafc;border-radius:10px"><div style="font-size:11px;color:#999;margin-bottom:4px">数字资产数量</div><div style="font-size:18px;font-weight:700;color:#1890ff">' + (u.assetCount||0) + '</div></div>';
  h += '</div></div>';

  // 操作记录
  h += '<div class="info-section"><div class="info-section-title">操作记录</div><div class="history-list">';
  u.history.slice().reverse().forEach(function(his) {
    h += '<div class="history-item"><div class="history-dot ' + his.type + '"></div>';
    h += '<div class="history-content"><div style="display:flex;align-items:center;gap:10px">';
    h += '<div class="history-action">' + his.action + '</div>';
    h += '<span style="font-size:11px;color:#999;white-space:nowrap">' + (his.operator||'') + '</span>';
    if (his.remark) h += '<span style="font-size:11px;color:#888;white-space:nowrap">' + his.remark + '</span>';
    h += '<div style="flex:1"></div><span style="font-size:11px;color:#bbb;white-space:nowrap">' + his.time + '</span>';
    h += '</div></div></div>';
  });
  h += '</div></div>';

  document.getElementById('detailContent').innerHTML = h;
  document.getElementById('detailModal').classList.add('show');
}

function closeDetailModal() { document.getElementById('detailModal').classList.remove('show'); }

function toggleFreeze(id, freeze) {
  var u = users.find(function(u) { return u.id === id; });
  if (!u) return;
  u.status = freeze ? 'frozen' : 'active';
  u.history.push({
    action: freeze ? '冻结账户' : '解冻账户',
    type: freeze ? 'freeze' : 'unfreeze',
    time: new Date().toISOString().substring(0,19).replace('T',' '),
    operator: '管理员A',
    remark: freeze ? '临时冻结调查' : '已核实解冻'
  });
  renderList();
  showToast(freeze ? '已冻结' : '已解冻', 'success');
}

function navigateTo(url) { window.location.href = url; }
function showToast(msg, type) {
  var t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2000);
}

renderList();
</script>
</body>
</html>
