<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的钱包</title>
<style>
:root{--accent:#3F8B6D;--accent-contrast:#fff;--bg:#fff;--ink:#222;--ink-muted:#555;--ink-subtle:#888;--border:#e0e0e0;--page-bg:#F0F0F0;--radius-sm:7px;--radius-card:7px;--radius-pill:9999px;--font-display:"Helvetica Neue",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;--font-body:"Inter",-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;width:100%;background:#fff;font-family:var(--font-body);color:var(--ink-muted);display:flex;justify-content:center;min-height:100%}
.page{max-width:430px;width:100%;min-height:100vh;background:linear-gradient(180deg,#3F8B6D 0%,#a8c9bb 8%,#f0f0f0 20%);padding:16px;padding-bottom:80px;position:relative;box-sizing:border-box}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 0 16px}
.nav-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.2);border-radius:50%}
.nav-back svg{width:20px;height:20px;display:block;color:#fff}
.nav-title{flex:1;text-align:center;font-size:16px;font-weight:700;color:#fff}
.nav-placeholder{width:32px}

/* ── 钱包卡片 ── */
.wallet-card{background:var(--bg);border-radius:var(--radius-card);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04);margin-bottom:12px}
.wc-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--page-bg)}
.wc-header-left{display:flex;align-items:center;gap:12px}
.wc-logo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.wc-logo.hui{background:linear-gradient(135deg,#3F8B6D,#2d6b53)}
.wc-logo.zhong{background:linear-gradient(135deg,#667eea,#764ba2)}
.wc-logo svg{width:22px;height:22px;color:#fff;display:block}
.wc-name{font-size:15px;font-weight:600;color:var(--ink)}
.wc-arrow{width:20px;height:20px;cursor:pointer;opacity:0;transition:opacity .2s;display:flex;align-items:center}
.wallet-card.opened .wc-arrow{opacity:1}
.wc-arrow svg{width:100%;height:100%;color:#ccc;display:block}
.wc-btn{height:32px;padding:0 20px;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.wc-btn:active{opacity:.85;transform:scale(.95)}
.wallet-card.opened .wc-btn{display:none}

/* ── 未开通 ── */
.wc-unopened{padding:0 16px 16px}
.wc-desc{font-size:12px;color:var(--ink-subtle)}
.wallet-card.opened .wc-unopened{display:none}

/* ── 已开通 ── */
.wc-opened{display:none;padding:16px}
.wallet-card.opened .wc-opened{display:block}
.wc-balance-row{display:flex;justify-content:space-around;padding-bottom:16px;border-bottom:1px solid var(--page-bg)}
.wb-item{text-align:center}
.wb-label{font-size:12px;color:var(--ink-subtle);margin-bottom:4px}
.wb-value{font-size:20px;font-weight:700;color:var(--ink)}
.wb-value.frozen{color:var(--ink-subtle)}
.wc-actions{display:flex;gap:12px;margin-top:16px}
.wc-action-btn{flex:1;height:40px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--bg);font-size:13px;color:var(--ink-muted);cursor:pointer;transition:all .15s}
.wc-action-btn:active{background:var(--page-bg)}
.wc-action-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.wc-action-btn.primary:active{opacity:.85}

/* ── 加载弹窗 ── */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:999}
.loading-overlay.show{display:flex}
.loading-content{background:var(--bg);border-radius:16px;padding:24px 32px;text-align:center}
.loading-spinner{width:40px;height:40px;border:3px solid var(--page-bg);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--ink-muted)}
.reset-btn{margin:10px 0 0 10px;height:32px;padding:0 20px;border:1px dashed rgba(0,0,0,.2);border-radius:16px;background:transparent;color:rgba(0,0,0,.3);font-size:11px;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:rgba(0,0,0,.4);color:rgba(0,0,0,.5)}
</style>
</head>
<body>
<button class="reset-btn" onclick="resetAll()">清空开通</button>
<div class="page">

<!-- 顶部 -->
<div class="top-bar">
  <div class="nav-back" onclick="location.href='my.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </div>
  <div class="nav-title">我的钱包</div>
  <div class="nav-placeholder"></div>
</div>

<!-- 汇付钱包 -->
<div class="wallet-card" id="huiWallet">
  <div class="wc-header">
    <div class="wc-header-left">
      <div class="wc-logo hui">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="wc-name">汇付钱包</span>
    </div>
    <div class="wc-arrow" onclick="viewWalletDetail('hui')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <button class="wc-btn" onclick="openWallet('hui')">去开通</button>
  </div>
  <div class="wc-unopened">
    <div class="wc-desc">免费开通 快捷支付</div>
  </div>
  <div class="wc-opened">
    <div class="wc-balance-row">
      <div class="wb-item">
        <div class="wb-label">账户余额</div>
        <div class="wb-value">¥50.00</div>
      </div>
    </div>
    <div class="wc-actions">
      <button class="wc-action-btn" onclick="recharge('hui')">充值</button>
      <button class="wc-action-btn primary" onclick="withdraw('hui')">提现</button>
    </div>
  </div>
</div>

<!-- 中金钱包 -->
<div class="wallet-card" id="zhongWallet">
  <div class="wc-header">
    <div class="wc-header-left">
      <div class="wc-logo zhong">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <span class="wc-name">中金钱包</span>
    </div>
    <div class="wc-arrow" onclick="viewWalletDetail('zhong')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <button class="wc-btn" onclick="openWallet('zhong')">去开通</button>
  </div>
  <div class="wc-unopened">
    <div class="wc-desc">免费开通 快捷支付</div>
  </div>
  <div class="wc-opened">
    <div class="wc-balance-row">
      <div class="wb-item">
        <div class="wb-label">账户余额</div>
        <div class="wb-value">¥0.00</div>
      </div>
    </div>
    <div class="wc-actions">
      <button class="wc-action-btn" onclick="recharge('zhong')">充值</button>
      <button class="wc-action-btn primary" onclick="withdraw('zhong')">提现</button>
    </div>
  </div>
</div>

</div>

<!-- 加载弹窗 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">正在开通...</div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  if(localStorage.getItem('huiWalletOpened')==='true') document.getElementById('huiWallet').classList.add('opened');
  if(localStorage.getItem('zhongWalletOpened')==='true') document.getElementById('zhongWallet').classList.add('opened');
});

function openWallet(type) {
  var overlay = document.getElementById('loadingOverlay');
  var text = document.getElementById('loadingText');
  text.textContent = '正在开通...';
  overlay.classList.add('show');
  setTimeout(function(){ text.textContent = '验证身份...'; }, 800);
  setTimeout(function(){ text.textContent = '开通成功!'; }, 1600);
  setTimeout(function(){
    overlay.classList.remove('show');
    if(type==='hui'){ document.getElementById('huiWallet').classList.add('opened'); localStorage.setItem('huiWalletOpened','true'); }
    else{ document.getElementById('zhongWallet').classList.add('opened'); localStorage.setItem('zhongWalletOpened','true'); }
  }, 2400);
}

function viewWalletDetail(type){ alert('查看详情: '+(type==='hui'?'汇付钱包':'中金钱包')); }
function recharge(type){ alert('充值功能: '+(type==='hui'?'汇付钱包':'中金钱包')); }
function withdraw(type){ alert('提现功能: '+(type==='hui'?'汇付钱包':'中金钱包')); }
function resetAll(){
  localStorage.removeItem('huiWalletOpened');
  localStorage.removeItem('zhongWalletOpened');
  localStorage.removeItem('authenticated');
  alert('已清空开通状态，页面将刷新');
  window.location.reload();
}
</script>
</body>
</html>
