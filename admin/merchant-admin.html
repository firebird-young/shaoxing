<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>商家管理 - 元宇宙商城后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

    /* ── 顶部导航 ── */
    .header { background: linear-gradient(135deg, #D70C1F, #F12B3D); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-user { font-size: 14px; }

    /* ── 主布局 ── */
    .main-container { display: flex; min-height: calc(100vh - 60px); }

    /* ── 左侧菜单 ── */
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
    .sidebar-group-title { padding: 8px 24px; font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-item { padding: 10px 24px 10px 48px; font-size: 14px; color: #666; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .sidebar-item:hover { background: #f5f5f5; color: #D70C1F; }
    .sidebar-item.active { background: rgba(215, 12, 31, 0.1); color: #D70C1F; font-weight: 600; }
    .sidebar-item svg { width: 14px; height: 14px; }

    /* ── 右侧内容区 ── */
    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .content-title { font-size: 18px; font-weight: 600; color: #1a1a2e; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #D70C1F; color: #fff; }
    .btn-primary:hover { background: #c60a1b; }
    .btn-default { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-default:hover { background: #f5f5f5; }

    /* ── 卡片样式 ── */
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }

    /* ── 表单样式 ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #D70C1F; }
    .form-select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; min-height: 80px; resize: vertical; }

    /* ── 商家列表 ── */
    .merchant-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .merchant-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.2s; }
    .merchant-card:hover { transform: translateY(-4px); }
    .merchant-cover { width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
    .merchant-cover svg { width: 32px; height: 32px; color: #fff; }
    .merchant-info { padding: 12px; }
    .merchant-fullname { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .merchant-shortname { font-size: 11px; color: #999; margin-bottom: 4px; }
    .merchant-tag { font-size: 12px; color: #999; }
    .merchant-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    .merchant-btn { flex: 1; padding: 6px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
    .merchant-btn.edit { background: #f5f5f5; color: #666; }
    .merchant-btn.delete { background: #fff5f5; color: #D70C1F; }
    .merchant-btn.space { background: #f0f0ff; color: #4a4ae0; }

    /* ── 开关 ── */
    .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .toggle-switch input { display: none; }
    .toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; transition: background .3s; }
    .toggle-slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .3s; }
    .toggle-switch input:checked ~ .toggle-slider { background: #20C997; }
    .toggle-switch input:checked ~ .toggle-slider::before { transform: translateX(18px); }

    /* ── 空间项目列表 ── */
    .space-item-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .space-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #f9f9f9; border-radius: 8px; }
    .space-item-img { width: 44px; height: 44px; border-radius: 6px; background: #e0e0e0 center/cover no-repeat; flex-shrink: 0; }
    .space-item-info { flex: 1; min-width: 0; }
    .space-item-name { font-size: 13px; font-weight: 600; color: #333; }
    .space-item-meta { font-size: 11px; color: #999; margin-top: 2px; }
    .space-item-del { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #ddd; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .space-item-del svg { width: 12px; height: 12px; color: #999; }
    .space-item-del:hover { background: #fff5f5; border-color: #D70C1F; }
    .space-item-del:hover svg { color: #D70C1F; }

    /* ── 模态框 ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .modal-close svg { width: 14px; height: 14px; color: #666; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }

    /* ── 空状态 ── */
    .empty-state { padding: 60px 0; text-align: center; }
    .empty-icon { width: 64px; height: 64px; margin: 0 auto 16px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .empty-icon svg { width: 32px; height: 32px; color: #ccc; }
    .empty-text { font-size: 14px; color: #999; }

    /* ── 提示信息 ── */
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; animation: slideIn 0.3s ease; }
    .toast.success { background: rgba(7, 193, 96, 0.9); color: #fff; }
    .toast.error { background: rgba(215, 12, 31, 0.9); color: #fff; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

    /* ── 标签样式 ── */
    .tag-item { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #f0f0ff; color: #4a4ae0; border-radius: 4px; font-size: 12px; }
    .tag-item .tag-remove { cursor: pointer; font-size: 14px; color: #999; }
    .tag-item .tag-remove:hover { color: #D70C1F; }
  </style>
</head>

        </div>

  <script>
    // 商家数据
    let merchants = [
      { id: 'm1', fullName: '绍兴兰亭产业数资有限公司', shortName: '绍兴兰亭产业数资', type: 'tour', tag: '文旅 · 书法 · 数字藏品', desc: '绍兴兰亭文化产业数字资产发行方，以兰亭书法文化为核心，推出兰亭雅集、兰亭春禊等系列数字资产', active: true, coverImg: '../asset/绍兴兰亭logo.png', spaceItems: [
        { id: 'si1', name: '兰亭VR参观', img: '../asset/banner.png', type: 'external', link: 'vr_lanting.html' },
        { id: 'si2', name: '数字资产商城', img: '../asset/banner1.png', type: 'market', link: '' }
      ]},
      { id: 'm2', fullName: '古越龙山文化发展有限公司', shortName: '古越龙山', type: 'tour', tag: '文旅 · 黄酒 · 数字资产', desc: '古越龙山文化发展公司，以绍兴黄酒文化为底蕴，推出曲水流觞等数字资产', active: true, coverImg: '../asset/古越龙山logo.png', spaceItems: [] },
      { id: 'm3', fullName: '越窑文化传播有限公司', shortName: '越窑文化', type: 'tour', tag: '青瓷 · 非遗 · 数字资产', desc: '越窑文化传播公司，传承越窑青瓷非遗工艺，推出越窑青瓷数字资产', active: true, coverImg: '../asset/越窑文化logo.png', spaceItems: [] },
      { id: 'm4', fullName: '平水茶业有限公司', shortName: '平水茶业', type: 'food', tag: '茶叶 · 特产 · 数字资产', desc: '平水茶业公司，以平水日铸茶为核心，推出平水日铸茶数字资产', active: true, coverImg: '../asset/平水茶叶logo.png', spaceItems: [] }
    ];

    // 导航
    function navigateTo(url) {
      window.location.href = url;
    }

    // 渲染商家列表
    function renderMerchantList() {
      const container = document.getElementById('merchantList');
      const emptyState = document.getElementById('emptyMerchants');
      
      if (merchants.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      container.innerHTML = merchants.map(merchant => {
        const tags = merchant.tag ? merchant.tag.split('·').map(t => t.trim()).filter(t => t) : [];
        return `
        <div class="merchant-card">
          <div class="merchant-cover" style="background-image:url('${merchant.coverImg || ''}');background-size:cover;background-position:center">
            ${!merchant.coverImg ? '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' : ''}
          </div>
          <div class="merchant-info">
            <div class="merchant-fullname">${merchant.fullName || merchant.name}</div>
            <div class="merchant-shortname">${merchant.shortName || '无简称'}</div>
            <div class="merchant-tag">${tags.map(t => `<span class="tag-item">${t}</span>`).join('')}</div>
            <div class="merchant-actions">
              <button class="merchant-btn edit" onclick="editMerchant('${merchant.id}')">编辑</button>
              <button class="merchant-btn space" onclick="openSpaceModal('${merchant.id}')">空间设置</button>
              <label class="toggle-switch" onclick="event.stopPropagation()" title="${merchant.active !== false ? '已启用' : '已禁用'}">
                <input type="checkbox" ${merchant.active !== false ? 'checked' : ''} onchange="toggleMerchant('${merchant.id}', this.checked)">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
        `;
      }).join('');
    }

    // 标签管理
    let merchantTags = [];

    function addMerchantTag() {
      const input = document.getElementById('merchantTagInput');
      const tag = input.value.trim();
      if (!tag) return;
      if (merchantTags.includes(tag)) {
        showToast('标签已存在', 'error');
        return;
      }
      merchantTags.push(tag);
      input.value = '';
      renderMerchantTags();
    }

    function removeMerchantTag(tag) {
      merchantTags = merchantTags.filter(t => t !== tag);
      renderMerchantTags();
    }

    function renderMerchantTags() {
      const container = document.getElementById('merchantTagDisplay');
      container.innerHTML = merchantTags.map(tag => `
        <span class="tag-item">
          ${tag}
          <span class="tag-remove" onclick="removeMerchantTag('${tag}')">×</span>
        </span>
      `).join('');
    }

    // 打开添加商家弹窗
    function openAddMerchantModal() {
      document.getElementById('merchantModalTitle').textContent = '添加商家';
      document.getElementById('merchantEditId').value = '';
      document.getElementById('merchantCoverImg').value = '';
      document.getElementById('merchantImgPreview').src = '';
      document.getElementById('merchantImgPreview').style.display = 'none';
      document.getElementById('merchantImgDisplay').style.display = 'flex';
      document.getElementById('merchantImgInput').value = '';
      document.getElementById('fullNameGroup').style.display = 'none';
      document.getElementById('merchantShortNameInput').value = '';
      document.getElementById('merchantTypeInput').value = 'food';
      document.getElementById('merchantTagInput').value = '';
      document.getElementById('merchantDescInput').value = '';
      merchantTags = [];
      renderMerchantTags();
      document.getElementById('addMerchantModal').classList.add('show');
    }

    // 关闭添加商家弹窗
    function closeAddMerchantModal() {
      document.getElementById('addMerchantModal').classList.remove('show');
    }

    // 商家图片上传
    function handleMerchantImgUpload() {
      const fileInput = document.getElementById('merchantImgInput');
      const preview = document.getElementById('merchantImgPreview');
      const display = document.getElementById('merchantImgDisplay');
      const hiddenInput = document.getElementById('merchantCoverImg');
      
      if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
          display.style.display = 'none';
          hiddenInput.value = e.target.result;
        };
        reader.readAsDataURL(fileInput.files[0]);
      }
    }

    // 编辑商家
    function editMerchant(id) {
      const merchant = merchants.find(m => m.id === id);
      if (merchant) {
        document.getElementById('merchantModalTitle').textContent = '编辑商家';
        document.getElementById('merchantEditId').value = id;
        document.getElementById('merchantCoverImg').value = merchant.coverImg || '';
        const preview = document.getElementById('merchantImgPreview');
        const display = document.getElementById('merchantImgDisplay');
        if (merchant.coverImg) {
          preview.src = merchant.coverImg;
          preview.style.display = 'block';
          display.style.display = 'none';
        } else {
          preview.src = '';
          preview.style.display = 'none';
          display.style.display = 'flex';
        }
        document.getElementById('merchantImgInput').value = '';
        
        // 显示全称
        document.getElementById('fullNameGroup').style.display = 'block';
        document.getElementById('merchantFullNameDisplay').textContent = merchant.fullName || '暂无全称';
        
        document.getElementById('merchantShortNameInput').value = merchant.shortName || '';
        document.getElementById('merchantTypeInput').value = merchant.type;
        document.getElementById('merchantDescInput').value = merchant.desc;
        
        // 处理标签
        merchantTags = merchant.tag ? merchant.tag.split('·').map(t => t.trim()).filter(t => t) : [];
        renderMerchantTags();
        document.getElementById('merchantTagInput').value = '';
        
        document.getElementById('addMerchantModal').classList.add('show');
      }
    }

    // 保存商家
    function saveMerchant() {
      const id = document.getElementById('merchantEditId').value;
      const coverImg = document.getElementById('merchantCoverImg').value.trim();
      const shortName = document.getElementById('merchantShortNameInput').value.trim();
      const type = document.getElementById('merchantTypeInput').value;
      const desc = document.getElementById('merchantDescInput').value.trim();
      const tag = merchantTags.join(' · ');

      if (!shortName) {
        showToast('请输入商家简称', 'error');
        return;
      }

      if (id) {
        // 编辑
        const merchant = merchants.find(m => m.id === id);
        if (merchant) {
          merchant.coverImg = coverImg;
          merchant.shortName = shortName;
          merchant.type = type;
          merchant.tag = tag;
          merchant.desc = desc;
        }
        showToast('商家修改成功', 'success');
      } else {
        // 新增
        merchants.push({
          id: 'm' + Date.now(),
          fullName: shortName,
          shortName,
          type,
          tag: tag || '未分类',
          desc: desc || '暂无描述',
          active: true,
          coverImg,
          spaceItems: []
        });
        showToast('商家添加成功', 'success');
      }

      closeAddMerchantModal();
      renderMerchantList();
    }

    // 开关切换商家启用/禁用
    function toggleMerchant(id, checked) {
      const m = merchants.find(m => m.id === id);
      if (!m) return;
      m.active = checked;
      showToast(checked ? '商家已启用' : '商家已禁用', 'success');
    }

    // 显示提示
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }

    // ── 空间设置 ──
    let currentSpaceMerchantId = null;

    function openSpaceModal(merchantId) {
      const m = merchants.find(m => m.id === merchantId);
      if (!m) return;
      if (!m.spaceItems) m.spaceItems = [];
      currentSpaceMerchantId = merchantId;
      document.getElementById('spaceMerchantName').textContent = m.shortName || m.fullName || m.name;
      document.getElementById('spaceModal').classList.add('show');
      document.getElementById('spaceItemForm').style.display = 'none';
      renderSpaceItemList();
    }

    function closeSpaceModal() {
      document.getElementById('spaceModal').classList.remove('show');
      currentSpaceMerchantId = null;
    }

    function renderSpaceItemList() {
      const m = merchants.find(m => m.id === currentSpaceMerchantId);
      if (!m) return;
      const list = document.getElementById('spaceItemList');
      const empty = document.getElementById('emptySpaceItems');
      
      if (!m.spaceItems || m.spaceItems.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      const typeLabels = { miniprogram: '📱 小程序', market: '🛒 数字资产商城', external: '🔗 外部链接', digital_human: '🤖 数字人' };
      list.innerHTML = m.spaceItems.map(item => `
        <div class="space-item">
          <div class="space-item-img" style="background-image:url('${item.img || ''}')"></div>
          <div class="space-item-info">
            <div class="space-item-name">${item.name || '未命名'}</div>
            <div class="space-item-meta">${typeLabels[item.type] || item.type} ${item.link ? '· ' + item.link : ''}</div>
          </div>
          <button class="merchant-btn edit" onclick="editSpaceItem('${item.id}')" style="width:auto;flex:0 0 auto;font-size:11px">编辑</button>
          <div class="space-item-del" onclick="deleteSpaceItem('${item.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </div>
        </div>
      `).join('');
    }

    function handleSpaceItemImgUpload() {
      const fileInput = document.getElementById('spaceItemImgInput');
      const preview = document.getElementById('spaceItemImgPreview');
      const hiddenInput = document.getElementById('spaceItemImg');
      
      if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
          hiddenInput.value = e.target.result;
        };
        reader.readAsDataURL(fileInput.files[0]);
      }
    }

    function openAddSpaceItem() {
      document.getElementById('spaceItemEditId').value = '';
      document.getElementById('spaceItemImg').value = '';
      document.getElementById('spaceItemImgPreview').src = '';
      document.getElementById('spaceItemImgPreview').style.display = 'none';
      document.getElementById('spaceItemImgInput').value = '';
      document.getElementById('spaceItemName').value = '';
      document.getElementById('spaceItemType').value = 'miniprogram';
      document.getElementById('spaceItemLink').value = '';
      onSpaceTypeChange();
      document.getElementById('spaceItemForm').style.display = 'block';
    }

    function editSpaceItem(itemId) {
      const m = merchants.find(m => m.id === currentSpaceMerchantId);
      if (!m) return;
      const item = m.spaceItems.find(s => s.id === itemId);
      if (!item) return;
      document.getElementById('spaceItemEditId').value = item.id;
      document.getElementById('spaceItemImg').value = item.img || '';
      const preview = document.getElementById('spaceItemImgPreview');
      if (item.img) {
        preview.src = item.img;
        preview.style.display = 'block';
      } else {
        preview.src = '';
        preview.style.display = 'none';
      }
      document.getElementById('spaceItemImgInput').value = '';
      document.getElementById('spaceItemName').value = item.name || '';
      document.getElementById('spaceItemType').value = item.type || 'miniprogram';
      document.getElementById('spaceItemLink').value = item.link || '';
      onSpaceTypeChange();
      document.getElementById('spaceItemForm').style.display = 'block';
    }

    function saveSpaceItem() {
      const m = merchants.find(m => m.id === currentSpaceMerchantId);
      if (!m) return;
      const id = document.getElementById('spaceItemEditId').value;
      const img = document.getElementById('spaceItemImg').value.trim();
      const name = document.getElementById('spaceItemName').value.trim();
      const type = document.getElementById('spaceItemType').value;
      const link = document.getElementById('spaceItemLink').value.trim();
      
      if (!name) { showToast('请输入项目名称', 'error'); return; }
      
      const itemData = { img, name, type, link };
      
      if (id) {
        const idx = m.spaceItems.findIndex(s => s.id === id);
        if (idx >= 0) { m.spaceItems[idx] = { ...m.spaceItems[idx], ...itemData }; }
        showToast('项目已更新', 'success');
      } else {
        m.spaceItems.push({ id: 'si' + Date.now(), ...itemData });
        showToast('项目已添加', 'success');
      }
      
      document.getElementById('spaceItemForm').style.display = 'none';
      renderSpaceItemList();
    }

    function deleteSpaceItem(itemId) {
      const m = merchants.find(m => m.id === currentSpaceMerchantId);
      if (!m) return;
      if (confirm('确定要删除这个项目吗？')) {
        m.spaceItems = m.spaceItems.filter(s => s.id !== itemId);
        document.getElementById('spaceItemForm').style.display = 'none';
        renderSpaceItemList();
        showToast('项目已删除', 'success');
      }
    }

    function cancelSpaceItemForm() {
      document.getElementById('spaceItemForm').style.display = 'none';
    }

    function onSpaceTypeChange() {
      const type = document.getElementById('spaceItemType').value;
      const linkGroup = document.getElementById('spaceItemLinkGroup');
      const inp = document.getElementById('spaceItemLink');
      const lbl = document.getElementById('spaceItemLinkLabel');
      
      if (type === 'market' || type === 'digital_human') {
        linkGroup.style.display = 'none';
        inp.value = '';
      } else {
        linkGroup.style.display = 'block';
        if (type === 'external') {
          lbl.textContent = '外部链接地址';
          inp.placeholder = 'https://...';
        } else if (type === 'miniprogram') {
          lbl.textContent = '小程序appid+路径';
          inp.placeholder = 'wx1c34cb...?path=pages/index';
        } else {
          lbl.textContent = '目标链接';
          inp.placeholder = '输入目标链接';
        }
      }
    }

    // 页面加载完成后渲染商家列表
    document.addEventListener('DOMContentLoaded', renderMerchantList);
  </script>
</body>
</html>
